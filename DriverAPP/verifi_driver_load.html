<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifi Driver</title>
<style>
:root {
  --base:      #f6f4f2;
  --strong:    #36322d;
  --defined:   rgba(54,50,45,0.76);
  --subtle:    rgba(54,50,45,0.5);
  --layer-1:   #ffffff;
  --blue:      #3069e3;
  --radius-input: 100px;
  --radius-pill:  32px;
  --font: 'ABC Repro','Helvetica Neue',Helvetica,Arial,sans-serif;
  --vp-bar-h: 44px;
}
body.dark {
  --base:    #1a1a18;
  --strong:  #ffffff;
  --defined: rgba(229,229,229,0.87);
  --subtle:  rgba(229,229,229,0.63);
  --layer-1: #211f1c;
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; }
body {
  font-family: var(--font);
  color: var(--strong);
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
  background: #d4d0cb;
  display: flex; justify-content: center; align-items: flex-start;
  padding: calc(var(--vp-bar-h) + 24px) 24px 24px;
  min-height: 100vh; overflow: auto;
}
body.dark { background: #0e0d0c; }
button { font-family: inherit; cursor: pointer; border:none; background:none; padding:0; color:inherit; }

/* ── Control bar ── */
.vp-bar {
  position: fixed; top:0; left:0; right:0; height: var(--vp-bar-h);
  background: rgba(20,18,16,0.97); color:#fff;
  display:flex; align-items:center; padding: 0 16px;
  z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.06);
}
body.dark .vp-bar { background: rgba(10,9,8,0.97); }
.vp-brand { display:flex; align-items:center; gap:10px; }
.vp-tag {
  font-size:10px; font-weight:500; color: rgba(255,255,255,0.55);
  letter-spacing:0.4px; text-transform:uppercase;
  padding:2px 6px; border:1px solid rgba(255,255,255,0.15); border-radius:4px;
}
.vp-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.vp-pills { display:flex; gap:2px; background: rgba(255,255,255,0.08); border-radius:8px; padding:2px; }
.vp-pill {
  font-size:12px; font-weight:500; letter-spacing:-0.24px;
  color: rgba(255,255,255,0.6); padding:4px 10px; border-radius:6px;
  transition: background .15s, color .15s;
}
.vp-pill:hover { color:#fff; }
.vp-pill.active { background: rgba(255,255,255,0.15); color:#fff; }
.vp-opts-btn {
  display:flex; align-items:center; gap:8px; padding:5px 10px;
  background: rgba(255,255,255,0.08); color:#fff; border-radius:8px;
  font-size:12px; font-weight:500; letter-spacing:-0.24px; transition: background .15s;
}
.vp-opts-btn:hover { background: rgba(255,255,255,0.14); }
.vp-dark-toggle {
  width:32px; height:18px; border-radius:9px; background: rgba(255,255,255,0.25);
  position:relative; transition: background .2s; flex-shrink:0;
}
.vp-dark-toggle-knob {
  position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%;
  background:#fff; transition: transform .2s;
}
body.dark .vp-dark-toggle { background: var(--blue); }
body.dark .vp-dark-toggle-knob { transform: translateX(14px); }

/* ── Device frames ── */
.frame {
  position: relative; outline: 12px solid #2a2a2a; background: var(--base);
  flex-shrink: 0; box-shadow: 0 24px 60px rgba(20,18,16,0.18); overflow: hidden;
}
/* mobile: iPhone portrait 393:852 */
body.view-mobile .frame {
  height: clamp(560px, calc(100vh - var(--vp-bar-h) - 80px), 900px);
  aspect-ratio: 393 / 852; width: auto; border-radius: 40px;
}
body.view-mobile .frame::before {
  content:''; position:absolute; left:50%; top:10px; transform: translateX(-50%);
  width:70px; height:5px; border-radius:3px; background:#1a1a1a; z-index:9;
}
/* tablet: iPad landscape 1201:802 (~1.498) */
body.view-tablet .frame {
  width: clamp(700px, calc(100vw - 48px), 1100px);
  aspect-ratio: 1201 / 802; height: auto; border-radius: 24px;
}

/* hide the view not active */
.screen { display:none; position:absolute; inset:0; background: var(--base); overflow:hidden; }
body.view-mobile #screen-mobile { display:block; }
body.view-tablet #screen-tablet { display:block; }

/* ── Shared: top nav, greeting, dropdown, pair link ── */
.topnav {
  position:absolute; top:0; left:0; right:0; height:56px;
  display:flex; align-items:center; padding: 0 24px; z-index:5;
  color: var(--strong);
}
.topnav svg { display:block; }

.greeting { text-align:center; }
.greeting h1 {
  font-size:24px; font-weight:400; letter-spacing:-0.48px; line-height:1.3;
  margin:0; color: var(--strong);
}
.greeting p {
  font-size:16px; letter-spacing:-0.32px; line-height:1.3;
  margin:8px 0 0; color: var(--defined);
}

.dropdown-wrap { position: relative; width: 208px; }
.truck-select {
  width:100%; height:52px; display:flex; align-items:center; gap:8px;
  padding: 0 12px; border:1px solid var(--subtle); border-radius: var(--radius-input);
  background: var(--base); font-size:16px; letter-spacing:-0.32px; color: var(--strong);
  transition: background .12s;
}
.truck-select:hover { background: rgba(54,50,45,0.04); }
body.dark .truck-select { background: transparent; }
body.dark .truck-select:hover { background: rgba(255,255,255,0.06); }
.truck-select .label { flex:1; text-align:left; }
.truck-select .chev { width:16px; height:16px; flex-shrink:0; opacity:0.9; transition: transform .18s; }
.truck-select .chev svg { width:100%; height:100%; }
.dropdown-wrap.open .truck-select .chev { transform: rotate(180deg); }

.truck-pop {
  position:absolute; left:50%; transform: translateX(-50%) translateY(6px);
  bottom: calc(100% + 6px); width: 208px; background: var(--layer-1);
  border:1px solid rgba(26,26,26,0.14); border-radius:16px;
  box-shadow: 0 14px 12px rgba(0,0,0,0.14); padding:8px;
  display:flex; flex-direction:column; gap:4px;
  opacity:0; pointer-events:none; transition: opacity .16s, transform .16s; z-index:20;
}
body.dark .truck-pop { background:#211f1c; border-color: rgba(255,255,255,0.12); box-shadow: 0 14px 24px rgba(0,0,0,0.5); }
.dropdown-wrap.open .truck-pop { opacity:1; pointer-events:auto; transform: translateX(-50%) translateY(0); }
.truck-row {
  display:flex; align-items:center; gap:8px; padding:8px; border-radius:4px;
  font-size:14px; letter-spacing:-0.28px; color: var(--strong); transition: background .12s;
}
.truck-row:hover { background: rgba(54,50,45,0.06); }
body.dark .truck-row:hover { background: rgba(255,255,255,0.06); }
.truck-row .row-label { flex:1; text-align:left; }
.truck-row .sig { width:16px; height:16px; flex-shrink:0; }
.truck-row .sig svg { width:100%; height:100%; }

.pair-link {
  height:40px; padding: 0 24px; display:flex; align-items:center;
  font-size:16px; letter-spacing:-0.32px; color: var(--strong);
  text-decoration: underline; text-underline-offset: 2px;
}

/* ── MOBILE layout ── */
#screen-mobile .truck-bg {
  position:absolute; top:0; left:-2.32%; width:105.15%; height:84.74%;
  object-fit: contain; object-position: top center;
}
#screen-mobile .truck-light { display:block; }
#screen-mobile .truck-dark { display:none; }
body.dark #screen-mobile { background: #1a1a18; }
body.dark #screen-mobile .truck-light { display:none; }
body.dark #screen-mobile .truck-dark { display:block; }
#screen-mobile .m-stack {
  position:absolute; left:0; right:0; top:60%; bottom:0;
  display:flex; flex-direction:column; align-items:center;
  z-index:4;
}
#screen-mobile .greeting { margin-bottom: 0; }
#screen-mobile .greeting p { margin-top: 8px; }
#screen-mobile .dropdown-wrap { margin-top: 40px; }
#screen-mobile .pair-link { margin-top: 16px; }

/* ── TABLET layout (landscape, left column of controls, truck on right) ── */
#screen-tablet { background: var(--base); }
#screen-tablet .truck-bg {
  position:absolute; top:-6%; left:44%; width:58%; height:112%;
  object-fit: contain; object-position: right center;
}
#screen-tablet .t-col {
  position:absolute; left:6.5%; top:50%; transform: translateY(-50%);
  display:flex; flex-direction:column; align-items:flex-start; gap:18px; z-index:4;
  width: 360px;
}
#screen-tablet .greeting { text-align:left; }
#screen-tablet .greeting h1, #screen-tablet .greeting p { text-align:left; }
#screen-tablet .dropdown-wrap { margin-top: 6px; }
#screen-tablet .pair-link { padding-left: 0; }
/* tablet popover opens upward too */
</style>
</head>

<script>
function toggleDark(){ document.body.classList.toggle('dark'); }
function setView(v){
  document.body.classList.remove('view-mobile','view-tablet');
  document.body.classList.add('view-' + v);
  document.querySelectorAll('.vp-pill').forEach(function(p){ p.classList.remove('active'); });
  var sel = document.querySelector('.vp-pill[onclick="setView(\''+v+'\')"]');
  if (sel) sel.classList.add('active');
  // close any open dropdowns on view switch
  document.querySelectorAll('.dropdown-wrap.open').forEach(function(d){ d.classList.remove('open'); });
}
function toggleDropdown(prefix){
  document.getElementById(prefix + '-dd').classList.toggle('open');
}
function pickTruck(prefix, name){
  document.getElementById(prefix + '-label').textContent = name;
  document.getElementById(prefix + '-dd').classList.remove('open');
  console.log('[load] selected', name);
}
function pairTruck(){ console.log('[load] Pair new truck tapped'); }
document.addEventListener('click', function(e){
  document.querySelectorAll('.dropdown-wrap.open').forEach(function(d){
    if (!d.contains(e.target)) d.classList.remove('open');
  });
});
</script>
