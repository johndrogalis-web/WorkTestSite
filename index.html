<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manual Control — Interaction Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>

/* ════════════════════════════════════════
   TOKENS
════════════════════════════════════════ */
:root {
  --bg:          #f0ede9;
  --card:        #ffffff;
  --border:      rgba(54,50,45,0.13);
  --border-med:  rgba(54,50,45,0.24);
  --text-1:      #1a1814;
  --text-2:      #4a4540;
  --text-3:      rgba(40,36,30,0.5);

  --blue:        #1594ef;
  --blue-bg:     #e3f0fc;
  --blue-text:   #1056a8;

  --green:       #1e6252;
  --green-bg:    #d5f1d2;

  --amber:       #b46e00;
  --amber-bg:    #fff0d4;

  --red:         #c13c2d;
  --red-bg:      #fde8e6;

  --partial:     #7a4d00;
  --partial-bg:  #fff7ec;
  --partial-border: rgba(180,110,0,0.25);

  --card-radius: 20px;
  --btn-radius:  32px;
  --input-radius: 10px;
  --card-w:      280px;
  --card-h:      260px;
  --card-pad:    20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  padding: 40px 24px 80px;
}

/* ── Page header ── */
.page-header {
  text-align: center;
  margin-bottom: 48px;
}
.page-header h1 {
  font-size: 20px; font-weight: 600; letter-spacing: -0.4px;
  color: var(--text-1);
}
.page-header p {
  font-size: 13px; color: var(--text-3); margin-top: 6px;
  letter-spacing: -0.1px;
}

/* ── 2x2 grid ── */
.prototype-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 48px;
  max-width: 760px;
  margin: 0 auto;
}
@media (max-width: 600px) {
  .prototype-grid { grid-template-columns: 1fr; gap: 40px; }
}

/* ── Card unit (card + controls) ── */
.card-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── Scenario selector ── */
.scenario-selector {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
  padding: 4px;
  background: rgba(54,50,45,0.07);
  border-radius: 12px;
  width: var(--card-w);
}
.scenario-btn {
  flex: 1;
  padding: 5px 6px;
  border-radius: 8px;
  border: none;
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-3);
  cursor: pointer;
  letter-spacing: -0.1px;
  transition: background 0.15s, color 0.15s;
  line-height: 1.3;
  text-align: center;
}
.scenario-btn:hover { color: var(--text-1); }
.scenario-btn.active-success { background: var(--green-bg); color: var(--green); }
.scenario-btn.active-partial { background: var(--amber-bg); color: var(--amber); }
.scenario-btn.active-error   { background: var(--red-bg);   color: var(--red); }

/* ── Reset link ── */
.reset-link {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-3);
  cursor: pointer;
  letter-spacing: -0.1px;
  background: none; border: none;
  font-family: 'Inter', sans-serif;
  padding: 4px 8px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
.reset-link:hover { color: var(--text-1); background: rgba(54,50,45,0.06); }

/* ════════════════════════════════════════
   THE CARD
════════════════════════════════════════ */
.mc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: var(--card-pad);
  width: var(--card-w);
  height: var(--card-h);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  /* Border transition */
  transition: border-color 0.4s ease, box-shadow 0.4s ease;
}

/* State border treatments */
.mc-card.state-pending { border-color: rgba(21,148,239,0.45); box-shadow: 0 0 0 3px rgba(21,148,239,0.07); }
.mc-card.state-success { border-color: rgba(30,98,82,0.4);   box-shadow: 0 0 0 3px rgba(30,98,82,0.06); }
.mc-card.state-error   { border-color: rgba(193,60,45,0.4);  box-shadow: 0 0 0 3px rgba(193,60,45,0.06); }
.mc-card.state-partial { border-color: rgba(180,110,0,0.45); box-shadow: 0 0 0 3px rgba(180,110,0,0.07); }
.mc-card.state-confirm { border-color: rgba(180,110,0,0.45); box-shadow: 0 0 0 3px rgba(180,110,0,0.07); }

/* ── Progress bar track ── */
.progress-track {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(21,148,239,0.1);
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-track.visible { opacity: 1; }
.progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 0 2px 2px 0;
  transition: width 0s, background-color 0.3s;
}

/* ── Zone 1: Header ── */
.card-header {
  height: 36px; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.signal-dot {
  width: 9px; height: 9px; border-radius: 50%;
  flex-shrink: 0;
  background: rgba(54,50,45,0.22);
  transition: background 0.35s ease;
  position: relative;
}
/* Pulse ring when pending */
.signal-dot.pulsing::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid var(--blue);
  animation: ring-pulse 1s ease-out infinite;
  opacity: 0;
}
@keyframes ring-pulse {
  0%   { transform: scale(0.8); opacity: 0.7; }
  100% { transform: scale(1.8); opacity: 0; }
}
.dot-blue    { background: var(--blue) !important; }
.dot-green   { background: var(--green) !important; }
.dot-amber   { background: var(--amber) !important; }
.dot-red     { background: var(--red) !important; }

.card-title {
  flex: 1; font-size: 14px; font-weight: 600;
  letter-spacing: -0.28px; color: var(--text-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Badge */
.header-badge {
  flex-shrink: 0; font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 20px; letter-spacing: -0.1px;
  white-space: nowrap;
  transition: opacity 0.2s, transform 0.2s;
}
.badge-hidden  { visibility: hidden; padding: 3px 8px; }
.badge-ok      { background: var(--green-bg); color: var(--green); }
.badge-error   { background: var(--red-bg);   color: var(--red); }
.badge-pending { background: var(--blue-bg);  color: var(--blue-text); }
.badge-warn    { background: var(--amber-bg); color: var(--amber); }
.badge-partial { background: var(--partial-bg); color: var(--partial); }

/* ── Zone 2: Input slot (input cards only) ── */
.card-input-zone {
  height: 42px; flex-shrink: 0;
  display: flex; align-items: center;
  margin-bottom: 16px;
  position: relative;
}
.slot-input {
  width: 100%; height: 38px; padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: var(--input-radius);
  font-family: 'Inter', sans-serif;
  font-size: 13px; color: var(--text-3);
  background: transparent; outline: none;
  letter-spacing: -0.26px;
  transition: border-color 0.15s, color 0.15s;
  -moz-appearance: textfield;
}
.slot-input::-webkit-inner-spin-button,
.slot-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.slot-input:focus   { border-color: var(--blue); color: var(--text-1); }
.slot-input:disabled { opacity: 0.45; cursor: not-allowed; }
.slot-input.has-val  { color: var(--text-1); }

/* Pill that swaps into input slot on result states */
.slot-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 9px;
  font-size: 12px; font-weight: 500;
  transform-origin: left center;
  animation: pill-in 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pill-in {
  0%   { opacity: 0; transform: scale(0.82) translateY(4px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.pdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.pill-success { background: var(--green-bg); color: var(--green); }
.pill-error   { background: var(--red-bg);   color: var(--red); }
.pill-partial { background: var(--partial-bg); color: var(--partial); }
.pill-pending { background: var(--blue-bg);  color: var(--blue-text); }
.pill-warning { background: var(--amber-bg); color: var(--amber); }

/* ── Zone 3: Metric ── */
.card-metric-zone {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding-bottom: 4px;
}
.metric-row { display: flex; align-items: baseline; gap: 5px; line-height: 1; }

/* Input card: smaller number */
.mv-sm {
  font-family: 'DM Mono', monospace;
  font-size: 28px; font-weight: 400; letter-spacing: -0.5px;
  color: var(--text-1); line-height: 1;
  transition: color 0.3s;
}
.mv-sm-unit { font-size: 13px; font-weight: 600; color: var(--text-1); }

/* Metric card: large number */
.mv-lg {
  font-family: 'DM Mono', monospace;
  font-size: 52px; font-weight: 400; letter-spacing: -2px;
  color: var(--text-1); line-height: 1;
  transition: color 0.3s;
}
.mv-lg-unit { font-size: 20px; font-weight: 600; color: var(--text-1); }
.mv-word-sm { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300; letter-spacing: -0.5px; color: var(--text-1); line-height: 1; }
.mv-word-lg { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300; letter-spacing: -0.5px; color: var(--text-1); line-height: 1.15; }
.mv-muted   { color: var(--text-3) !important; }

.metric-sub { font-size: 12px; color: var(--text-3); letter-spacing: -0.2px; margin-top: 4px; transition: color 0.3s; }

/* ── Zone 4: Status line ── */
.card-status {
  height: 18px; flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; letter-spacing: -0.2px; overflow: hidden;
  margin-bottom: 10px;
  transition: opacity 0.2s;
}
.sk { color: var(--text-3); }
.sv { color: var(--text-2); font-weight: 500; transition: color 0.3s; }

/* ── Zone 5: Button ── */
.card-btn-zone {
  height: 44px; flex-shrink: 0;
  display: flex; gap: 8px;
  position: relative;
}
.mc-btn {
  flex: 1; height: 100%; border-radius: var(--btn-radius); border: none;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: -0.26px; cursor: pointer;
  transition: background 0.2s ease, opacity 0.15s, transform 0.1s, color 0.2s;
  position: relative; overflow: hidden;
}
/* Ripple effect on click */
.mc-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.2);
  transform: scale(0);
  border-radius: inherit;
  transition: transform 0.3s ease, opacity 0.3s;
  opacity: 0;
}
.mc-btn:active::after { transform: scale(1); opacity: 1; }
.mc-btn:active:not(:disabled) { transform: scale(0.98); }
.mc-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; }

.btn-primary  { background: var(--blue); color: #fff; }
.btn-primary:hover:not(:disabled) { opacity: 0.88; }
.btn-ghost    { background: transparent; color: var(--text-2); border: 1px solid var(--border-med); }
.btn-ghost:hover:not(:disabled) { border-color: var(--text-2); }
.btn-danger   { background: var(--red); color: #fff; }
.btn-danger:hover:not(:disabled) { opacity: 0.88; }
.btn-partial  { background: var(--partial-bg); color: var(--partial); border: 1px solid var(--partial-border); }
.btn-partial:hover:not(:disabled) { background: #fde9c0; }

/* ── Content swap animation ── */
/* Elements with this class animate in from below */
.anim-in {
  animation: anim-in 0.3s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes anim-in {
  0%   { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}
.anim-in-delay-1 { animation-delay: 0.04s; }
.anim-in-delay-2 { animation-delay: 0.09s; }
.anim-in-delay-3 { animation-delay: 0.14s; }
.anim-in-delay-4 { animation-delay: 0.20s; }

/* Confirm button split animation */
.confirm-split {
  animation: confirm-split-in 0.22s cubic-bezier(0.22,1,0.36,1) both;
}
.confirm-split:nth-child(2) { animation-delay: 0.05s; }
@keyframes confirm-split-in {
  0%   { opacity: 0; transform: translateY(6px) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Number count-down animation */
.counting { animation: count-tick 0.18s ease-out; }
@keyframes count-tick {
  0%   { transform: translateY(-6px); opacity: 0.4; }
  100% { transform: translateY(0);    opacity: 1; }
}
</style>
</head>
<body>

<div class="page-header">
  <h1>Manual Control — Interaction Prototype</h1>
  <p>Select a scenario, then interact with the card. Each card is independent.</p>
</div>

<div class="prototype-grid" id="grid"></div>

<script>
/* ════════════════════════════════════════
   CARD DEFINITIONS
════════════════════════════════════════ */
const CARD_DEFS = [
  {
    id: 'water',
    title: 'Turn on Water',
    hasInput: true,
    inputPlaceholder: 'Add Water (liters)',
    inputMax: 99,
    idleMetric: '32', idleUnit: 'L/min', idleMetricSub: 'Current Flow',
    idleStatusKey: 'Current Flow:', idleStatusVal: '--',
    idleBtnLabel: 'Turn on Water',
    scenarios: [
      { id:'success', label:'Full delivery',
        progressTo: 100, progressDuration: 1800, progressStall: null,
        resolve: (val) => ({
          dotClass:'dot-green', cardClass:'state-success',
          badge:{label:'Delivered', cls:'badge-ok'},
          inputContent:{type:'pill', label:`${val}L delivered`, cls:'pill-success'},
          metric:val, unit:'L/min', metricSub:'Current Flow',
          statusKey:'Confirmed:', statusVal:'just now',
          btn:{type:'single', label:'Turn on Water', cls:'btn-primary', disabled:true}
        })
      },
      { id:'partial', label:'Partial delivery',
        progressTo: 65, progressDuration: 1100, progressStall: 600,
        resolve: (val) => {
          const requested = parseInt(val) || 45;
          const delivered = Math.max(1, Math.floor(requested * 0.67));
          const short = requested - delivered;
          return {
            dotClass:'dot-amber', cardClass:'state-partial',
            badge:{label:`${short}L short`, cls:'badge-partial'},
            inputContent:{type:'pill', label:'Flow issue active', cls:'pill-partial'},
            metric:String(delivered), unit:'L/min', metricSub:`Delivered of ${requested}L`,
            statusKey:'Short by:', statusVal:`${short}L`,
            btn:{type:'single', label:`Add remaining ${short}L`, cls:'btn-partial', disabled:false}
          };
        }
      },
      { id:'error', label:'Command failed',
        progressTo: 40, progressDuration: 700, progressStall: null, retract: true,
        resolve: (val) => ({
          dotClass:'dot-red', cardClass:'state-error',
          badge:{label:'Failed', cls:'badge-error'},
          inputContent:{type:'input', val:val, locked:false},
          metric:'32', unit:'L/min', metricSub:'Current Flow',
          statusKey:'Requested:', statusVal:`${val}L`,
          btn:{type:'single', label:'Retry', cls:'btn-primary', disabled:false}
        })
      }
    ]
  },
  {
    id: 'ping',
    title: 'Ping Truck',
    hasInput: false,
    idleMetric: '2', idleUnit: 'min ago', idleMetricSub: 'Last Ping',
    idleStatusKey: 'System Status:', idleStatusVal: '1',
    idleBtnLabel: 'Ping Truck',
    scenarios: [
      { id:'success', label:'Responded',
        progressTo:100, progressDuration:1200, progressStall:null,
        resolve: () => ({
          dotClass:'dot-green', cardClass:'state-success',
          badge:{label:'Responded', cls:'badge-ok'},
          inputContent:{type:'pill', label:'Responded', cls:'pill-success'},
          metric:'0', unit:'s ago', metricSub:'Last Ping',
          statusKey:'System Status:', statusVal:'1',
          btn:{type:'single', label:'Ping Again', cls:'btn-primary', disabled:false}
        })
      },
      { id:'error', label:'No response',
        progressTo:80, progressDuration:1400, progressStall:800, stutter:true,
        resolve: () => ({
          dotClass:'dot-red', cardClass:'state-error',
          badge:{label:'No response', cls:'badge-error'},
          inputContent:{type:'pill', label:'Timed out', cls:'pill-error'},
          metric:'—', unit:'', metricSub:'No response',
          statusKey:'System Status:', statusVal:'—',
          btn:{type:'single', label:'Retry Ping', cls:'btn-primary', disabled:false}
        })
      }
    ]
  },
  {
    id: 'shutdown',
    title: 'Shut Down',
    hasInput: false,
    idleMetric: '10:32', idleUnit: 'AM', idleMetricSub: 'Last Attempt',
    idleStatusKey: 'Acknowledged:', idleStatusVal: 'Yes',
    idleBtnLabel: 'Shut Down',
    hasConfirm: true,
    scenarios: [
      { id:'success', label:'Acknowledged',
        progressTo:100, progressDuration:1500, progressStall:null,
        resolve: () => ({
          dotClass:'dot-green', cardClass:'state-success',
          badge:{label:'Acknowledged', cls:'badge-ok'},
          inputContent:{type:'pill', label:'Shutdown acknowledged', cls:'pill-success'},
          metric:'0', unit:'s ago', metricSub:'Last Attempt',
          statusKey:'Acknowledged:', statusVal:'Yes',
          btn:{type:'single', label:'Shut Down', cls:'btn-primary', disabled:false}
        })
      },
      { id:'error', label:'No response',
        progressTo:80, progressDuration:1300, progressStall:800, stutter:true,
        resolve: () => ({
          dotClass:'dot-red', cardClass:'state-error',
          badge:{label:'No response', cls:'badge-error'},
          inputContent:{type:'pill', label:'No response', cls:'pill-error'},
          metric:'—', unit:'', metricSub:'Last Attempt',
          statusKey:'Acknowledged:', statusVal:'No',
          btn:{type:'single', label:'Retry', cls:'btn-primary', disabled:false}
        })
      }
    ]
  },
  {
    id: 'flowreset',
    title: 'Reset Flow Error',
    hasInput: false,
    idleMetric: '3', idleUnit: '', idleMetricSub: 'Current Flow Error',
    idleStatusKey: 'Last Reset:', idleStatusVal: '10:32 AM',
    idleBtnLabel: 'Reset Flow Error',
    idleBadge: {label:'3 errors', cls:'badge-error'},
    idleDotClass: 'dot-red',
    idleCardClass: 'state-error',
    scenarios: [
      { id:'success', label:'Errors cleared',
        progressTo:100, progressDuration:1400, progressStall:null, countdown:true,
        resolve: () => ({
          dotClass:'dot-green', cardClass:'state-success',
          badge:{label:'Cleared', cls:'badge-ok'},
          inputContent:{type:'pill', label:'Errors cleared', cls:'pill-success'},
          metric:'0', unit:'', metricSub:'Current Flow Error',
          statusKey:'Last Reset:', statusVal:'just now',
          btn:{type:'single', label:'Reset Flow Error', cls:'btn-primary', disabled:false}
        })
      },
      { id:'error', label:'Reset failed',
        progressTo:50, progressDuration:900, progressStall:null, retract:true,
        resolve: () => ({
          dotClass:'dot-red', cardClass:'state-error',
          badge:{label:'3 errors', cls:'badge-error'},
          inputContent:{type:'pill', label:'Reset failed', cls:'pill-error'},
          metric:'3', unit:'', metricSub:'Current Flow Error',
          statusKey:'Last Reset:', statusVal:'Failed',
          btn:{type:'single', label:'Retry', cls:'btn-primary', disabled:false}
        })
      }
    ]
  }
];

/* ════════════════════════════════════════
   CARD STATE MANAGER
════════════════════════════════════════ */
class CardInstance {
  constructor(def, container) {
    this.def = def;
    this.container = container;
    this.activeScenarioIdx = 0;
    this.phase = 'idle'; // idle | confirm | pending | resolved
    this.inputVal = '';
    this.render();
  }

  get scenario() { return this.def.scenarios[this.activeScenarioIdx]; }

  selectScenario(idx) {
    this.activeScenarioIdx = idx;
    this.reset();
    this.updateScenarioBtns();
  }

  reset() {
    this.phase = 'idle';
    this.inputVal = '';
    this.render();
  }

  updateScenarioBtns() {
    const btns = this.container.querySelectorAll('.scenario-btn');
    btns.forEach((b, i) => {
      b.className = 'scenario-btn';
      if (i === this.activeScenarioIdx) {
        const sc = this.def.scenarios[i];
        if (sc.id === 'success') b.classList.add('active-success');
        else if (sc.id === 'partial') b.classList.add('active-partial');
        else b.classList.add('active-error');
      }
    });
  }

  /* ── Main render ── */
  render() {
    const card = this.container.querySelector('.mc-card');
    const def = this.def;

    if (this.phase === 'idle') {
      const isFlowReset = def.id === 'flowreset';
      card.className = `mc-card ${isFlowReset ? 'state-error' : ''}`;
      card.style.transition = 'border-color 0.4s ease, box-shadow 0.4s ease';
      /* Keep the progress track intact — only update the content wrapper */
      let content = card.querySelector('.card-content');
      if (!content) {
        content = document.createElement('div');
        content.className = 'card-content';
        content.style.cssText = 'display:contents;';
        card.appendChild(content);
      }
      content.innerHTML = this.buildIdleHTML();
      this.wireIdle();
    }
  }

  buildIdleHTML() {
    const def = this.def;
    const isFlowReset = def.id === 'flowreset';
    const badgeHTML = (def.idleBadge || isFlowReset)
      ? `<span class="header-badge badge-error anim-in anim-in-delay-1">${(def.idleBadge || {label:'3 errors'}).label}</span>`
      : `<span class="header-badge badge-hidden">–</span>`;

    const dotClass = isFlowReset ? 'dot-red' : '';

    const inputZoneHTML = def.hasInput
      ? `<div class="card-input-zone anim-in anim-in-delay-2">
          <input class="slot-input" type="number" min="1" max="${def.inputMax}" placeholder="${def.inputPlaceholder}" id="input-${def.id}" />
        </div>`
      : '';

    const metricClass = isNaN(def.idleMetric) && def.idleMetric !== '—'
      ? (def.hasInput ? 'mv-word-sm' : 'mv-word-lg')
      : (def.hasInput ? 'mv-sm' : 'mv-lg');
    const unitClass = def.hasInput ? 'mv-sm-unit' : 'mv-lg-unit';

    return `
      <div class="card-header">
        <div class="signal-dot ${dotClass} anim-in"></div>
        <span class="card-title anim-in anim-in-delay-1">${def.title}</span>
        ${badgeHTML}
      </div>
      ${inputZoneHTML}
      <div class="card-metric-zone anim-in anim-in-delay-2">
        <div class="metric-row">
          <span class="${metricClass}" id="metric-val-${def.id}">${def.idleMetric}</span>
          ${def.idleUnit ? `<span class="${unitClass}">${def.idleUnit}</span>` : ''}
        </div>
        <div class="metric-sub" id="metric-sub-${def.id}">${def.idleMetricSub}</div>
      </div>
      <div class="card-status anim-in anim-in-delay-3">
        <span class="sk">${def.idleStatusKey}</span>
        <span class="sv" id="status-val-${def.id}">${def.idleStatusVal}</span>
      </div>
      <div class="card-btn-zone anim-in anim-in-delay-4" id="btnzone-${def.id}">
        <button class="mc-btn btn-primary" id="main-btn-${def.id}" ${def.hasInput ? 'disabled' : ''}>
          ${def.idleBtnLabel}
        </button>
      </div>`;
  }

  wireIdle() {
    const def = this.def;

    if (def.hasInput) {
      const input = this.container.querySelector(`#input-${def.id}`);
      const btn   = this.container.querySelector(`#main-btn-${def.id}`);
      input.addEventListener('input', () => {
        let val = parseInt(input.value);
        if (input.value === '' || isNaN(val) || val < 1) {
          input.value = input.value === '' ? '' : '';
          input.classList.remove('has-val');
          btn.disabled = true;
          btn.style.background = '';
          btn.textContent = def.idleBtnLabel;
          this.inputVal = '';
        } else {
          if (val > def.inputMax) { val = def.inputMax; input.value = val; }
          input.classList.add('has-val');
          btn.disabled = false;
          btn.textContent = `Add ${val}L`;
          this.inputVal = val;
        }
      });
      btn.addEventListener('click', () => {
        if (!btn.disabled && this.inputVal) this.startPending();
      });
    } else if (def.hasConfirm) {
      const btn = this.container.querySelector(`#main-btn-${def.id}`);
      btn.addEventListener('click', () => this.showConfirm());
    } else {
      const btn = this.container.querySelector(`#main-btn-${def.id}`);
      btn.addEventListener('click', () => this.startPending());
    }
  }

  showConfirm() {
    this.phase = 'confirm';
    const card = this.container.querySelector('.mc-card');
    card.className = 'mc-card state-confirm';

    /* Update badge */
    const badge = card.querySelector('.header-badge');
    badge.className = 'header-badge badge-warn';
    badge.textContent = 'Confirm?';

    /* Dot */
    const dot = card.querySelector('.signal-dot');
    dot.className = 'signal-dot dot-amber';

    /* Swap input zone with pill */
    const inputZone = card.querySelector('.card-input-zone');
    if (inputZone) {
      inputZone.innerHTML = `<span class="slot-pill pill-warning"><span class="pdot"></span>Confirm before shutting down</span>`;
    }

    /* Split button */
    const btnZone = card.querySelector('.card-btn-zone');
    btnZone.innerHTML = `
      <button class="mc-btn btn-ghost confirm-split" id="cancel-btn-${this.def.id}">Cancel</button>
      <button class="mc-btn btn-danger confirm-split" id="confirm-btn-${this.def.id}">Yes, Shut Down</button>`;

    btnZone.querySelector(`#cancel-btn-${this.def.id}`)
      .addEventListener('click', () => this.reset());
    btnZone.querySelector(`#confirm-btn-${this.def.id}`)
      .addEventListener('click', () => this.startPending());
  }

  startPending() {
    this.phase = 'pending';
    const card  = this.container.querySelector('.mc-card');
    const sc    = this.scenario;
    const def   = this.def;

    /* Card border → pending */
    card.className = 'mc-card state-pending';

    /* Dot → pulsing blue */
    const dot = card.querySelector('.signal-dot');
    if (dot) { dot.className = 'signal-dot dot-blue pulsing'; }

    /* Badge → sending */
    const badge = card.querySelector('.header-badge');
    if (badge) { badge.className = 'header-badge badge-pending'; badge.textContent = 'Sending…'; }

    /* Disable button — btnZone may be the confirm split, replace it */
    const btnZone = card.querySelector('.card-btn-zone');
    if (btnZone) {
      btnZone.innerHTML = `<button class="mc-btn btn-primary" disabled>Sending…</button>`;
    }

    /* Lock input if present */
    const input = card.querySelector('.slot-input');
    if (input) input.disabled = true;

    /* Metric sub → pending label */
    const metricSub = card.querySelector('.metric-sub');
    if (metricSub && !def.hasInput) metricSub.textContent = 'Sending…';

    /* Animate progress bar — track/fill are always in the permanent shell */
    const track = card.querySelector('.progress-track');
    const fill  = card.querySelector('.progress-fill');
    if (!track || !fill) { this.resolveCard(); return; }

    track.classList.add('visible');
    fill.style.background = '#1594ef';
    fill.style.transition = 'none';
    fill.style.width = '0%';

    if (sc.retract) {
      /* Retract: fill to target then pull back */
      setTimeout(() => {
        fill.style.transition = `width ${sc.progressDuration}ms cubic-bezier(0.4,0,0.6,1)`;
        fill.style.width = sc.progressTo + '%';
        setTimeout(() => {
          fill.style.transition = 'width 0.5s cubic-bezier(0.4,0,1,1)';
          fill.style.background = '#c13c2d';
          fill.style.width = '0%';
          setTimeout(() => {
            track.classList.remove('visible');
            this.resolveCard();
          }, 520);
        }, sc.progressDuration + 100);
      }, 20);

    } else if (sc.stutter) {
      /* Stutter then stop */
      setTimeout(() => {
        fill.style.transition = `width ${sc.progressDuration}ms cubic-bezier(0.4,0,0.2,1)`;
        fill.style.width = sc.progressTo + '%';
        setTimeout(() => {
          /* Stutter */
          fill.style.transition = 'width 0.1s ease';
          fill.style.width = (sc.progressTo - 3) + '%';
          setTimeout(() => {
            fill.style.width = (sc.progressTo + 1) + '%';
            setTimeout(() => {
              fill.style.width = (sc.progressTo - 1) + '%';
              setTimeout(() => {
                /* Hold then resolve */
                setTimeout(() => {
                  track.classList.remove('visible');
                  this.resolveCard();
                }, sc.progressStall);
              }, 100);
            }, 100);
          }, 100);
        }, sc.progressDuration);
      }, 20);

    } else {
      /* Normal fill to completion */
      setTimeout(() => {
        fill.style.transition = `width ${sc.progressDuration}ms cubic-bezier(0.4,0,0.2,1)`;
        fill.style.width = sc.progressTo + '%';
        setTimeout(() => {
          /* Brief pause at full, then resolve */
          setTimeout(() => {
            track.classList.remove('visible');
            this.resolveCard();
          }, 200);
        }, sc.progressDuration);
      }, 20);
    }
  }

  resolveCard() {
    this.phase = 'resolved';
    const sc   = this.scenario;
    const def  = this.def;
    const card = this.container.querySelector('.mc-card');
    const result = sc.resolve(this.inputVal);

    /* Handle countdown for flow reset */
    if (sc.countdown && def.id === 'flowreset' && result.metric === '0') {
      this.applyResult(result, card, true);
    } else {
      this.applyResult(result, card, false);
    }
  }

  applyResult(result, card, countdown) {
    const def = this.def;

    /* Card border */
    card.className = `mc-card ${result.cardClass}`;

    /* Dot */
    const dot = card.querySelector('.signal-dot');
    dot.className = `signal-dot ${result.dotClass}`;
    dot.classList.remove('pulsing');

    /* Badge */
    const badge = card.querySelector('.header-badge');
    badge.className = `header-badge ${result.badge.cls}`;
    badge.textContent = result.badge.label;

    /* Input zone */
    const inputZone = card.querySelector('.card-input-zone');
    if (inputZone) {
      if (result.inputContent.type === 'pill') {
        inputZone.innerHTML = `<span class="slot-pill ${result.inputContent.cls}"><span class="pdot"></span>${result.inputContent.label}</span>`;
      } else if (result.inputContent.type === 'input') {
        inputZone.innerHTML = `<input class="slot-input has-val" type="number" value="${result.inputContent.val}" ${result.inputContent.locked ? 'disabled' : ''} />`;
      }
    } else if (!def.hasInput && result.inputContent.type === 'pill') {
      /* Metric cards: pill appears above metric */
      const mzone = card.querySelector('.card-metric-zone');
      const pillWrap = document.createElement('div');
      pillWrap.style.marginBottom = '6px';
      pillWrap.innerHTML = `<span class="slot-pill ${result.inputContent.cls}"><span class="pdot"></span>${result.inputContent.label}</span>`;
      mzone.insertBefore(pillWrap, mzone.firstChild);
    }

    /* Metric value */
    const metricEl = card.querySelector('[class*="mv-"]');
    if (metricEl) {
      if (countdown) {
        this.countDown(metricEl, 3, 0);
      } else {
        const oldVal = metricEl.textContent;
        if (oldVal !== result.metric) {
          metricEl.style.opacity = '0';
          metricEl.style.transform = 'translateY(-8px)';
          metricEl.style.transition = 'opacity 0.15s, transform 0.15s';
          setTimeout(() => {
            metricEl.textContent = result.metric;
            if (result.metric === '—') metricEl.classList.add('mv-muted');
            metricEl.style.transition = 'opacity 0.25s, transform 0.25s';
            metricEl.style.opacity = '1';
            metricEl.style.transform = 'translateY(0)';
          }, 160);
        }
      }
    }

    /* Metric sub */
    const metricSub = card.querySelector('.metric-sub');
    if (metricSub) {
      setTimeout(() => {
        metricSub.style.opacity = '0';
        setTimeout(() => {
          metricSub.textContent = result.metricSub;
          metricSub.style.transition = 'opacity 0.2s';
          metricSub.style.opacity = '1';
        }, 120);
      }, 200);
    }

    /* Status line */
    const sv = card.querySelector('.sv');
    if (sv && result.statusKey) {
      const sk = card.querySelector('.sk');
      if (sk) sk.textContent = result.statusKey;
      setTimeout(() => {
        sv.style.opacity = '0';
        setTimeout(() => {
          sv.textContent = result.statusVal;
          sv.style.transition = 'opacity 0.2s';
          sv.style.opacity = '1';
        }, 100);
      }, 300);
    }

    /* Button */
    const btnZone = card.querySelector('.card-btn-zone');
    setTimeout(() => {
      btnZone.style.opacity = '0';
      btnZone.style.transform = 'translateY(4px)';
      btnZone.style.transition = 'opacity 0.15s, transform 0.15s';
      setTimeout(() => {
        btnZone.innerHTML = `<button class="mc-btn ${result.btn.cls}" ${result.btn.disabled ? 'disabled' : ''}>${result.btn.label}</button>`;
        btnZone.style.transition = 'opacity 0.25s, transform 0.25s';
        btnZone.style.opacity = '1';
        btnZone.style.transform = 'translateY(0)';
      }, 160);
    }, 180);
  }

  countDown(el, from, to) {
    let current = from;
    const tick = () => {
      if (current <= to) return;
      current--;
      el.classList.remove('counting');
      void el.offsetWidth; /* reflow to restart animation */
      el.classList.add('counting');
      el.textContent = current;
      setTimeout(tick, current === 0 ? 0 : 320);
    };
    setTimeout(tick, 100);
  }
}

/* ════════════════════════════════════════
   BUILD THE PAGE
════════════════════════════════════════ */
const grid = document.getElementById('grid');
const instances = {};

CARD_DEFS.forEach(def => {
  const unit = document.createElement('div');
  unit.className = 'card-unit';

  /* Scenario selector */
  const selector = document.createElement('div');
  selector.className = 'scenario-selector';
  def.scenarios.forEach((sc, i) => {
    const btn = document.createElement('button');
    btn.className = 'scenario-btn';
    btn.textContent = sc.label;
    btn.addEventListener('click', () => inst.selectScenario(i));
    selector.appendChild(btn);
  });

  /* Card element */
  const cardEl = document.createElement('div');
  cardEl.innerHTML = `
    <div class="mc-card">
      <div class="progress-track"><div class="progress-fill"></div></div>
    </div>`;

  /* Reset button */
  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-link';
  resetBtn.textContent = '↺ Reset';
  resetBtn.addEventListener('click', () => inst.reset());

  unit.appendChild(selector);
  unit.appendChild(cardEl);
  unit.appendChild(resetBtn);
  grid.appendChild(unit);

  const inst = new CardInstance(def, unit);
  instances[def.id] = inst;

  /* Activate first scenario btn */
  inst.updateScenarioBtns();
});
</script>
