<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920" />
  <title>Verifi — Load Reports</title>

  <!-- Fonts: Inter for everything per the Figma spec -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Icons are inlined as an SVG sprite at the top of <body> so they
       render even when external CDNs are blocked. -->

  <style>
    /* =======================================================================
       Tokens (mapped from Figma — Grey Concrete, Grey Steel, Black Concrete,
       Grey Cloud, etc. The active-tab accent is the blue underline #0965a3.)
       ======================================================================= */
    :root {
      --bg-page:           #26282b;     /* page background (matches sidebar) */
      --bg-sidebar:        #26282b;     /* sidebar */
      --bg-table:          #26282b;     /* table surface (matches page) */
      --row-even:          #26282b;     /* odd rows (1st, 3rd, ...) */
      --row-odd:           #1c1c1e;     /* even rows (2nd, 4th, ...) */
      --border-steel:      #a8aeb5;     /* table grid + group lines */
      --text-strong:       #ffffff;     /* primary text */
      --text-muted:        #a8aeb5;     /* secondary / labels */
      --text-cell:         #ededed;     /* row cell text */
      --accent-blue:       #0965a3;     /* active tab underline */
      --nav-hover:         rgba(255, 255, 255, 0.04);

      --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      color: var(--text-strong);
      font-family: var(--font-sans);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-width: 1280px;
    }

    /* =======================================================================
       App shell — sidebar on the left, everything else stacks to the right.
       ======================================================================= */
    .app {
      display: grid;
      grid-template-columns: 96px 1fr;
      min-height: 100vh;
    }

    /* ---------------- Sidebar ---------------- */
    .sidebar {
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 24px 0 16px;
      gap: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      width: 96px;
    }
    .logo {
      width: 64px;
      height: auto;
      margin: 0 auto 24px;
      color: var(--text-strong);
      display: block;
    }
    .logo path { fill: currentColor; }

    /* Region header (Ozinga South Florida) — non-interactive, pin + label,
       with a divider underneath separating it from the nav items. */
    .region-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 4px 6px 16px;
      color: var(--text-strong);
      border-bottom: 1px solid rgba(168, 174, 181, 0.18);
      margin-bottom: 12px;
    }
    .region-header .icon {
      width: 22px;
      height: 22px;
      color: var(--text-strong);
      display: block;
    }
    .region-header .label {
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      line-height: 1.25;
      color: var(--text-strong);
    }

    .nav-item {
      width: 100%;
      padding: 12px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      text-align: center;
      line-height: 1.25;
      transition: color 120ms ease, background 120ms ease;
    }
    .nav-item .icon {
      width: 22px;
      height: 22px;
      color: currentColor;
      display: block;
    }
    /* Path-level fills inherit current color so monochrome filled icons
       follow the muted → white state change. */
    .nav-item .icon path,
    .nav-item .icon rect,
    .nav-item .icon circle { fill: currentColor; }

    .nav-item:hover { color: var(--text-strong); background: var(--nav-hover); }
    .nav-item.active { color: var(--text-strong); font-weight: 700; }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      background: var(--text-strong);
      border-radius: 0 2px 2px 0;
    }

    /* ---------------- Main column ----------------
       min-width:0 is critical: without it, a grid item sizes to its widest
       child (the table). With it, the column respects the viewport width
       and only the table-wrap inside scrolls horizontally. */
    .main {
      padding: 32px 40px 24px;
      min-width: 0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Tabs row */
    .tabs {
      display: flex;
      align-items: flex-end;
      gap: 40px;
      border-bottom: 1px solid transparent; /* underline lives on .tab.active */
      padding-bottom: 0;
      margin-bottom: 28px;
      position: relative;
    }
    .tab {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-muted);
      padding-bottom: 14px;
      cursor: pointer;
      position: relative;
      transition: color 120ms ease;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text-strong); }
    .tab.active {
      color: var(--text-strong);
      font-weight: 700;
    }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 3px;
      background: var(--accent-blue);
      border-radius: 2px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(168, 174, 181, 0.25);
      border-radius: 6px;
      padding: 6px 12px;
      width: 240px;
      color: var(--text-muted);
    }
    .search .icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .search input {
      background: transparent;
      border: 0;
      outline: none;
      color: var(--text-strong);
      font-family: var(--font-sans);
      font-size: 13px;
      flex: 1;
      min-width: 0;
    }
    .search input::placeholder { color: var(--text-muted); }
    .toolbar .item-count {
      color: var(--text-muted);
      font-size: 13px;
    }
    .toolbar .spacer { flex: 1; }

    .icon-btn {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: transparent;
      border: 0;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    .icon-btn:hover { background: var(--nav-hover); color: var(--text-strong); }
    .icon-btn .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .pager .icon-btn .icon { width: 16px; height: 16px; }

    .preset-wrap { position: relative; }
    .preset-select {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 200px;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid rgba(168, 174, 181, 0.25);
      border-radius: 6px;
      color: var(--text-strong);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .preset-select .icon {
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 160ms ease;
    }
    .preset-wrap.open .preset-select .icon { transform: rotate(180deg); }

    .preset-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 260px;
      background: #b0b3b8;
      border-radius: 4px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      padding: 0;
      display: none;
      z-index: 100;
      overflow: hidden;
    }
    .preset-wrap.open .preset-menu { display: block; }
    .preset-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      padding: 14px 18px;
      color: #1c1c1e;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    .preset-option:hover { background: rgba(0, 0, 0, 0.06); }
    .preset-option .check {
      width: 18px;
      height: 18px;
      stroke: #e91e63;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
    }
    .preset-option.active .check { opacity: 1; }

    /* =======================================================================
       Table.

       Note: the Figma is built as a fixed 1760px-wide table with hand-set
       column widths. I'm matching those widths so the column groupings
       (Batch Information / At Plant / At Arrival / Discharge / Customer)
       line up cleanly. The container scrolls horizontally on smaller viewports.
       ======================================================================= */
    .table-wrap {
      background: var(--bg-table);
      border-radius: 6px;
      overflow-x: auto;
      overflow-y: auto;
      flex: 1 1 auto;
      min-height: 0;
    }
    table.report {
      /* `separate` (not `collapse`) is required for borders on position:sticky
         cells to render reliably. With collapse, the border belongs to the
         table grid and gets dropped when sticky cells detach during scroll. */
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-family: var(--font-sans);
    }
    /* QC view: width = sum of col widths, scrolls horizontally if needed. */
    table.report.preset-qc { width: max-content; min-width: 100%; }
    /* Default view: fill the page. The last col has width:auto, so it stretches. */
    table.report.preset-default { width: 100%; }

    /* =======================================================================
       Default-view cell formats
       ======================================================================= */

    /* Default/Dispatch/Production views: non-uppercase, lighter weight cells. */
    table.report.preset-default tbody td {
      text-transform: none;
      font-weight: 500;
      letter-spacing: 0;
    }

    /* Stacked time: 08:33 AM (white, bold) + GMT badge + 05/12/2026 (muted) */
    .cell-time { line-height: 1.3; }
    .cell-time .row1 { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .cell-time .time { color: var(--text-strong); font-weight: 700; font-size: 13px; }
    .cell-time .tz   { color: var(--text-muted);  font-size: 10px; font-weight: 500; letter-spacing: 0.04em; }
    .cell-time .date { color: var(--text-muted);  font-size: 12px; margin-top: 2px; }

    /* Location: bold white */
    td.cell-location { color: var(--text-strong); font-weight: 700; }

    /* Customer / order / mix code: muted */
    td.cell-muted { color: var(--text-muted); }

    /* Size with yd³ superscript */
    td.cell-size { color: var(--text-strong); font-weight: 700; }
    td.cell-size sup { font-size: 9px; vertical-align: super; line-height: 1; }

    /* Status pills */
    .status-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1.2;
    }
    .status-pill.to-job { background: #2f8d6e; }
    .status-pill.loaded { background: #d4a017; color: #1c1c1e; }
    .status-pill.onsite { background: #7c5cc4; }

    /* Stacked slump: 0.75 in (white) / 5.00 in (muted) */
    .cell-slump { line-height: 1.3; }
    .cell-slump .current { color: var(--text-strong); font-weight: 700; font-size: 13px; }
    .cell-slump .current.dash { color: var(--text-muted); }
    .cell-slump .ticketed { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

    /* Group header row spans (Batch Information / At Plant / etc.).
       border-bottom now renders correctly because table uses border-collapse:separate. */
    .group-row th {
      text-align: left;
      vertical-align: middle;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.33;
      padding: 10px;
      border-bottom: 1px solid var(--border-steel);
      border-right: 1px solid var(--border-steel);
      background: var(--bg-table);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .group-row th:last-child { border-right: 0; }

    /* Clickable group headers (the ones with a chevron). */
    .group-row th.expandable {
      cursor: pointer;
      user-select: none;
      transition: color 120ms ease, background 120ms ease;
    }
    .group-row th.expandable:hover {
      color: var(--text-strong);
      background: rgba(255, 255, 255, 0.02);
    }
    .group-row th.expandable:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: -2px;
    }

    /* Chevron — inline SVG from Figma (9×15, fill #A8AEB5).
       Rotates 90° on expand. */
    .group-row .chev {
      float: right;
      width: 9px;
      height: 15px;
      margin-top: 4px;
      transition: transform 160ms ease;
      display: inline-block;
      flex-shrink: 0;
    }
    .group-row .chev path { fill: var(--text-muted); }
    .group-row th.expandable:hover .chev path { fill: var(--text-strong); }
    .group-row th.expanded .chev { transform: rotate(90deg); }

    /* Column header row (DATE / TIME / TICKETS / ...) */
    .col-row th {
      text-align: left;
      vertical-align: bottom;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 12px;
      line-height: 14px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      padding: 14px 10px 10px;
      border-bottom: 0;
      background: var(--bg-table);
      position: sticky;
      z-index: 2;
    }
    /* QC: col row sticks right under the group row. No overlap needed because
       border-collapse:separate keeps the group row's border-bottom in place. */
    .preset-qc .col-row th { top: 44px; }
    .preset-default .col-row th { top: 0; }
    .col-row th.divider-right { border-right: 1px solid var(--border-steel); }
    .col-row th sup {
      font-size: 7.74px;
      vertical-align: super;
      line-height: 1;
    }
    .col-row th .two-line {
      display: block;
      line-height: 14px;
      white-space: nowrap;
    }

    /* Body rows */
    tbody td {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      line-height: 14px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--text-cell);
      vertical-align: middle;
      white-space: nowrap;
    }
    tbody td.divider-right { border-right: 1px solid var(--border-steel); }

    /* Zebra striping. */
    tbody tr:nth-child(odd)  { background-color: var(--row-even); }
    tbody tr:nth-child(even) { background-color: var(--row-odd); }
    tbody tr:hover { background-color: rgba(255, 255, 255, 0.04); }

    /* Customer name now carries a tooltip with the address. */
    .customer-cell {
      position: relative;
      cursor: help;
    }
    .customer-cell .addr-tooltip {
      position: absolute;
      left: 0;
      top: calc(100% + 4px);
      background: #1c1c1e;
      border: 1px solid rgba(168, 174, 181, 0.25);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-strong);
      white-space: pre-line;
      min-width: 180px;
      max-width: 260px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-2px);
      transition: opacity 120ms ease, transform 120ms ease, visibility 120ms;
      pointer-events: none;
      z-index: 20;
    }
    .customer-cell .addr-tooltip::before {
      content: "ADDRESS";
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .customer-cell:hover .addr-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* Column widths are applied inline by JS from the GROUPS config so the
       widths follow the active (collapsed vs expanded) column set. */

    /* =======================================================================
       Footer / pagination
       ======================================================================= */
    .table-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 24px;
      padding-top: 14px;
      flex: 0 0 auto;
    }
    .records-label {
      font-size: 14px;
      letter-spacing: -0.28px;
      color: #a4a5a6;
      line-height: 1.3;
    }
    .pager { display: inline-flex; gap: 8px; }
    .pager .icon-btn { width: 32px; height: 32px; }
    .pager .icon-btn.disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- ============================================================
       SVG icon sprite. Defined once, referenced via <use href="#id"/>.
       All icons are 24x24 viewBox, Lucide-style line icons that match
       the visual weight of the Remix icons used in the Figma.
       ============================================================ -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- Sidebar (filled-style icons to match Figma) -->
      <!-- Region header pin -->
      <symbol id="i-pin" viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z" fill="currentColor"/></symbol>
      <!-- Dashboards: house outline -->
      <symbol id="i-dashboards" viewBox="0 0 24 24"><path d="M21 19.9998C21 20.265 20.8946 20.5194 20.7071 20.7069C20.5196 20.8944 20.2652 20.9998 20 20.9998H4C3.73478 20.9998 3.48043 20.8944 3.29289 20.7069C3.10536 20.5194 3 20.265 3 19.9998V9.48978C2.99989 9.3374 3.03462 9.187 3.10152 9.05008C3.16841 8.91317 3.26572 8.79335 3.386 8.69978L11.386 2.47778C11.5615 2.34123 11.7776 2.26709 12 2.26709C12.2224 2.26709 12.4385 2.34123 12.614 2.47778L20.614 8.69978C20.7343 8.79335 20.8316 8.91317 20.8985 9.05008C20.9654 9.187 21.0001 9.3374 21 9.48978V19.9998ZM19 18.9998V9.97778L12 4.53378L5 9.97778V18.9998H19Z" fill="currentColor"/></symbol>
      <!-- My Fleet: map with pin -->
      <symbol id="i-fleet" viewBox="0 0 24 24"><path d="M2 5l6-2 8 2 6-2v16l-6 2-8-2-6 2V5zm6 0v14l8 2V7L8 5zm-2 .35L4 6v13.5l2-.66V5.35zm14 13.3V5.15l-2 .66v13.34l2-.5z" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/></symbol>
      <!-- Production: bar chart in rounded square -->
      <symbol id="i-production" viewBox="0 0 24 24"><path d="M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h14V5H5zm3 8h2v4H8v-4zm4-4h2v8h-2V9zm4 2h2v6h-2v-6z" fill="currentColor"/></symbol>
      <!-- Mixtures: wrench in circle -->
      <symbol id="i-mixtures" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm3.5-12.5a3 3 0 0 0-4.24 4.24l-3.06 3.06 1.41 1.41 3.06-3.06a3 3 0 0 0 4.24-4.24l-1.42 1.42-1.41-1.41 1.42-1.42Z" fill="currentColor"/></symbol>
      <!-- Tickets: ID/list card -->
      <symbol id="i-tickets" viewBox="0 0 24 24"><path d="M4 4h16a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm1 2v12h14V6H5zm2 2h2v2H7V8zm4 0h6v2h-6V8zm-4 4h2v2H7v-2zm4 0h6v2h-6v-2zm-4 4h2v2H7v-2zm4 0h6v2h-6v-2z" fill="currentColor"/></symbol>
      <!-- Diagnostic Center: signal/heartbeat in magnifier -->
      <symbol id="i-diagnostic" viewBox="0 0 24 24"><path d="M11 4a7 7 0 1 0 4.18 12.61l4.1 4.1 1.42-1.42-4.1-4.1A7 7 0 0 0 11 4Zm0 2a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm-3 5h1.5l1-2 2 4 1-2H14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <!-- Data Insights: sparkles/trend -->
      <symbol id="i-insights" viewBox="0 0 24 24"><path d="M3 17l5-5 4 4 8-8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 8h4v4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 3l.6 1.4L20 5l-1.4.6L18 7l-.6-1.4L16 5l1.4-.6L18 3z" fill="currentColor"/></symbol>

      <!-- Toolbar -->
      <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></symbol>
      <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></symbol>
      <symbol id="i-filter" viewBox="0 0 24 24"><path d="M3 5h18M6 12h12M10 19h4"/></symbol>
      <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></symbol>
      <symbol id="i-chevron-down" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></symbol>

    function pick(arr, i) { return arr[i % arr.length]; }
    function pad2(n) { return String(n).padStart(2, "0"); }

    const qcRows = Array.from({ length: ROW_COUNT }, (_, i) => {
      // Time rolls back 4-7 mins per row from a 03:35 PM start.
      const startMin = 15*60 + 35; // 03:35 PM in minutes since midnight
      const offset = i * 5 + (i * 7) % 4;
      const total = startMin - offset;
      const hours24 = Math.floor((total + 24*60) / 60) % 24;
      const mins    = ((total % 60) + 60) % 60;
      const ampm    = hours24 >= 12 ? "PM" : "AM";
      const hh12    = ((hours24 + 11) % 12) + 1;

      // Date rolls back by 1 day every ~12 rows to give a few days of variety.
      const baseDate = new Date(2026, 3, 6); // 04-06-2026
      baseDate.setDate(baseDate.getDate() - Math.floor(i / 12));

      // Ticket: monotonically decrementing so the order looks like a log.
      const ticket = (41127364 - i * 23).toString();

      return Object.assign({}, sampleRow, {

        time:         `${pad2(hh12)}:${pad2(mins)} ${ampm}`,

        driver:       pick(QC_DRIVERS, i * 3 + 1),
        mixId:        pick(QC_MIX_IDS, i * 2 + 5),

        // Roll the time backwards by a few minutes each cycle.
        const totalMinutes = minuteOffset + Math.floor(defaultRows.length / base.length) * 47;
        const baseDate = new Date(2026, 4, 12, 8, 8); // last row's clock
        baseDate.setMinutes(baseDate.getMinutes() - totalMinutes);
        const hh = baseDate.getHours();
        const mm = baseDate.getMinutes();
        const ampm = hh >= 12 ? "PM" : "AM";
        const hh12 = ((hh + 11) % 12) + 1;
        const timeStr = `${String(hh12).padStart(2,"0")}:${String(mm).padStart(2,"0")} ${ampm}`;
        defaultRows.push(Object.assign({}, src, {
          time: timeStr,
          tickets: String(parseInt(src.tickets, 10) - (defaultRows.length * 17))
        }));
        minuteOffset += 3;
      }
    })();

    // ===================================================================
    // Presets
    // -------------------------------------------------------------------
    // "qc" preset = the grouped Quality Control View (Batch Information,
    //   At Plant, At Arrival, Discharge, Customer) with expandable groups.
    // "default" preset = a flat 10-column list with no group headers.
    // ===================================================================

    const DEFAULT_COLUMNS = [
      { key: "time",          label: "Time",                    w: 140 },
      { key: "tickets",       label: "Ticket Number",           w: 130 },
      { key: "truck",         label: "Truck",                   w: 90  },
      { key: "location",      label: "Location",                w: 160 },
      { key: "customerName",  label: "Customer",                w: 220 },
      { key: "order",         label: "Order",                   w: 90  },
      { key: "mixCode",       label: "Mix Code",                w: 120 },
      { key: "size",          label: "Size",                    w: 100 },
      { key: "status",        label: "Status",                  w: 120 },
      { key: "currentSlump",  label: "Current / Ticketed Slump", w: 200 } // explicit min so header never clips
    ];

    const DISPATCH_COLUMNS = [
      { key: "time",          label: "Time",          w: 160 },
      { key: "tickets",       label: "Ticket",        w: 140 },
      { key: "truck",         label: "Truck",         w: 130 },
      { key: "location",      label: "Location",      w: 200 },
      { key: "order",         label: "Order",         w: 130 },
      { key: "size",          label: "Size",          w: 130 },
      { key: "mixCode",       label: "Mix Code",      w: 150 },
      { key: "status",        label: "Status",        w: 130 },
      { key: "ticketedSlump", label: "Ticketed Slump", w: null }
    ];

    const PRODUCTION_COLUMNS = [
      { key: "time",            label: "Time",              w: 160 },
      { key: "tickets",         label: "Ticket",            w: 130 },
      { key: "truck",           label: "Truck",             w: 110 },
      { key: "driver",          label: "Driver",            w: 220 },
      { key: "location",        label: "Location",          w: 180 },
      { key: "mixCode",         label: "Mix Code",          w: 140 },
      { key: "ticketedSlump",   label: "Ticketed Slump",    w: 150 },
      { key: "prodInitialSlump",label: "Initial Slump",     w: 140 },
      { key: "leavePlantSlump", label: "Leave Plant Slump", w: null }
    ];

    let currentPreset = "default"; // start in Default view

    // ===================================================================
    // Render
    // ===================================================================
    const colgroupEl = document.getElementById("report-colgroup");
    const theadEl    = document.getElementById("report-thead");
    const bodyEl     = document.getElementById("report-body");

    function activeColumns(group) {
      return (group.expandable && group.expanded && group.expanded_columns)
        ? group.expanded_columns
        : group.collapsed;
    }

    function renderHeaderLabel(label) {
      if (Array.isArray(label)) {
        return label.map(l => `<span class="two-line">${l}</span>`).join("");
      }
      return label;
    }

    const tableEl    = document.getElementById("report-table");

    function render() {
      tableEl.classList.toggle("preset-default", currentPreset !== "qc");
      tableEl.classList.toggle("preset-qc",      currentPreset === "qc");
      if (currentPreset === "qc") {
        renderGrouped();
      } else if (currentPreset === "dispatch") {
        renderDispatch();
      } else if (currentPreset === "production") {
        renderProduction();
      } else {
        renderFlat();
      }
    }

    // ----------- QC View: grouped headers with expandable groups -----------
    function renderGrouped() {
      // Flatten all currently-visible columns across groups (in order)
      const flatCols = [];
      GROUPS.forEach(g => {
        activeColumns(g).forEach(c => flatCols.push({ group: g, col: c }));
      });

      // 1. <colgroup> — sets the width for each visible column
      colgroupEl.innerHTML = flatCols.map(({ col }) =>
        col.w == null ? `<col />` : `<col style="width:${col.w}px" />`
      ).join("");

      // 2. <thead> — group row + column row
      const groupRow = GROUPS.map(g => {
        const span = activeColumns(g).length;
        const isExpandable = g.expandable && g.expanded_columns; // only if we actually have an expanded set
        const cls = [
          isExpandable ? "expandable" : "",
          g.expanded   ? "expanded"   : ""
        ].filter(Boolean).join(" ");
        const chev = g.expandable
          ? `<svg class="chev" viewBox="0 0 9 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
               <path d="M7.71094 6.30469C8.11719 6.67969 8.11719 7.33594 7.71094 7.71094L1.71094 13.7109C1.33594 14.1172 0.679688 14.1172 0.304688 13.7109C-0.101562 13.3359 -0.101562 12.6797 0.304688 12.3047L5.58594 6.99219L0.304688 1.71094C-0.101562 1.33594 -0.101562 0.679688 0.304688 0.304688C0.679688 -0.101562 1.33594 -0.101562 1.71094 0.304688L7.71094 6.30469Z"/>
             </svg>`
          : "";
        const attrs = isExpandable
          ? `role="button" tabindex="0" aria-expanded="${g.expanded}" data-group="${g.id}"`
          : "";
        return `<th colspan="${span}" class="${cls}" ${attrs}>${g.title} ${chev}</th>`;
      }).join("");

      const colRow = flatCols.map(({ col }) => {
        const divider = col.dividerRight ? " divider-right" : "";
        return `<th class="${divider.trim()}">${renderHeaderLabel(col.label)}</th>`;
      }).join("");

      theadEl.innerHTML = `
        <tr class="group-row">${groupRow}</tr>
        <tr class="col-row">${colRow}</tr>
      `;

      // 3. <tbody>
      bodyEl.innerHTML = qcRows.map(r => {
        const cells = flatCols.map(({ col }) => {
          const divider = col.dividerRight ? " divider-right" : "";
          const raw     = r[col.key] ?? "";
          // Customer name gets a hover tooltip showing the address.
          if (col.key === "customerName") {
            const addrHtml = (r.customerAddr || "").replace(/\n/g, "<br>");
            return `<td class="${divider.trim()}">
              <span class="customer-cell">
                ${raw}
                <span class="addr-tooltip">${addrHtml}</span>
              </span>
            </td>`;
          }
          return `<td class="${divider.trim()}">${raw}</td>`;
        }).join("");
        return `<tr>${cells}</tr>`;
      }).join("");

      // 4. Hook up clicks/keyboard on expandable group headers
      theadEl.querySelectorAll("th.expandable").forEach(th => {
        th.addEventListener("click", onToggle);
        th.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            onToggle.call(th);
          }
        });
      });
    }

    // ----------- Production View: Time, Ticket, Truck, Driver, Location, Mix Code, slumps -----------
    function renderProduction() {
      colgroupEl.innerHTML = PRODUCTION_COLUMNS.map(col =>
        col.w == null ? `<col />` : `<col style="width:${col.w}px" />`
      ).join("");

      const colRow = PRODUCTION_COLUMNS.map(col =>
        `<th>${renderHeaderLabel(col.label)}</th>`
      ).join("");

      theadEl.innerHTML = `<tr class="col-row">${colRow}</tr>`;

      bodyEl.innerHTML = defaultRows.map(r => `
        <tr>
          <td>
            <div class="cell-time">
              <div class="row1">
                <span class="time">${r.time}</span>
                <span class="tz">${r.tz}</span>
              </div>
              <div class="date">${r.date}</div>
            </div>
          </td>
          <td class="cell-muted">${r.tickets}</td>
          <td class="cell-muted">${r.truck}</td>
          <td class="cell-muted">${r.driver}</td>
          <td class="cell-location">${r.location}</td>
          <td class="cell-muted">${r.mixCode}</td>
          <td class="cell-location">${r.ticketedSlump}</td>
          <td class="cell-location">${r.prodInitialSlump}</td>
          <td class="cell-location">${r.leavePlantSlump}</td>
        </tr>
      `).join("");
    }

    // ----------- Dispatch View: flat columns, no Customer, single slump -----------
    function renderDispatch() {
      colgroupEl.innerHTML = DISPATCH_COLUMNS.map(col =>
        col.w == null ? `<col />` : `<col style="width:${col.w}px" />`
      ).join("");

      const colRow = DISPATCH_COLUMNS.map(col =>
        `<th>${renderHeaderLabel(col.label)}</th>`
      ).join("");

      theadEl.innerHTML = `<tr class="col-row">${colRow}</tr>`;

      bodyEl.innerHTML = defaultRows.map(r => `
        <tr>
          <td>
            <div class="cell-time">
              <div class="row1">
                <span class="time">${r.time}</span>
                <span class="tz">${r.tz}</span>
              </div>
              <div class="date">${r.date}</div>
            </div>
          </td>
          <td class="cell-location">${r.tickets}</td>
          <td class="cell-muted">${r.truck}</td>
          <td class="cell-location">${r.location}</td>
          <td class="cell-muted">${r.order}</td>
          <td class="cell-size">${r.size} yd<sup>3</sup></td>
          <td class="cell-muted">${r.mixCode}</td>
          <td><span class="status-pill ${r.status}">${r.statusLabel}</span></td>
          <td class="cell-location">${r.ticketedSlump}</td>
        </tr>
      `).join("");
    }

    // ----------- Default View: flat columns, no group row -----------
    function renderFlat() {
      colgroupEl.innerHTML = DEFAULT_COLUMNS.map(col =>
        col.w == null ? `<col />` : `<col style="width:${col.w}px" />`
      ).join("");

      const colRow = DEFAULT_COLUMNS.map(col =>
        `<th>${renderHeaderLabel(col.label)}</th>`
      ).join("");

      theadEl.innerHTML = `<tr class="col-row">${colRow}</tr>`;

      bodyEl.innerHTML = defaultRows.map(r => `
        <tr>
          <td>
            <div class="cell-time">
              <div class="row1">
                <span class="time">${r.time}</span>
                <span class="tz">${r.tz}</span>
              </div>
              <div class="date">${r.date}</div>
            </div>
          </td>
          <td>${r.tickets}</td>
          <td>${r.truck}</td>
          <td class="cell-location">${r.location}</td>
          <td class="cell-muted">${r.customerName}</td>
          <td class="cell-muted">${r.order}</td>
          <td class="cell-muted">${r.mixCode}</td>
          <td class="cell-size">${r.size} yd<sup>3</sup></td>
          <td><span class="status-pill ${r.status}">${r.statusLabel}</span></td>
          <td>
            <div class="cell-slump">
              <div class="current${r.currentSlump === '-' ? ' dash' : ''}">${r.currentSlump}</div>
              <div class="ticketed">${r.ticketedSlump}</div>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function onToggle() {
      const id = this.dataset.group;
      const group = GROUPS.find(g => g.id === id);
      if (!group || !group.expanded_columns) return; // no expanded set yet
      group.expanded = !group.expanded;
      render();
    }

    // ===================================================================
    // Preset dropdown wiring
    // ===================================================================
    const presetWrap    = document.getElementById("preset-wrap");
    const presetTrigger = document.getElementById("preset-trigger");
    const presetLabel   = document.getElementById("preset-label");
    const presetLabels  = {
      "default":    "Default",
      "dispatch":   "Dispatch View",
      "production": "Production View",
      "qc":         "Quality Control View"
    };

    presetTrigger.addEventListener("click", e => {
      e.stopPropagation();
      presetWrap.classList.toggle("open");
    });

    presetWrap.querySelectorAll(".preset-option").forEach(opt => {
      opt.addEventListener("click", e => {
        e.stopPropagation();
        currentPreset = opt.dataset.preset;
        presetLabel.textContent = presetLabels[currentPreset];
        presetWrap.querySelectorAll(".preset-option").forEach(o =>
          o.classList.toggle("active", o.dataset.preset === currentPreset)
        );
        presetWrap.classList.remove("open");
        render();
      });
    });

    // Close menu on outside click
    document.addEventListener("click", () => presetWrap.classList.remove("open"));

    render();
  </script>
</body>
</html>
