<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifi — Truck Logs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!--
  VERIFI TICKETS — PROTOTYPE SHELL
  ─────────────────────────────────────────────────────────────────────
  Template for the seven Verifi prototypes. Single-file. No build.

  RESPONSIVE
    desktop · persistent 280px sidebar
    tablet  · iPad bezel, slide-out sidebar from left, scrim overlay
    mobile  · iPhone bezel, same slide-out pattern as tablet

  STRUCTURE (top to bottom)
    [1] SHELL CSS · tokens, control bar, sidebar, frame, tablet+mobile
    [2] FEATURE CSS · empty, tk- prefix
    [3] SHELL HTML · control bar, top strip, sidebar, content, drawer
    [4] FEATURE HTML · feature-mount, swap for real content
    [5] SHELL JS · render config, hash router, view+dark+drawer+sidebar
    [6] FEATURE JS · empty

  TO REUSE
    · Update <title> and SHELL_CONFIG.projectKey
    · Build feature with a 2-letter CSS/JS prefix (tk-, dc-, mx-, etc.)
─────────────────────────────────────────────────────────────────────
-->

<style>
/* [1] SHELL CSS */

/* 1.1 Trinity Design Tokens */
:root {
  --base:        #f6f4f2;
  --layer-1:     #ffffff;
  --layer-2:     #f6f4f2;
  --strong:      #36322d;
  --defined:     #36322dc2;
  --soft:        #36322d9e;
  --subtle:      #36322d80;
  --border:      #36322d24;
  --border-mid:  rgba(54,50,45,0.30);
  --blue:        #3069e3;
  --blue-link:   #295ccc;
  --red:         #d70100;
  --amber:       #ffba0d;

  --radius-sm:   4px;
  --radius-md:   16px;
  --radius-lg:   20px;
  --radius-pill: 32px;

  --font:        'ABC Repro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-mono:   'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  --vp-bar-h:    44px;
  --sidebar-w:   280px;
}

body.dark {
  --base:       #171614;
  --layer-1:    #211f1c;
  --layer-2:    #2f2d28;
  --strong:     #ffffff;
  --defined:    #e5e5e5de;
  --soft:       #e5e5e5bf;
  --subtle:     #e5e5e566;
  --border:     #e5e5e51f;
  --border-mid: rgba(229,229,229,0.25);
  --blue:       #6492f1;
  --blue-link:  #6492f1;
}

/* 1.2 Reset + Base */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font);
  background: var(--base);
  color: var(--strong);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
  overflow: hidden;
}
body.dark { background: #1a1917; }
button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
input  { font-family: inherit; }

/* 1.3 Dark Control Bar (vp-) */
/* Persists across every prototype. Logo + project tag on the left,
   viewport pills + options on the right. */
.vp-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--vp-bar-h);
  background: rgba(20,18,16,0.97);
  color: #fff;
  display: flex; align-items: center;
  padding: 0 16px;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
body.dark .vp-bar {
  background: rgba(10,9,8,0.97);
  border-bottom-color: rgba(255,255,255,0.08);
}
.vp-brand { display: flex; align-items: center; gap: 10px; }
.vp-tag {
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.4px; text-transform: uppercase;
  padding: 2px 6px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
}

.vp-right-cluster {
  margin-left: auto;
  display: flex; align-items: center; gap: 12px;
}

.vp-pills {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 2px;
}
.vp-pill {
  font-size: 12px; font-weight: 500;
  letter-spacing: -0.24px;
  color: rgba(255,255,255,0.6);
  padding: 4px 10px;
  border-radius: 6px;
  transition: background 0.15s, color 0.15s;
}
.vp-pill:hover { color: #fff; }
.vp-pill.active {
  background: rgba(255,255,255,0.15);
  color: #fff;
}

/* Options dropdown */
.vp-opts-wrap { position: relative; }
.vp-opts-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  border-radius: 8px;
  font-size: 12px; font-weight: 500;
  letter-spacing: -0.24px;
  transition: background 0.15s;
}
.vp-opts-btn:hover { background: rgba(255,255,255,0.14); }
.vp-opts-dd {
  position: absolute;
  top: calc(100% + 6px); right: 0;
  min-width: 200px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 6px;
  display: none;
  z-index: 1100;
}
.vp-opts-dd.open { display: block; }
body.dark .vp-opts-dd {
  background: #1a1917;
  border-color: rgba(255,255,255,0.1);
}
.vp-opts-section-label {
  font-size: 10px; font-weight: 600;
  color: var(--soft);
  text-transform: uppercase; letter-spacing: 0.4px;
  padding: 8px 10px 4px;
}
body.dark .vp-opts-section-label { color: rgba(255,255,255,0.35); }
.vp-opts-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 8px;
  color: var(--strong);
  cursor: pointer;
}
.vp-opts-row:hover { background: var(--layer-2); }
body.dark .vp-opts-row { color: rgba(255,255,255,0.8); }
body.dark .vp-opts-row:hover { background: rgba(255,255,255,0.06); }
.vp-dark-toggle {
  width: 32px; height: 18px;
  border-radius: 9px;
  background: rgba(54,50,45,0.25);
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.vp-dark-toggle-knob {
  position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
}
body.dark .vp-dark-toggle { background: var(--blue); }
body.dark .vp-dark-toggle-knob { transform: translateX(14px); }

/* 1.4 App Frame */
/* The .app contains the sidebar + content. Positioning is supplied by the
   parent .frame so the same .app block can render full-bleed on desktop
   or inside a tablet bezel without structural changes. */
.app {
  flex: 1;
  display: flex;
  min-height: 0;
  background: var(--base);
  overflow: hidden;
  position: relative;
}

/* 1.5 Sidebar */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--base);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 32px;
  overflow: hidden;
}

.sidebar-brand {
  padding: 8px;
  display: flex; align-items: center;
  height: 40px;
  flex-shrink: 0;
}

.sidebar-nav {
  flex: 1;
  min-height: 0; /* required for overflow-y:auto to work in a flex column */
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  /* Hide the scrollbar by default; show it only when the user is interacting
     with the sidebar. Matches the Figma's at-rest appearance. */
  scrollbar-width: none;
}
.sidebar-nav::-webkit-scrollbar {
  width: 0;
  background: transparent;
}
.sidebar:hover .sidebar-nav {
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.sidebar:hover .sidebar-nav::-webkit-scrollbar { width: 6px; }
.sidebar:hover .sidebar-nav::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* Flat nav link (Home, Return Concrete, footer items) */
.nav-link {
  display: flex; align-items: center; gap: 16px;
  padding: 12px;
  border-radius: var(--radius-pill);
  font-size: 14px;
  letter-spacing: -0.28px;
  color: var(--strong);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  text-decoration: none;
  user-select: none;
}
.nav-link:hover { background: rgba(54,50,45,0.04); }
body.dark .nav-link { color: rgba(255,255,255,0.82); }
body.dark .nav-link:hover { background: rgba(255,255,255,0.06); }

.nav-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--strong);
}
.nav-icon svg { width: 100%; height: 100%; }
body.dark .nav-icon { color: rgba(255,255,255,0.85); }

/* Flat link active (Home, Return Concrete) */
.nav-link.active {
  background: var(--blue);
  color: #fff;
}
.nav-link.active:hover { background: var(--blue); }
.nav-link.active .nav-icon { color: #fff; }
body.dark .nav-link.active,
body.dark .nav-link.active:hover {
  background: #e3f200;
  color: #000;
}
body.dark .nav-link.active .nav-icon { color: #000; }

/* Nav group (Tickets, DC, Mix, Insights) */
.nav-group { display: flex; flex-direction: column; }
.nav-group-header {
  display: flex; align-items: center; gap: 16px;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  letter-spacing: -0.28px;
  color: var(--strong);
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.nav-group-header:hover { background: rgba(54,50,45,0.04); }
body.dark .nav-group-header { color: rgba(255,255,255,0.82); }
body.dark .nav-group-header:hover { background: rgba(255,255,255,0.06); }

.nav-chev {
  width: 16px; height: 16px;
  flex-shrink: 0;
  transition: transform 0.18s;
  color: var(--strong);
  opacity: 0.6;
}
.nav-group.collapsed .nav-chev { transform: rotate(-90deg); }
.nav-group.collapsed .nav-children {
  max-height: 0;
  overflow: hidden;
}
.nav-children {
  display: flex; flex-direction: column;
  max-height: 800px;
  overflow: hidden;
  transition: max-height 0.22s ease;
}

/* Parent header doesn't change weight when a child is active —
   the active state lives entirely on the child pill. */

/* Child sub-page link */
.nav-child {
  padding: 12px 12px 12px 44px;
  border-radius: var(--radius-pill);
  font-size: 14px;
  letter-spacing: -0.28px;
  color: var(--subtle);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  text-decoration: none;
  user-select: none;
}
.nav-child:hover { background: rgba(54,50,45,0.04); color: var(--defined); }
body.dark .nav-child { color: rgba(255,255,255,0.45); }
body.dark .nav-child:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }

/* Active child — strong blue pill (lime yellow in dark mode) */
.nav-child.active {
  background: var(--blue);
  color: #fff;
}
.nav-child.active:hover { background: var(--blue); color: #fff; }
body.dark .nav-child.active,
body.dark .nav-child.active:hover {
  background: #e3f200;
  color: #000;
}

/* "New" badge for Returned Concrete */
.nav-badge {
  margin-left: auto;
  font-size: 12px; font-weight: 500;
  color: var(--blue-link);
  border: 2px solid var(--blue-link);
  border-radius: 16px;
  padding: 2px 8px;
  letter-spacing: -0.24px;
  white-space: nowrap;
  line-height: 1.2;
}
body.dark .nav-badge { color: var(--blue); border-color: var(--blue); }

/* Account picker (sits above the footer) */
.acct-picker {
  display: flex; align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--layer-1);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: background 0.12s;
}
.acct-picker:hover { background: var(--layer-2); }
body.dark .acct-picker {
  background: rgba(255,255,255,0.03);
  border-color: rgba(255,255,255,0.1);
}
body.dark .acct-picker:hover { background: rgba(255,255,255,0.06); }
.acct-label {
  font-size: 10px; font-weight: 600;
  color: var(--soft);
  letter-spacing: 0.4px; text-transform: uppercase;
  margin-bottom: 2px;
}
.acct-current {
  font-size: 14px; font-weight: 500;
  color: var(--strong);
  letter-spacing: -0.28px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.acct-chev-inline {
  width: 14px; height: 14px;
  flex-shrink: 0;
  transition: transform 0.2s;
  opacity: 0.6;
}
.acct-picker.open .acct-chev-inline { transform: rotate(180deg); }
.acct-dd {
  display: none;
  position: absolute;
  left: 0; right: 0;
  bottom: calc(100% + 6px);
  background: var(--layer-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 -4px 16px rgba(54,50,45,0.12);
  padding: 6px;
  z-index: 200;
}
.acct-picker.open .acct-dd { display: block; }
body.dark .acct-dd {
  background: #1a1917;
  border-color: rgba(255,255,255,0.1);
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
}
.acct-dd-label {
  font-size: 10px; font-weight: 600;
  color: var(--soft);
  letter-spacing: 0.4px; text-transform: uppercase;
  padding: 6px 10px 8px;
}
.acct-option {
  display: flex; align-items: center;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13.5px;
  color: var(--strong);
  cursor: pointer;
}
.acct-option:hover { background: var(--layer-2); }
body.dark .acct-option { color: rgba(255,255,255,0.85); }
body.dark .acct-option:hover { background: rgba(255,255,255,0.06); }
.acct-option.selected { font-weight: 500; color: var(--blue); }
.acct-option-check {
  width: 14px; height: 14px;
  margin-left: auto;
  opacity: 0;
  color: var(--blue);
}
.acct-option.selected .acct-option-check { opacity: 1; }

/* Sidebar footer (Profile, Support, Settings) */
.sidebar-footer {
  display: flex; flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}

/* 1.6 Content Area */
.content {
  flex: 1;
  min-width: 0;
  padding: 16px 16px 16px 0;
  display: flex;
}

.content-card {
  flex: 1;
  background: var(--layer-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
body.dark .content-card {
  background: var(--layer-1);
  border-color: rgba(255,255,255,0.08);
}

.content-header {
  padding: 32px 32px 16px;
  flex-shrink: 0;
}
.page-title {
  font-family: var(--font);
  font-size: 24px;
  font-weight: 600;
  line-height: 1.2;
  color: var(--strong);
  letter-spacing: 0;
  margin: 0;
}

.content-body {
  flex: 1;
  overflow: auto;
  padding: 8px 32px 32px;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

/* Feature mount placeholder */
.feature-mount {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 12px;
  padding: 40px;
  color: var(--soft);
  border: 1px dashed var(--border);
  border-radius: 16px;
}
.feature-mount-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border: 1px dashed var(--blue);
  border-radius: 6px;
  background: rgba(48,105,227,0.06);
}
.feature-mount-title {
  font-size: 18px; font-weight: 500;
  letter-spacing: -0.36px;
  color: var(--strong);
}
.feature-mount-sub {
  font-size: 13px;
  color: var(--soft);
  letter-spacing: -0.13px;
  max-width: 380px;
  line-height: 1.55;
}

/* 1.7 Drawer Scaffold */
.drawer-scrim {
  position: fixed; inset: 0;
  background: rgba(20,18,16,0.42);
  z-index: 1500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
}
.drawer-scrim.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: var(--vp-bar-h);
  bottom: 0;
  right: 0;
  /* Heavy panel — large enough to hold maps, charts, two-column forms,
     and message threads. clamp() keeps it sane across viewport sizes:
     65% of viewport, floor 880px on smaller windows, ceiling 1240px on
     ultrawides so it never feels endless. */
  width: clamp(880px, 65vw, 1240px);
  max-width: calc(100vw - 80px);
  background: var(--layer-1);
  border-left: 1px solid var(--border);
  border-radius: 20px 0 0 20px;
  box-shadow: -12px 0 32px rgba(20,18,16,0.08);
  z-index: 1600;
  transform: translateX(100%);
  transition: transform 0.26s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform: translateX(0); }
body.dark .drawer {
  border-left-color: rgba(255,255,255,0.1);
  box-shadow: -12px 0 32px rgba(0,0,0,0.4);
}
.drawer-chrome {
  display: flex; align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}
body.dark .drawer-chrome { border-bottom-color: rgba(255,255,255,0.08); }

/* Title — sits on the left, button cluster pushed right via margin-left:auto */
.drawer-chrome-title {
  font-size: 13px; font-weight: 500;
  color: var(--strong);
  letter-spacing: -0.13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
  flex: 1;
}

/* Button cluster — ‹ › grouped tight, ✕ separated by 8px */
.drawer-chrome-actions {
  margin-left: auto;
  display: flex; align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.drawer-chrome-nav {
  display: flex; align-items: center;
  gap: 8px;
}

/* Base button — 32×32 pill */
.drawer-chrome-btn {
  width: 32px; height: 32px;
  border-radius: 32px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}

/* Outlined ‹ › buttons — white bg, discrete border, strong icon */
.drawer-chrome-btn--nav {
  background: var(--layer-1);
  border: 1px solid var(--border);
  color: var(--strong);
}
.drawer-chrome-btn--nav:hover {
  background: var(--layer-2);
  border-color: rgba(54,50,45,0.24);
}
.drawer-chrome-btn--nav:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.drawer-chrome-btn--nav:disabled:hover {
  background: var(--layer-1);
  border-color: var(--border);
}
body.dark .drawer-chrome-btn--nav {
  background: transparent;
  border-color: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.9);
}
body.dark .drawer-chrome-btn--nav:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.3);
}

/* Solid ✕ button — strong dark bg, white icon */
.drawer-chrome-btn--close {
  background: var(--strong);
  color: var(--layer-1);
}
.drawer-chrome-btn--close:hover {
  background: #1f1c18;
}
body.dark .drawer-chrome-btn--close {
  background: rgba(255,255,255,0.92);
  color: var(--strong);
}
body.dark .drawer-chrome-btn--close:hover {
  background: rgba(255,255,255,1);
}

.drawer-body { flex: 1; overflow-y: auto; padding: 20px; }

/* ─── 1.8 Tablet + Mobile Overrides ─────────────────────────────────────
   Both tablet and mobile share the same structural pattern:
   • a warm-grey top strip (hamburger + centered logo + reserved cluster)
   • a slide-in sidebar that overlays the content with a scrim
   • a full-takeover drawer (not a side panel like desktop)
   • the whole UI wrapped in a device bezel

   Only the dimensions differ — tablet uses the iPad ratio, mobile uses
   the iPhone ratio. Shared rules use :is(.view-tablet, .view-mobile) so
   adding more device sizes later is a one-line change.
─────────────────────────────────────────────────────────────────────── */

/* Shared "desk" background and centering for any device view */

/* Shared frame styling — outline bezel, drop shadow, ratio-driven width.
   Each device sets its own aspect-ratio + height clamp below. */
body:is(.view-tablet, .view-mobile) .frame {
  position: relative;
  top: auto; left: auto; right: auto; bottom: auto;
  transform: none;
  outline: 12px solid #2a2a2a;
  outline-offset: 0;
  background: var(--base);
  flex-shrink: 0;
  box-shadow: 0 24px 60px rgba(20,18,16,0.18);
}

/* Tablet — iPad portrait, 834:1194 (≈0.698), 24px corner radius */

/* Mobile — iPhone portrait, 393:852 (≈0.461), 40px corner radius */

/* Speaker bar inside the top of the bezel — shared shape, slightly smaller
   on mobile to look proportional. */
body:is(.view-tablet, .view-mobile) .frame::before {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a1a;
  z-index: 9;
}
body.view-tablet .frame::before {
  top: 14px;
  width: 120px;
  height: 8px;
  border-radius: 4px;
}
body.view-mobile .frame::before {
  top: 10px;
  width: 70px;
  height: 5px;
  border-radius: 3px;
}

/* Top strip (hamburger + centered π + reserved cluster) */
body:is(.view-tablet, .view-mobile) .tb-strip { display: flex; }

/* Circular hamburger / X button on the left */


/* Centered π/wordmark */

/* Right cluster — search + bell, reserved but invisible */

/* App fills the frame below the strip, sidebar overlays. */
body:is(.view-tablet, .view-mobile) .app {
  position: static;
  flex: 1;
  flex-direction: column;
  background: transparent;
  overflow: hidden;
}
body:is(.view-tablet, .view-mobile) .sidebar {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  z-index: 1450;
  transform: translateX(-100%);
  transition: transform 0.24s ease;
  box-shadow: 4px 0 16px rgba(20,18,16,0.08);
  border-radius: 14px 0 0 14px;
}
body.view-tablet .sidebar { width: 320px; }
/* Mobile sidebar fills more of the screen since the screen is narrower */
body.view-mobile .sidebar { width: 85%; max-width: 320px; }
body:is(.view-tablet, .view-mobile).sidebar-open .sidebar {
  transform: translateX(0);
}
body:is(.view-tablet, .view-mobile) .sidebar-brand {
  /* Tablet/mobile sidebars use their own X + logo header (tb-sidebar-header) */
  display: none;
}

body:is(.view-tablet, .view-mobile) .tb-sidebar-header { display: flex; }


/* Scrim sits inside the .frame, darkens only the device content */
body:is(.view-tablet, .view-mobile) .sidebar-scrim { display: block; }
body:is(.view-tablet, .view-mobile).sidebar-open .sidebar-scrim { opacity: 1; }
body:is(.view-tablet, .view-mobile):not(.sidebar-open) .sidebar-scrim { pointer-events: none; }

/* Content padding inside device views */
body:is(.view-tablet, .view-mobile) .content {
  padding: 0 16px 16px;
  width: 100%;
}
/* Mobile content gets slightly tighter padding because the screen is narrow */
body.view-mobile .content {
  padding: 0 8px 8px;
}
body.view-mobile .content-header { padding: 16px 16px 8px; }
body.view-mobile .content-body { padding: 8px 16px 16px; }

/* ── Device drawer takeover ──
   Tablet and mobile both replace the desktop side-drawer with a full
   takeover that slides in from the right inside the bezel. */
body:is(.view-tablet, .view-mobile) .drawer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  max-width: none;
  border-left: none;
  box-shadow: none;
  transform: translateX(100%);
  border-radius: inherit;
}
body:is(.view-tablet, .view-mobile) .drawer.open {
  transform: translateX(0);
}
body:is(.view-tablet, .view-mobile) .drawer-scrim {
  /* Takeover is opaque — no scrim needed. */
  display: none;
}
.frame {
  position: fixed;
  top: var(--vp-bar-h);
  left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--base);
}

/* [2] FEATURE CSS */

/* ── Truck drawer layout ── */
.drawer-body {
  display: flex;
  flex-direction: row;
  overflow: hidden;
  height: 100%;
  padding: 0;
}
.tl-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.tl-side {
  width: 400px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--layer-1);
}

/* ── Truck header ── */
.tl-hdr {
  padding: 20px 24px 0;
  flex-shrink: 0;
  background: var(--layer-1);
}
.tl-hdr-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.tl-truck-label {
  font-size: 22px;
  letter-spacing: -0.66px;
  color: var(--strong);
}
.tl-truck-label strong { font-weight: 500; }
.tl-unit-sub {
  font-size: 11px;
  color: var(--soft);
  letter-spacing: 0.2px;
  margin-bottom: 12px;
}
.tl-ign-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #d5f1d2;
  border-radius: 16px;
  padding: 5px 10px;
  font-size: 13px;
  font-weight: 500;
  color: #1e6252;
  letter-spacing: -0.26px;
  cursor: pointer;
}
.tl-ign-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #2ecf1d;
  flex-shrink: 0;
}
.tl-share-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  background: transparent; cursor: pointer;
}
.tl-share-btn:hover { background: var(--layer-2); }
.tl-unit-pill {
  display: flex; align-items: center; gap: 7px;
  height: 30px; padding: 0 12px;
  background: rgba(48,105,227,0.08);
  border: 1px solid rgba(48,105,227,0.22);
  border-radius: 32px;
  color: var(--blue-link);
  font-size: 13px; font-weight: 500; letter-spacing: -0.26px;
  cursor: pointer; margin-left: auto;
}
.tl-unit-pill:hover { background: rgba(48,105,227,0.14); }

/* ── Drawer tabs ── */
.tl-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 24px;
  flex-shrink: 0;
}
.tl-tabs::-webkit-scrollbar { display: none; }
.tl-tab {
  flex-shrink: 0;
  background: none; border: none;
  font-size: 14px;
  font-family: var(--font);
  letter-spacing: -0.28px;
  color: var(--soft);
  cursor: pointer;
  padding: 12px 8px;
  margin-bottom: -1px;
}
.tl-tab:hover { color: var(--strong); }
.tl-tab.active {
  color: var(--strong);
  box-shadow: inset 0 -2px 0 #211f1c;
}

/* ── Logs filter bar ── */
.tl-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 12px;
  align-items: flex-start;
  padding: 14px 24px 0;
  flex-shrink: 0;
}
.tl-field { display: flex; flex-direction: column; gap: 4px; }
.tl-field-label {
  font-size: 12px;
  color: var(--defined);
  letter-spacing: -0.24px;
}
.tl-date-row { display: flex; align-items: stretch; }
.tl-date-input {
  flex: 1; min-width: 100px;
  border: 1px solid var(--border);
  background: var(--layer-1);
  padding: 9px 12px;
  font-size: 13px; font-family: var(--font);
  letter-spacing: -0.26px;
  color: var(--strong); height: 38px;
}
.tl-date-input.from { border-radius: 100px 0 0 100px; }
.tl-date-input.to   { border-radius: 0 100px 100px 0; margin-left: -1px; }
.tl-date-input::placeholder { color: rgba(54,50,45,0.45); }
.tl-date-input:focus { outline: none; border-color: var(--strong); position: relative; z-index: 1; }
.tl-select {
  appearance: none; -webkit-appearance: none;
  border: 1px solid rgba(54,50,45,0.5);
  background: var(--layer-1);
  border-radius: 4px;
  padding: 8px 26px 8px 10px;
  font-size: 13px; font-family: var(--font);
  letter-spacing: -0.26px;
  color: var(--strong); height: 38px; cursor: pointer;
  background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 5l4 4 4-4' stroke='%2336322d' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 8px center;
  min-width: 120px;
}
.tl-select:focus { outline: none; border-color: var(--strong); }
.tl-select:disabled { opacity: 0.5; cursor: not-allowed; background-color: rgba(54,50,45,0.03); }
.tl-sub-helper {
  font-size: 10px; color: rgba(54,50,45,0.45);
  letter-spacing: -0.2px; height: 14px; padding: 2px 0 0;
}

/* ── Search + refresh ── */
.tl-search-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 24px 0;
  flex-shrink: 0;
}
.tl-search {
  display: flex; align-items: center; gap: 10px;
  background: var(--layer-2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 7px 12px; height: 36px; flex: 1;
}
.tl-search:focus-within { border-color: var(--strong); background: var(--layer-1); }
.tl-search input {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 13px; font-family: var(--font);
  letter-spacing: -0.26px; color: var(--strong);
}
.tl-search input::placeholder { color: var(--soft); }
.tl-refresh-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 36px; padding: 0 14px; flex-shrink: 0;
  background: var(--layer-1); border: 1px solid var(--border);
  border-radius: 24px; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--defined); letter-spacing: -0.26px;
}
.tl-refresh-btn:hover { border-color: var(--border-mid); color: var(--strong); }
.tl-refresh-btn.refreshing { color: var(--blue); border-color: rgba(48,105,227,0.3); pointer-events: none; }
.tl-refresh-btn.refreshing svg { animation: tl-spin 0.8s linear infinite; }
.tl-refresh-btn.refreshed { color: #16a34a; border-color: rgba(22,163,74,0.3); pointer-events: none; }
@keyframes tl-spin { to { transform: rotate(360deg); } }

/* ── Log table ── */
.tl-table-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin;
  margin-top: 10px;
}
table.tl-table {
  width: 100%; border-collapse: collapse;
  font-family: var(--font);
}
.tl-table thead th {
  text-align: left; padding: 8px 10px;
  font-size: 13px; font-weight: 500;
  color: var(--strong); letter-spacing: -0.26px;
  border-bottom: 1px solid var(--border);
  background: var(--layer-1);
  position: sticky; top: 0; z-index: 1;
  white-space: nowrap;
}
.tl-table thead th + th { border-left: 1px solid var(--border); }
.tl-table thead th:first-child { padding-left: 24px; }
.tl-table tbody tr { cursor: pointer; }
.tl-table tbody tr:nth-child(even) { background: var(--layer-2); }
.tl-table tbody tr:hover { background: rgba(48,105,227,0.05); }
.tl-table tbody tr.active { background: rgba(48,105,227,0.10); }
.tl-table tbody tr.active td:first-child { box-shadow: inset 3px 0 0 var(--blue); }
.tl-table tbody td {
  padding: 8px 10px; height: 36px;
  font-size: 13px; color: var(--defined);
  letter-spacing: -0.26px; line-height: 1.3;
  vertical-align: middle; white-space: nowrap;
}
.tl-table tbody td:first-child { padding-left: 24px; }
.tl-empty {
  text-align: center; padding: 32px 24px;
  font-size: 13px; color: var(--soft); letter-spacing: -0.26px;
}
.tl-th-menu {
  margin-left: auto; opacity: 0.5; cursor: pointer;
  width: 16px; height: 16px;
  display: inline-flex; align-items: center; justify-content: center;
}
.tl-th-inner { display: flex; align-items: center; gap: 6px; }

/* ── Side panel (Event Details) ── */
.tl-side-hdr {
  padding: 20px 24px 0;
  flex-shrink: 0;
  background: var(--layer-2);
}
.tl-side-title {
  font-size: 20px; font-weight: 500;
  letter-spacing: -0.4px; color: var(--strong);
  margin-bottom: 4px; line-height: 1.2;
}
.tl-side-sub {
  font-size: 16px; color: var(--strong);
  letter-spacing: -0.32px; line-height: 1.2;
}
.tl-side-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 16px; flex-shrink: 0;
  margin-top: 12px;
  background: var(--layer-2);
}
.tl-side-tab {
  background: none; border: none; cursor: pointer;
  padding: 12px 8px; margin-bottom: -1px;
  font-size: 14px; font-family: var(--font);
  letter-spacing: -0.28px; color: var(--soft);
}
.tl-side-tab:hover { color: var(--strong); }
.tl-side-tab.active {
  color: var(--strong);
  box-shadow: inset 0 -2px 0 #211f1c;
}
/* Body — layer-2 bg, 24px padding, 20px gap between sections */
.tl-side-body {
  flex: 1; min-height: 0;
  overflow-y: auto; scrollbar-width: thin;
  padding: 20px 24px 24px;
  display: flex; flex-direction: column; gap: 20px;
  background: var(--layer-2);
}
/* Content div rendered by JS — flex column, 20px gap */
#tl-side-content {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
/* Groups section label + card stack */
.tl-section-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.tl-side-empty {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  color: var(--soft); background: var(--layer-2);
}
.tl-side-empty p { font-size: 14px; letter-spacing: -0.28px; }
/* Footer — disabled color */
.tl-side-foot {
  font-size: 14px; color: rgba(54,50,45,0.36);
  letter-spacing: -0.28px;
  padding: 10px 24px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--layer-2);
}

/* ── Structured view — matches Figma node 3472:20202 ── */
/* Event chip: white card, 8px radius, 10px padding */
.tl-chip {
  display: flex; align-items: center;
  justify-content: space-between;
  background: var(--layer-1);
  border: 1px solid rgba(54,50,45,0.14);
  border-radius: 8px; padding: 10px;
  flex-shrink: 0;
}
.tl-chip-left { display: flex; align-items: center; gap: 10px; }
.tl-chip-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tl-chip-label { font-size: 16px; font-weight: 500; letter-spacing: -0.32px; color: var(--strong); }
.tl-chip-time  { font-size: 16px; color: rgba(54,50,45,0.5); letter-spacing: -0.32px; white-space: nowrap; }

/* Section label: "Online (7)" — 16px regular, no bold */
.tl-section-hdr {
  font-size: 14px; font-weight: 500; color: var(--soft);
  letter-spacing: 0.3px; text-transform: uppercase; line-height: 1.2;
}

/* Card stack: 10px gap between cards */
.tl-card-stack { display: flex; flex-direction: column; gap: 10px; }

/* Individual card: white, 8px radius, border rgba(54,50,45,0.14) */
.tl-card {
  background: var(--layer-1);
  border: 1px solid rgba(54,50,45,0.14);
  border-radius: 8px; overflow: hidden;
  transition: border-color 0.12s;
}
.tl-card.open { border-color: rgba(54,50,45,0.28); }

/* Card row: 8px horizontal padding, 16px vertical — matches Figma px-[8px] py-[16px] */
.tl-card-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 16px; width: 100%;
  background: none; border: none; cursor: default;
  font-family: var(--font); text-align: left; gap: 8px;
  min-height: 44px;
}
.tl-card-row.xp { cursor: pointer; }
.tl-card-row.xp:hover { background: rgba(54,50,45,0.02); }
.tl-card-left  { display: flex; align-items: center; gap: 10px; min-width: 0; }
.tl-card-right { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.tl-card-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tl-card-label { font-size: 14px; font-weight: 500; color: var(--strong); letter-spacing: -0.28px; }
.tl-card-value { font-size: 14px; font-weight: 500; color: var(--strong); letter-spacing: -0.28px; text-align: right; }
.tl-card-value.val-warn  { color: #7a5200; }
.tl-card-value.val-alarm { color: var(--red); }
.tl-card-value.val-muted { color: var(--subtle); }
/* Chevron SVG replaced by a unicode down arrow for reliability */
.tl-card-chev { transition: transform 0.2s; flex-shrink: 0; color: var(--soft); font-size: 10px; }
.tl-card.open .tl-card-chev { transform: rotate(180deg); }
.tl-card-body {
  display: none; flex-direction: column;
  border-top: 1px solid rgba(54,50,45,0.14);
  padding: 0;
}
.tl-card.open .tl-card-body { display: flex; }

/* Expand detail rows: 8px padding matching Figma */
.tl-detail-row {
  display: flex; justify-content: space-between;
  align-items: baseline; padding: 8px 16px;
  gap: 12px; font-size: 14px; letter-spacing: -0.28px;
  border-bottom: 1px solid rgba(54,50,45,0.08);
  line-height: 1.3;
}
.tl-detail-row:last-child { border-bottom: none; }
.tl-detail-k { color: rgba(54,50,45,0.62); flex-shrink: 0; }
.tl-detail-v { color: var(--strong); text-align: right; word-break: break-word; }
.tl-detail-v.val-warn  { color: #7a5200; font-weight: 500; }
.tl-detail-v.val-alarm { color: var(--red); font-weight: 500; }
.tl-detail-v.val-muted { color: var(--subtle); }

/* Unified component status table (Online + Offline) */
.tl-comp-table {
  display: flex;
  flex-direction: column;
  background: var(--layer-1);
  border: 1px solid rgba(54,50,45,0.14);
  border-radius: 10px;
  overflow: hidden;
}
.tl-comp-thead {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(54,50,45,0.14);
  background: var(--layer-2);
  gap: 8px;
}
.tl-comp-thead span {
  font-size: 11px; font-weight: 500;
  color: var(--soft); letter-spacing: 0.3px;
  text-transform: uppercase; white-space: nowrap;
}
.tl-comp-row {
  display: flex;
  align-items: center;
  padding: 0 14px;
  min-height: 44px;
  gap: 8px;
  border-bottom: 1px solid rgba(54,50,45,0.07);
  font-size: 14px; letter-spacing: -0.28px;
}
.tl-comp-row:last-child { border-bottom: none; }
.tl-comp-row.alt { background: rgba(54,50,45,0.02); }
/* Name gets all remaining space */
.tl-comp-name {
  display: flex; align-items: center; gap: 8px;
  flex: 1; min-width: 0;
  font-weight: 500; color: var(--strong);
}
/* Fixed-width right columns so they never collide */
.tl-comp-seen {
  width: 68px; flex-shrink: 0; text-align: right;
  color: var(--soft); font-family: var(--font-mono);
  font-size: 12px; white-space: nowrap;
}
.tl-comp-errors {
  width: 44px; flex-shrink: 0; text-align: center;
  font-size: 14px; font-weight: 500;
}
.tl-comp-errors.has-errors { color: var(--red); }
.tl-comp-errors.no-errors  { color: rgba(54,50,45,0.3); }
/* Clickable error count — touch-friendly badge */
.tl-err-link {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 28px; min-height: 28px;
  padding: 0 8px;
  background: rgba(215,1,0,0.10);
  border: 1px solid rgba(215,1,0,0.25);
  border-radius: 100px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: var(--red); cursor: pointer;
  /* Expand the tap zone without changing visual size */
  position: relative;
}
.tl-err-link::after {
  content: ''; position: absolute;
  inset: -8px;
}
.tl-err-link:hover { background: rgba(215,1,0,0.16); }
.tl-comp-status {
  width: 80px; flex-shrink: 0; text-align: right;
  color: var(--soft); font-size: 13px; white-space: nowrap;
}
.tl-comp-status.no-contact { color: rgba(54,50,45,0.3); }

/* Flag banners */
.tl-flag {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 11px 14px; border-radius: 10px;
  font-size: 14px; letter-spacing: -0.28px;
  font-weight: 500; line-height: 1.4; flex-shrink: 0;
}
.tl-flag.alarm { background: rgba(215,1,0,0.08); color: #a80000; border: 1px solid rgba(215,1,0,0.2); }
.tl-flag.warn  { background: rgba(255,186,13,0.12); color: #7a5200; border: 1px solid rgba(255,186,13,0.3); }
.tl-flag.info  { background: rgba(48,105,227,0.08); color: #2355c4; border: 1px solid rgba(48,105,227,0.2); }


/* ── Raw JSON ── */
.tl-raw-wrap { display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 0; }
.tl-raw-search {
  display: flex; align-items: center; gap: 6px;
  background: var(--layer-1); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px; flex-shrink: 0;
}
.tl-raw-search:focus-within { border-color: var(--strong); }
.tl-raw-search input {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 13px; font-family: var(--font);
  letter-spacing: -0.26px; color: var(--strong);
}
.tl-raw-search input::placeholder { color: var(--soft); }
.tl-raw-count { font-size: 11px; color: var(--soft); font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0; }
.tl-raw-nav {
  width: 22px; height: 22px; padding: 0;
  background: transparent; border: none; border-radius: 4px;
  color: var(--strong); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.tl-raw-nav:hover { background: rgba(54,50,45,0.06); }
.tl-raw-block {
  background: #1c1a17; border-radius: 8px;
  padding: 12px 14px;
  font-family: var(--font-mono); font-size: 11.5px;
  color: #e9e6df; line-height: 1.6; white-space: pre;
  overflow: auto; flex: 1; min-height: 0; scrollbar-width: thin;
}
.tl-raw-block .jk  { color: #9ecbff; }
.tl-raw-block .js  { color: #a5d6a7; }
.tl-raw-block .jn  { color: #ffcb6b; }
.tl-raw-block .jb  { color: #f78c6c; }
.tl-raw-block mark.tl-hi {
  background: rgba(255,200,80,0.3); color: inherit;
  border-radius: 2px; padding: 0 1px;
  box-shadow: 0 0 0 1px rgba(255,200,80,0.45);
}

/* 5.3 Render sidenav + footer */
function renderSidenav() {
  const root = document.getElementById('sidebar-nav');
  if (!root) return;
  root.innerHTML = SHELL_CONFIG.nav.map(item => {
    if (item.kind === 'link') {
      const todo  = item.todo ? `data-todo="${item.todo}"` : '';
      const href  = item.to || '#';
      const badge = item.badge ? `<span class="nav-badge">${item.badge}</span>` : '';
      return `
        <a class="nav-link" data-key="${item.key}" href="${href}" ${todo}
           onclick="return navLinkClick(event,'${item.key}')">
          <span class="nav-icon">${NAV_ICONS[item.icon] || ''}</span>
          <span style="flex:1;">${item.label}</span>
          ${badge}
        </a>`;
    }
    const children = item.children.map(c => {
      const todo = c.todo ? `data-todo="${c.todo}"` : '';
      const href = c.to || '#';
      return `<a class="nav-child" data-key="${c.key}" href="${href}" ${todo}
                 onclick="return navChildClick(event,'${item.key}','${c.key}')">${c.label}</a>`;
    }).join('');
    return `
      <div class="nav-group" data-key="${item.key}">
        <div class="nav-group-header" onclick="navGroupHeaderClick('${item.key}')">
          <span class="nav-icon">${NAV_ICONS[item.icon] || ''}</span>
          <span style="flex:1;">${item.label}</span>
          <span class="nav-chev">${CHEV_DOWN}</span>
        </div>
        <div class="nav-children">${children}</div>
      </div>`;
  }).join('');
}

/* 5.4 Nav interaction */
function navGroupHeaderClick(groupKey) {
  /* Click on group header: navigate to first internal child if present,
     otherwise toggle the accordion. */
  const item = SHELL_CONFIG.nav.find(n => n.key === groupKey);
  if (item && item.children && item.children.length) {
    const first = item.children[0];
    if (first.to && first.to.startsWith('#')) {
      navigateTo(first.to);
      return;
    }
    if (first.to && first.to.startsWith('http')) {
      window.open(first.to, '_blank');
      return;
    }
  }
  const group = document.querySelector(`.nav-group[data-key="${groupKey}"]`);
  if (group) group.classList.toggle('collapsed');
}

function navLinkClick(e, key) {
  const all = [...SHELL_CONFIG.nav, ...SHELL_CONFIG.footer];
  const item = all.find(n => n.key === key);
  if (!item) return false;
  if (!item.to) {
    e.preventDefault();
    console.log(`[shell] "${item.label}" not built yet (todo: ${item.todo || 'unknown'}).`);
    return false;
  }
  if (item.to.startsWith('#')) {
    e.preventDefault();
    navigateTo(item.to);
    return false;
  }
  return true;
}

function navChildClick(e, groupKey, childKey) {
  const item = SHELL_CONFIG.nav.find(n => n.key === groupKey);
  const child = item && item.children.find(c => c.key === childKey);
  if (!child) return false;
  if (!child.to) {
    e.preventDefault();
    console.log(`[shell] "${child.label}" not built yet.`);
    return false;
  }
  if (child.to.startsWith('#')) {
    e.preventDefault();
    navigateTo(child.to);
    return false;
  }
  /* External — open in new tab so prototype context isn't lost */
  e.preventDefault();
  window.open(child.to, '_blank');
  return false;
}

/* 5.5 Active state + page title */
function setActiveNav(childKey, groupKey) {
  document.querySelectorAll('.nav-link.active, .nav-child.active')
    .forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-group.contains-active')
    .forEach(el => el.classList.remove('contains-active'));

  if (groupKey) {
    const child = document.querySelector(`.nav-child[data-key="${childKey}"]`);
    if (child) child.classList.add('active');
    const group = document.querySelector(`.nav-group[data-key="${groupKey}"]`);
    if (group) {
      group.classList.add('contains-active');
      group.classList.remove('collapsed');
    }
  } else {
    const link = document.querySelector(`.nav-link[data-key="${childKey}"]`);
    if (link) link.classList.add('active');
  }
}

function setPageTitle(text) {
  const el = document.getElementById('page-title');
  if (el) el.textContent = text;
}

/* 5.6 Hash router */
/* Hash format: #<view>/<page>  e.g. #desktop/ticket-list */
function parseHash(h) {
  h = (h || location.hash || '').replace(/^#/, '');
  if (!h) return { view:null, page:null };
  const parts = h.split('/').filter(Boolean);
  const viewWords = ['mobile','tablet','desktop'];
  if (parts.length === 1) {
    if (viewWords.includes(parts[0])) return { view:parts[0], page:null };
    return { view:null, page:parts[0] };
  }
  if (viewWords.includes(parts[0])) return { view:parts[0], page:parts[1] };
  return { view:null, page:parts[0] };
}

function navigateTo(to) {
  location.hash = to.replace(/^#/, '');
  applyRoute();
  /* On tablet, navigating from the open sidebar closes it. No-op on desktop. */
  closeSidebar();
}

function applyRoute() {
  const { view, page } = parseHash();
  if (view) setView(view, /*skipHashWrite*/true);

  if (page) {
    for (const item of SHELL_CONFIG.nav) {
      if (item.kind === 'group') {
        for (const c of item.children) {
          if (c.to && c.to.endsWith('/' + page)) {
            setActiveNav(c.key, item.key);
            setPageTitle(c.label);
            return;
          }
        }
      } else if (item.to && item.to.endsWith('/' + page)) {
        setActiveNav(item.key, null);
        setPageTitle(item.label);
        return;
      }
    }
  }

  defaultLand();
}

function defaultLand() {
  /* dc prototype — no page routing needed */
}

/* 5.7 View-mode switcher */
function setView(view, skipHashWrite) {
  const valid = ['mobile','tablet','desktop'];
  if (!valid.includes(view)) return;
  const isDark = document.body.classList.contains('dark');
  /* Switching view modes resets the sidebar-open state — the persistent
     sidebar on desktop doesn't have an "open" concept. */
  document.body.className = 'view-' + view + (isDark ? ' dark' : '');
  document.querySelectorAll('.vp-pill').forEach(p => p.classList.remove('active'));
  const sel = document.querySelector(`.vp-pill[onclick="setView('${view}')"]`);
  if (sel) sel.classList.add('active');
  if (!skipHashWrite) {
    const { page } = parseHash();
    if (page) location.hash = view + '/' + page;
  }
}

/* 5.11 Drawer */
let DRAWER_CTX = { idx:0, list:[], render:null };

function openDrawer(opts) {
  opts = opts || {};
  DRAWER_CTX.idx    = typeof opts.idx === 'number' ? opts.idx : 0;
  DRAWER_CTX.list   = Array.isArray(opts.list) ? opts.list : [];
  DRAWER_CTX.render = typeof opts.render === 'function' ? opts.render : null;
  document.getElementById('drawer-title').textContent = opts.title || 'Drawer';
  document.getElementById('drawer-body').innerHTML = DRAWER_CTX.render
    ? DRAWER_CTX.render(DRAWER_CTX.idx)
    : `<div style="color:var(--soft);font-size:14px;line-height:1.55;">
         Drawer scaffolding is wired up. The feature owns the body content.
       </div>`;
  updateDrawerArrows();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-scrim').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-scrim').classList.remove('open');
}

function navDrawer(dir) {
  const len = DRAWER_CTX.list.length;
  if (!len) return;
  const next = DRAWER_CTX.idx + dir;
  if (next < 0 || next >= len) return;
  DRAWER_CTX.idx = next;
  if (DRAWER_CTX.render) {
    document.getElementById('drawer-body').innerHTML = DRAWER_CTX.render(next);
  }
  document.getElementById('drawer-title').textContent = `Item ${next + 1} of ${len}`;
  updateDrawerArrows();
}

function updateDrawerArrows() {
  const len = DRAWER_CTX.list.length;
  document.getElementById('drawer-prev').disabled = (DRAWER_CTX.idx <= 0 || len === 0);
  document.getElementById('drawer-next').disabled = (DRAWER_CTX.idx >= len - 1 || len === 0);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeDrawer();
    closeSidebar();
    document.getElementById('vp-opts-dd').classList.remove('open');
    closeAcctDropdown();
  }
});

  var dpOk=cs.dischargePressurePascals>=cs.dischargePressureMin&&cs.dischargePressurePascals<=cs.dischargePressureMax;
  var flags=[];
  if(cs.probBadMagnet===1) flags.push(tlFlag('Bad magnet probability high — drum speed may be unreliable','warn'));
  if(!cpOk) flags.push(tlFlag('Charge pressure out of range ('+tlKpa(cs.chargePressureMin)+' – '+tlKpa(cs.chargePressureMax)+')','alarm'));
  if(!dpOk) flags.push(tlFlag('Discharge pressure out of range ('+tlKpa(cs.dischargePressureMin)+' – '+tlKpa(cs.dischargePressureMax)+')','alarm'));
  if(cs.estimatedBuildupPounds>1500) flags.push(tlFlag('Estimated buildup: '+cs.estimatedBuildupPounds.toFixed(0)+' lbs','warn'));
  var h='<div class="tl-chip"><div class="tl-chip-left"><span class="tl-chip-dot" style="background:#3069e3;"></span><span class="tl-chip-label">Concrete Status</span></div><span class="tl-chip-time">'+tlEsc(ts)+'</span></div>';
  h+=flags.join('');
  h+='<div class="tl-section-group"><div class="tl-section-hdr">Key signals</div><div class="tl-card-stack">';
  h+=tlCard({label:'Delivery phase',value:phase,dot:cs.deliveryPhase==='PHASE_ON_SITE'?'#2ecf1d':'#3069e3'});
  h+=tlCard({label:'Delivery state',value:state,dot:cs.active_load?'#2ecf1d':'#3069e3'});
  h+=tlCard({label:'Slump reading',value:sDisp,vcls:sOk?'':'val-muted',dot:sOk?'#2ecf1d':'#ffba0d',detail:sOk?[['Target',tlOk(cs.targetSlumpMillimeters)?cs.targetSlumpMillimeters+' mm':'—'],['Standard',tlOk(cs.standardSlumpMm)&&cs.standardSlumpMm>0?cs.standardSlumpMm.toFixed(0)+' mm':'—'],['3-stage',tlOk(cs.threeStageSlumpMm)&&cs.threeStageSlumpMm>0?cs.threeStageSlumpMm.toFixed(0)+' mm':'—'],['Stable',cs.slumpIsStable?'Yes':'No']]:[['Reason',TL_SLUMP[cs.slumpReason]||cs.slumpReason]]});
  h+=tlCard({label:'Drum speed',value:rDisp,vcls:rOk?(!rInR?'val-warn':''):'',dot:rOk?(rInR?'#2ecf1d':'#ffba0d'):'',detail:rOk?[['Target range',cs.targetMinDrumSpeedRpm+' – '+cs.targetMaxDrumSpeedRpm+' RPM'],['In range',rInR?'Yes':'No',rInR?'':'val-warn']]:[['Target',cs.targetMinDrumSpeedRpm+' – '+cs.targetMaxDrumSpeedRpm+' RPM']]});
  h+=tlCard({label:'Charge pressure',value:tlKpa(cs.chargePressurePascals),vcls:cpOk?'':'val-alarm',dot:cpOk?'#2ecf1d':'#d70100',detail:[['Expected',tlKpa(cs.chargePressureMin)+' – '+tlKpa(cs.chargePressureMax)],['In range',cpOk?'Yes':'No',cpOk?'':'val-alarm']]});
  h+=tlCard({label:'Discharge pressure',value:tlKpa(cs.dischargePressurePascals),vcls:dpOk?'':'val-alarm',dot:dpOk?'#2ecf1d':'#d70100',detail:[['Expected',tlKpa(cs.dischargePressureMin)+' – '+tlKpa(cs.dischargePressureMax)],['In range',dpOk?'Yes':'No',dpOk?'':'val-alarm']]});
  h+=tlCard({label:'Total water added',dot:'#3069e3',value:cs.totalWaterAddedLiters.toFixed(1)+' L',detail:[['Per m³',cs.totalWaterAddedLitersPerCubicMeter.toFixed(2)+' L/m³'],['Admix',cs.totalAdmixAddedMilliliters>0?cs.totalAdmixAddedMilliliters.toFixed(0)+' mL':'None']]});
  h+='</div></div>';
  return h;
}

      ['Order',        tr.orderNumber||'—'],
      ['Account',      tr.accountName||'—'],

    detail:[
      ['Customer',     customer],
      ['Address',      tr.customerAddress||'—'],
      ['Mix code',     tr.mixCodeName||'—'],

  h += tlCard({
    label:'Load size',
    value:loadSize,
    dot:'#2ecf1d',
    detail:[
      ['Target slump', targetSlump],
      ['Min discharge',slumpDisp(tr.minDischargeSlumpMillimeters)],
      ['Max discharge',slumpDisp(tr.maxDischargeSlumpMillimeters)],
      ['Mix revs after load', tr.mixRevsAfterLoading||'—'],
    ]
  });

  h += tlCard({
    label:'Auto-add water',
    value:autoWater,
    dot:autoWaterDot,

function tlRenderDriverAction(row, p) {

function tlRenderSystemStatusReal(row, p) {
  if(!p.event||!p.event.system_status) return tlRenderGeneric(row);
  var ss = p.event.system_status;
  var ts = tlFmtDT(p.time.seconds);

  // Map of component key → display name + how to get a reading value
  var COMP_MAP = [
    { key:'wirelessDrum',     label:'Wireless Drum',      reading: function(c){ return c.batteryVoltage ? c.batteryVoltage.toFixed(2)+'V' : 'Active'; } },
    { key:'iox',              label:'IOX',                reading: function(){ return 'Active'; } },
    { key:'inCabDisplay',     label:'In-Cab Display',     reading: function(c){ return c.version ? 'v'+c.version : 'Active'; } },
    { key:'externalDisplay',  label:'External Display',   reading: function(c){ return c.version ? 'v'+c.version : 'Active'; } },
    { key:'vnextSensorBoard', label:'Sensor Board',       reading: function(c){ return c.version ? 'v'+c.version : 'Active'; } },
    { key:'vnextWaterBoard',  label:'Water Board',        reading: function(c){ return c.version ? 'v'+c.version : 'Active'; } },
    { key:'pressureCharge',   label:'Charge Pressure',    reading: function(){ var d=ss.vnextSensorBoardDevices; return d&&d.pressureCharge ? tlKpa(d.pressureCharge.pressurePascal) : 'Connected'; } },
    { key:'pressureDischarge',label:'Discharge Pressure', reading: function(){ var d=ss.vnextSensorBoardDevices; return d&&d.pressureDischarge ? tlKpa(d.pressureDischarge.pressurePascal) : 'Connected'; } },
    { key:'cwr',              label:'CWR',                reading: function(c){ return c.temperatureCelsius !== undefined ? c.temperatureCelsius+'° C' : 'Active'; } },
    { key:'kzValveVnextAir',  label:'Air Valve',          reading: function(c){ return c.valveReportedPositionDegrees !== undefined ? c.valveReportedPositionDegrees+'°' : 'Active'; } },
    { key:'kzValveVnextTemperateWaterMain', label:'Water Valve', reading: function(c){ return c.valveReportedPositionDegrees !== undefined ? c.valveReportedPositionDegrees+'°' : 'Active'; } },
    { key:'wiredDrum',        label:'Wired Drum',         reading: function(){ return '—'; } },
    { key:'powerModule',      label:'Power Module',       reading: function(){ return '—'; } },
    { key:'jacketHeater',     label:'Jacket Heater',      reading: function(){ return '—'; } },
    { key:'fdmHeater',        label:'FDM Heater',         reading: function(){ return '—'; } },
    { key:'vnextAdmixBoard',  label:'Admix Board',        reading: function(){ return '—'; } },
    { key:'roboteq',          label:'Roboteq',            reading: function(){ return '—'; } },
  ];

  var online = [], offline = [];
  COMP_MAP.forEach(function(cm) {
    var comp = ss[cm.key];
    if(!comp) return;
    if(comp.alive) {
      online.push({ label: cm.label, reading: cm.reading(comp), lastSeen: comp.lastContactSeconds ? new Date(comp.lastContactSeconds*1000).toISOString().substr(11,8) : '—' });
    } else {
      offline.push(cm.label);
    }
  });

  // Status flags
  var flags = [];
  if(!ss.ignition)    flags.push('Ignition off');
  if(!ss.sensorPower) flags.push('Sensor power off');
  if(ss.ghostMode)    flags.push('Ghost mode active');
  if(ss.offMode)      flags.push('Off mode active');

  var flagType = flags.length ? 'warn' : 'info';
  var summaryMsg = flags.length
    ? flags.join(' — ')
    : online.length + ' of ' + (online.length+offline.length) + ' components online — '
      + (ss.operatingMode ? ss.operatingMode.mode : '') + ' / ' + (ss.operatingMode ? ss.operatingMode.localMode : '');

  var h = '';
  h += '<div class="tl-chip"><div class="tl-chip-left"><span class="tl-chip-dot" style="background:#3069e3;"></span><span class="tl-chip-label">System Status</span></div><span class="tl-chip-time">'+tlEsc(ts)+'</span></div>';
  h += tlFlag(summaryMsg, flagType);

  // Unified component table
  h += '<div class="tl-section-group">';
  h += '<div class="tl-section-hdr">Components ('+online.length+' online, '+offline.length+' no contact)</div>';
  h += '<div class="tl-comp-table">';
  h += '<div class="tl-comp-thead"><span style="flex:1;">Component</span><span style="width:68px;flex-shrink:0;text-align:right;">Last seen</span><span style="width:44px;flex-shrink:0;text-align:center;">—</span><span style="width:80px;flex-shrink:0;text-align:right;">Reading</span></div>';

  online.forEach(function(c, i) {
    h += '<div class="tl-comp-row'+(i%2===1?' alt':'')+'">';
    h += '<span class="tl-comp-name"><span class="tl-card-dot" style="background:#2ecf1d;flex-shrink:0;"></span>'+tlEsc(c.label)+'</span>';
    h += '<span class="tl-comp-seen">'+tlEsc(c.lastSeen)+'</span>';
    h += '<span class="tl-comp-errors no-errors" style="color:rgba(54,50,45,0.25);">—</span>';
    h += '<span class="tl-comp-status" style="color:var(--strong);font-weight:500;">'+tlEsc(c.reading)+'</span>';
    h += '</div>';
  });
  offline.forEach(function(name, i) {
    var alt = (online.length + i) % 2 === 1;
    h += '<div class="tl-comp-row'+(alt?' alt':'')+'">';
    h += '<span class="tl-comp-name"><span class="tl-card-dot" style="background:rgba(54,50,45,0.18);flex-shrink:0;"></span>'+tlEsc(name)+'</span>';
    h += '<span class="tl-comp-seen" style="color:rgba(54,50,45,0.25);">—</span>';
    h += '<span class="tl-comp-errors no-errors" style="color:rgba(54,50,45,0.25);">—</span>';
    h += '<span class="tl-comp-status no-contact">No Contact</span>';
    h += '</div>';
  });
  h += '</div></div>';
  return h;
}

  var locOk = p.event.location && p.event.location.status === 'VALID';

  // Translate error codes to plain English
  var TL_FLUID_ERRORS = {
    'FDM_ERROR':          'FDM hardware failure',
    'FLOW_TOO_LOW':       'Flow rate too low',
    'FLOW_TOO_HIGH':      'Flow rate too high',

    'VALVE_STUCK_CLOSED': 'Valve stuck closed',
    'TIMEOUT':            'Fluid add timed out',
    'TANK_EMPTY':         'Tank empty',

  var TL_FLUID_NAMES = {

function tlRenderIdentity(row, p) {

function tlRenderGeneric(row) {
  var p   = tlGetPayload(row);
  var ts  = tlFmtDT(p.time ? p.time.seconds : 0);

  // Extract top-level keys from the payload to give devs a field list to work from
  var payloadKeys = Object.keys(p).filter(function(k) {
    return ['message_type','time','sender_mac_id','accountId','truckId','truckName','pbversion','_note'].indexOf(k) === -1;
  });
  // Drill into the event sub-object if present
  var eventKeys = [];
  if (p.event) {
    eventKeys = Object.keys(p.event).filter(function(k) { return k !== 'event_type'; });
    // If there's a typed sub-object (driver_action, fluid_add, etc.) drill one more level
    eventKeys.forEach(function(k) {
      if (typeof p.event[k] === 'object' && p.event[k] !== null && !Array.isArray(p.event[k])) {
        Object.keys(p.event[k]).forEach(function(sub) {
          eventKeys.push(k + '.' + sub);
        });
      }
    });
  }
  var allKeys = payloadKeys.concat(eventKeys);

  var h = '';

  // Chip — same as every other template
  h += '<div class="tl-chip">';
  h += '<div class="tl-chip-left"><span class="tl-chip-dot" style="background:#3069e3;"></span><span class="tl-chip-label">'+tlEsc(row.sub)+'</span></div>';
  h += '<span class="tl-chip-time">'+tlEsc(ts)+'</span>';
  h += '</div>';

  // Dev contract notice — styled differently from a warning, more like a spec annotation
  h += '<div style="background:rgba(48,105,227,0.06);border:1px dashed rgba(48,105,227,0.3);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;">';
  h += '<div style="font-size:12px;font-weight:600;color:#2355c4;letter-spacing:0.3px;text-transform:uppercase;">Template needed — '+tlEsc(row.type)+' › '+tlEsc(row.sub)+'</div>';
  h += '<div style="font-size:13px;color:var(--defined);letter-spacing:-0.26px;line-height:1.5;">Pick 2–4 key signals from the fields below. Each becomes a card with a label, value, status dot, and optional expand rows.</div>';
  h += '</div>';

  // Field list — shows devs exactly what's available in the payload
  if(allKeys.length > 0) {
    h += '<div class="tl-section-group">';
    h += '<div class="tl-section-hdr">Available fields</div>';
    h += '<div class="tl-comp-table">';
    h += '<div class="tl-comp-thead"><span style="flex:1;">Field</span><span style="flex:1;text-align:right;">Sample value</span></div>';
    allKeys.forEach(function(key, i) {
      // Resolve nested value
      var val = p;
      key.split('.').forEach(function(part) {
        val = val && typeof val === 'object' ? (val[part] !== undefined ? val[part] : val.event ? val.event[part] : '—') : '—';
      });
      if (typeof val === 'object') val = JSON.stringify(val);
      var muted = !tlOk(val) || val === '—' || val === null;
      h += '<div class="tl-comp-row'+(i%2===1?' alt':'')+'" style="min-height:36px;">';
      h += '<span style="flex:1;font-family:var(--font-mono);font-size:12px;color:var(--soft);">'+tlEsc(key)+'</span>';
      h += '<span style="flex:1;text-align:right;font-size:13px;'+(muted?'color:var(--subtle);font-style:italic;':'color:var(--strong);font-weight:500;')+'">'+tlEsc(muted?'—':String(val))+'</span>';
      h += '</div>';
    });
    h += '</div></div>';
  } else {
    // No payload captured yet — show the skeleton with question marks
    h += '<div class="tl-section-group">';
    h += '<div class="tl-section-hdr">Key signals — to be defined</div>';
    h += '<div class="tl-card-stack">';
    h += tlCard({label:'Signal 1', value:'?', dot:'rgba(54,50,45,0.2)'});
    h += tlCard({label:'Signal 2', value:'?', dot:'rgba(54,50,45,0.2)'});
    h += tlCard({label:'Signal 3', value:'?', dot:'rgba(54,50,45,0.2)'});
    h += '</div></div>';
  }

  return h;
}

var TL_ONLINE_COMPONENTS = [
  { name:'Wireless Drum',     value:'3.54V',    dot:'#2ecf1d', detail:[['Last Seen:','13:49:59'],['Start Up Count:','1'],['Error Count:','0']] },

var TL_OFFLINE_COMPONENTS = [
  'Wired Drum','Roboteq','Power Module','FDM Heater','Jacket Heater',

function tlRenderSystemStatus(row, ts, shutdownType) {
  var online  = TL_ONLINE_COMPONENTS.length;
  var offline = TL_OFFLINE_COMPONENTS.length;
  var total   = online + offline;
  var errored = TL_ONLINE_COMPONENTS.filter(function(c){ return c.detail && parseInt(c.detail[2][1]) > 0; }).length;
  var isShutdown = row.sub === 'Shutdown';

  // Shutdown type flag — only meaningful on StartUp (tells us how last session ended)
  var shutdownFlagH = '';
  if (!isShutdown && shutdownType) {
    if (shutdownType === 'DIRTY') {
      shutdownFlagH = tlFlag('Previous shutdown was unclean — power may have been cut unexpectedly. Previous session data may be incomplete.', 'warn');
    } else if (shutdownType === 'CLEAN') {
      shutdownFlagH = tlFlag('Previous shutdown was clean.', 'info');
    }
  }

  // Component summary flag
  var flagType, flagMsg;
  if (errored > 0) {
    flagType = 'warn';
    flagMsg  = errored + ' component' + (errored > 1 ? 's' : '') + ' reporting errors — ' + online + ' of ' + total + ' online at ' + (isShutdown ? 'shutdown' : 'startup');
  } else if (offline > 0) {
    flagType = 'info';
    flagMsg  = online + ' of ' + total + ' components online at ' + (isShutdown ? 'shutdown' : 'startup') + ' — ' + offline + ' no contact';
  } else {
    flagType = 'info';
    flagMsg  = 'All ' + total + ' components online at ' + (isShutdown ? 'shutdown' : 'startup') + ' — no errors';
  }

  var h = '';
  h += '<div class="tl-chip"><div class="tl-chip-left"><span class="tl-chip-dot" style="background:#3069e3;"></span><span class="tl-chip-label">'+(isShutdown ? 'Shutdown' : 'StartUp')+' Event</span></div><span class="tl-chip-time">'+tlEsc(ts)+'</span></div>';
  h += shutdownFlagH;
  h += tlFlag(flagMsg, flagType);

  h += '<div class="tl-section-group">';
  h += '<div class="tl-section-hdr">Components ('+TL_ONLINE_COMPONENTS.length+' online, '+TL_OFFLINE_COMPONENTS.length+' no contact)</div>';
  h += '<div class="tl-comp-table">';

  // Header
  h += '<div class="tl-comp-thead">';
  h += '<span style="flex:1;">Component</span>';
  h += '<span style="width:68px;flex-shrink:0;text-align:right;">Last seen</span>';
  h += '<span style="width:44px;flex-shrink:0;text-align:center;">Errors</span>';
  h += '<span style="width:80px;flex-shrink:0;text-align:right;">Reading</span>';
  h += '</div>';

  // Online rows
  TL_ONLINE_COMPONENTS.forEach(function(c, i) {
    var lastSeen = c.detail ? c.detail[0][1] : '—';
    var errors   = c.detail ? parseInt(c.detail[2][1]) : 0;
    var errCls   = errors > 0 ? 'has-errors' : 'no-errors';
    h += '<div class="tl-comp-row'+(i%2===1?' alt':'')+'">';
    h += '<span class="tl-comp-name"><span class="tl-card-dot" style="background:'+c.dot+';flex-shrink:0;"></span>'+tlEsc(c.name)+'</span>';
    h += '<span class="tl-comp-seen">'+tlEsc(lastSeen)+'</span>';
    h += '<span class="tl-comp-errors '+errCls+'">';
    if (errors > 0) {
      h += '<button class="tl-err-link" onclick="tlDrillErrors(\''+tlEsc(c.name)+'\')">'+errors+'</button>';
    } else {
      h += '0';
    }
    h += '</span>';
    h += '<span class="tl-comp-status" style="color:var(--strong);font-weight:500;">'+tlEsc(c.value)+'</span>';
    h += '</div>';
  });

  // Offline rows
  TL_OFFLINE_COMPONENTS.forEach(function(name, i) {
    var alt = (TL_ONLINE_COMPONENTS.length + i) % 2 === 1;
    h += '<div class="tl-comp-row'+(alt?' alt':'')+'">';
    h += '<span class="tl-comp-name"><span class="tl-card-dot" style="background:rgba(54,50,45,0.18);flex-shrink:0;"></span>'+tlEsc(name)+'</span>';
    h += '<span class="tl-comp-seen" style="color:rgba(54,50,45,0.25);">—</span>';
    h += '<span class="tl-comp-errors no-errors" style="color:rgba(54,50,45,0.25);">—</span>';
    h += '<span class="tl-comp-status no-contact">No Contact</span>';
    h += '</div>';
  });

  h += '</div></div>';
  return h;
}

function tlRenderStructured(row) {
  var p = tlGetPayload(row);
  if (row.type==='Event' && row.sub==='SystemStatus' && p.event && p.event.system_status) {
    return tlRenderSystemStatusReal(row, p);
  }
  if (row.type==='Event' && (row.sub==='StartUp'||row.sub==='Shutdown'||row.sub==='SystemStatus')) {
    var shutdownType = p.event && p.event.startup ? p.event.startup.previousShutdownType
                     : p.event && p.event.shutdown ? p.event.shutdown.shutdownType
                     : null;
    return tlRenderSystemStatus(row, tlFmtDT(p.time.seconds), shutdownType);
  }
  if (row.type==='Event' && row.sub==='TruckHealth')      return tlRenderTruckHealth(row, p);
  if (row.type==='Event' && row.sub==='FluidError')       return tlRenderFluidError(row, p);
  if (row.type==='Identity')                              return tlRenderIdentity(row, p);
  if (row.type==='Event' && row.sub==='TicketReceived')  return tlRenderTicketReceived(row, p);
  if (row.type==='Event' && row.sub==='DriverAction')    return tlRenderDriverAction(row, p);
  if (row.type==='Event' && row.sub==='ConcreteStatus') return tlRenderConcreteStatus(row, p);
  if (row.type==='Event' && row.sub==='FluidAdd')       return tlRenderFluidAdd(row, p);
  if (row.type==='BackendRequest')                      return tlRenderBackend(row, p);
  if (row.type==='DeviceBinding')                       return tlRenderDeviceBinding(row, p);
  if (row.type==='WirelessDrumBinding')                 return tlRenderWireless(row, p);
  return tlRenderGeneric(row);
}

/* ── Error drill-in ──
   Called when an FST taps an error count in the component table.
   Filters the log list to the most likely related event types for
   that component, selects the first match, and scrolls it into view.
   Note: in production this would filter by component name + timestamp
   proximity. For this prototype we match by most likely sub-types. */
var TL_ERROR_SUBTYPES = {
  'CWR':               ['TruckHealth'],
  'Wireless Drum':     ['TruckHealth','WirelessDrumBinding'],
  'Discharge Pressure':['TruckHealth','FluidError'],
  'Charge Pressure':   ['TruckHealth','FluidError'],
  'Bus Power':         ['TruckHealth'],
  'IOX':               ['TruckHealth'],
};

var TL_ERR_BANNER_ID = 'tl-err-banner';

function tlDrillErrors(componentName) {
  // Clear any existing drill banner
  var existing = document.getElementById(TL_ERR_BANNER_ID);
  if (existing) existing.remove();

  var subtypes = TL_ERROR_SUBTYPES[componentName] || ['TruckHealth','FluidError'];

  // Find matching rows
  var matches = TL_ROWS.filter(function(r) {
    return subtypes.indexOf(r.sub) !== -1;
  });

  if (!matches.length) return;

  // Apply a search filter so only these rows show
  // We highlight via the search field using the component name context
  // Reset filters first, then set search to match subtypes
  tlFilters.msgType = 'all';
  tlFilters.subType = 'all';
  tlFilters.search  = '';

  // Directly filter to matching IDs by setting a special drill mode
  tlDrillIds = matches.map(function(r){ return r.id; });
  tlLogsRender();

  // Show a contextual banner above the table explaining the filter
  var tableWrap = document.querySelector('.tl-table-wrap');
  if (tableWrap) {
    var banner = document.createElement('div');
    banner.id = TL_ERR_BANNER_ID;
    banner.style.cssText = 'margin:8px 24px;padding:11px 14px;background:rgba(215,1,0,0.06);border:1px solid rgba(215,1,0,0.15);border-radius:8px;font-size:13px;color:#a80000;letter-spacing:-0.26px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;';
    banner.innerHTML = '<span>Showing likely error events for <strong>'+componentName+'</strong> — prototype best guess</span>'
      + '<button onclick="tlClearDrill()" style="background:none;border:none;font-family:var(--font);font-size:12px;color:#a80000;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;padding:0;">Clear</button>';
    tableWrap.parentNode.insertBefore(banner, tableWrap);
  }

  // Select and open the first match
  tlSelectRow(matches[0].id);

  // Scroll table wrap to top so FST sees the filtered results
  if (tableWrap) tableWrap.scrollTop = 0;
}

function tlClearDrill() {
  tlDrillIds = null;
  var banner = document.getElementById(TL_ERR_BANNER_ID);
  if (banner) banner.remove();
  tlLogsRender();
}

var tlDrillIds = null;

function tlLogsRender() {
  var tbody=document.getElementById('tl-logs-tbody');
  if(!tbody)return;
  var f=tlFilters, search=(f.search||'').trim().toLowerCase();
  function toDate(str){var m=str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);return m?new Date(+m[3],+m[1]-1,+m[2]):null;}
  var fromD=f.from?new Date(f.from):null, toD=f.to?new Date(f.to):null;
  var rows=TL_ROWS.filter(function(r){
    if(tlDrillIds&&tlDrillIds.indexOf(r.id)===-1)return false;
    if(f.source!=='all'&&r.source!==f.source)return false;
    if(f.msgType!=='all'&&r.type!==f.msgType)return false;
    if(f.subType!=='all'&&r.sub!==f.subType)return false;
    var d=toDate(r.date);
    if(fromD&&d&&d<fromD)return false;
    if(toD&&d&&d>toD)return false;
    if(search){var hay=(r.date+' '+r.time+' '+r.sentTime+' '+r.source+' '+r.type+' '+r.sub).toLowerCase();if(!hay.includes(search))return false;}
    return true;
  });
  if(!rows.length){tbody.innerHTML='<tr><td colspan="5" class="tl-empty">No logs match the current filters</td></tr>';return;}
  tbody.innerHTML=rows.map(function(r){
    return '<tr class="'+(r.id===tlSelId?'active':'')+'" onclick="tlSelectRow('+r.id+')">'+
      '<td>'+r.date+' '+r.time+'</td><td>'+r.sentTime+'</td><td>'+r.source+'</td><td>'+r.type+'</td><td>'+r.sub+'</td>'+
      '</tr>';
  }).join('');
}

/* Open drawer immediately on load */
window.addEventListener('DOMContentLoaded', function() {
  tlOpen();
});

</script>
</body>
</html>
