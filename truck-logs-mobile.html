<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifi – Truck Logs Mobile Prototype</title>
<style>
  /* ─── TRINITY TOKENS ─────────────────────────────────────── */
  :root {
    --base:          #f6f4f2;
    --layer-1:       #ffffff;
    --layer-2:       #f6f4f2;
    --strong:        #36322d;
    --defined:       #36322dc2;
    --soft:          #36322d9e;
    --subtle:        #36322d80;
    --border:        #36322d24;
    --border-mid:    rgba(54,50,45,0.30);
    --blue:          #3069e3;
    --blue-link:     #295ccc;
    --red:           #d70100;
    --amber:         #ffba0d;
    --radius-sm:     4px;
    --radius-md:     16px;
    --radius-lg:     24px;
    --font:          'ABC Repro', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  /* ─── HIDE SCROLLBARS ───────────────────────────────────── */
  .phone * { scrollbar-width: none; -ms-overflow-style: none; }
  .phone *::-webkit-scrollbar { display: none; }

  /* ─── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  button { font-family: var(--font); cursor: pointer; background: none; border: none; }
  input, select { font-family: var(--font); }
  body {
    background: #d4d0cb;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px 80px;
    font-family: var(--font);
  }

  /* ─── PHONE SHELL ────────────────────────────────────────── */
  .phone-wrap {
    position: relative;
    flex-shrink: 0;
  }

  /* Side buttons */
  .phone-wrap::before {
    content: '';
    position: absolute;
    left: -3px; top: 120px;
    width: 3px; height: 36px;
    background: #3a3a3a;
    border-radius: 2px 0 0 2px;
    box-shadow: 0 50px 0 #3a3a3a, 0 100px 0 #3a3a3a;
  }
  .phone-wrap::after {
    content: '';
    position: absolute;
    right: -3px; top: 160px;
    width: 3px; height: 64px;
    background: #3a3a3a;
    border-radius: 0 2px 2px 0;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--base);
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    /* Outer bezel */
    outline: 10px solid #2a2a2a;
    outline-offset: 0;
    box-shadow:
      0 0 0 1px #111,
      0 0 0 2px #444,
      0 30px 80px rgba(0,0,0,0.7),
      0 8px 20px rgba(0,0,0,0.5);
  }

  /* Dynamic island / notch */
  .phone-notch {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #111;
    border-radius: 20px;
    z-index: 999;
  }

  /* ─── SCREENS ────────────────────────────────────────────── */
  /* All screens are stacked; JS toggles .active */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }
  /* push content below the dynamic island */
  .screen > :first-child { margin-top: 54px; }

  /* ─── SHARED TOP NAV ─────────────────────────────────────── */
  .top-nav {
    background: var(--base);
    display: flex;
    align-items: center;
    padding: 12px 12px;
    position: relative;
    flex-shrink: 0;
  }
  .hamburger { display: flex; flex-direction: column; gap: 4px; width: 18px; }
  .hamburger span { display: block; height: 1.5px; background: var(--strong); border-radius: 1px; }
  .bell-dot {
    position: absolute; top: 8px; right: 8px;
    width: 8px; height: 8px;
    background: var(--red); border-radius: 50%;
    border: 1.5px solid var(--base);
  }

  /* ─── SCROLLABLE BODY ────────────────────────────────────── */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    background: var(--layer-1);
    -webkit-overflow-scrolling: touch;
  }

  /* ─── MAIN TRUCK LIST ────────────────────────────────────── */
  .page-pad { padding: 16px; }
  .page-title {
    font-size: 24px; font-weight: 500; color: var(--strong);
    letter-spacing: -0.72px; line-height: 1.2;
    padding: 8px;
  }
  .page-sub {
    font-size: 12px; color: var(--soft);
    padding: 0 8px 8px;
  }
  .filter-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 4px 0 10px;
  }
  .btn-pill {
    display: flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); border-radius: 32px;
    padding: 8px 12px; font-size: 14px; color: var(--strong);
    letter-spacing: -0.28px;
  }
  .btn-pill + .btn-pill { margin-left: 6px; }
  .left-filters { display: flex; }
  .view-toggle {
    display: flex; border: 1px solid var(--border); border-radius: 32px; overflow: hidden;
  }
  .vt-btn { padding: 8px 11px; display: flex; align-items: center; justify-content: center; }
  .vt-btn.on { background: var(--blue); }
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--border); border-radius: 24px;
    padding: 10px 14px; margin-bottom: 10px;
  }
  .search-bar input {
    flex: 1; border: none; outline: none;
    font-size: 14px; color: var(--soft);
    background: none; letter-spacing: -0.28px;
  }
  .wts-option {
    font-size: 14px; color: var(--soft); padding: 8px 10px;
    border-radius: 4px; cursor: pointer; letter-spacing: -0.28px;
    line-height: 1.3;
  }
  .wts-option:active { background: var(--layer-2); }
  .wts-active { color: var(--strong); font-weight: 500; }
  .overview-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border-mid); border-radius: 32px;
    padding: 8px 14px; font-size: 14px; font-weight: 500;
    color: var(--strong); margin-bottom: 10px;
    letter-spacing: -0.28px; background: none; cursor: pointer;
  }

  /* ─── TRUCK TABLE ────────────────────────────────────────── */
  .src-cell  { font-size: 12px; line-height: 1.25; }
  .age-cell  { font-size: 12px; color: var(--soft) !important; }

  .group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 8px; background: var(--layer-1);
    border-bottom: 1px solid var(--border-mid);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .group-header:active { background: var(--layer-2); }
  .group-badge {
    display: flex; align-items: center; justify-content: center;
    background: var(--red); border-radius: 4px;
    min-width: 24px; height: 20px; padding: 0 4px;
    font-size: 12px; font-weight: 400; color: white;
    letter-spacing: -0.24px; flex-shrink: 0;
  }
  .group-label { font-size: 14px; color: var(--strong); letter-spacing: -0.28px; line-height: 1.3; }

  .tbl-head {
    display: grid;
    grid-template-columns: 74px 80px 48px 68px 82px;
  }
  .th {
    font-size: 14px; font-weight: 500; color: var(--strong);
    padding: 8px; letter-spacing: -0.28px; line-height: 1.3;
  }
  .th:first-child { border-right: 1.5px solid var(--border); }

  .truck-row {
    display: grid;
    grid-template-columns: 74px 80px 48px 68px 82px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .truck-row:nth-child(odd)  { background: var(--layer-1); }
  .truck-row:nth-child(even) { background: var(--layer-2); }
  .td {
    font-size: 14px; color: var(--defined);
    padding: 8px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 5px;
    letter-spacing: -0.28px; line-height: 1.3;
  }
  .td.truck-num {
    border-right: 1.5px solid var(--border);
    justify-content: flex-end; gap: 4px; overflow: visible;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 5px; border-radius: var(--radius-sm);
    font-size: 11px; font-weight: 500;
  }
  .badge.err { background: var(--red); color: #fff; }
  .badge.wrn { background: var(--amber); color: var(--strong); }

  /* expanded content */
  .exp-wrap { display: none; background: var(--layer-2); }
  .exp-wrap.open { display: block; padding-bottom: 15px; }
  .exp-row {
    display: grid; grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .exp-label {
    font-size: 14px; font-weight: 500; color: var(--strong);
    padding: 8px; letter-spacing: -0.28px;
  }
  .exp-val {
    font-size: 14px; color: var(--defined);
    padding: 8px; letter-spacing: -0.28px;
    display: flex; align-items: center; gap: 6px;
  }
  .view-truck-btn {
    display: block; width: calc(100% - 16px); margin: 12px 8px;
    background: var(--blue); color: #fff;
    border-radius: 32px; padding: 11px;
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.28px; text-align: center;
  }

  /* ─── DRAWER (slides from right over whole phone) ────────── */
  .drawer {
    position: absolute; inset: 0;
    background: var(--layer-1);
    border-radius: 44px; overflow: hidden;
    display: flex; flex-direction: column;
    padding-top: 54px;
    transform: translateX(100%);
    transition: transform 0.30s cubic-bezier(0.4,0,0.2,1);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-nav-bar { position: relative; z-index: 20; background: var(--layer-1); }

  .drawer-chrome { display: none; }
  .chrome-btns { display: flex; align-items: center; gap: 5px; }
  .chrome-btn {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .chrome-btn--border {
    border: 1px solid var(--border); background: none;
  }
  .chrome-btn--border:active { background: var(--layer-2); }
  .chrome-btn--dark {
    background: var(--strong); border: none;
  }
  .chrome-btn--dark:active { opacity: 0.8; }

  /* ─── DRAWER CHROME ROW ──────────────────────────────────── */
  .d-chrome {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 14px 12px; flex-shrink: 0;
  }
  .d-truck-id { display: flex; align-items: center; gap: 10px; }
  .d-truck-label { font-size: 20px; font-weight: 500; color: var(--strong); letter-spacing: -0.5px; }
  .d-ign-pill {
    display: flex; align-items: center; gap: 5px;
    background: #d5f1d2; border-radius: 20px; padding: 5px 10px;
    font-size: 13px; font-weight: 500; color: #1e6252;
  }
  .d-ign-dot { width: 7px; height: 7px; background: #16a34a; border-radius: 50%; flex-shrink: 0; }
  .d-chrome-btns { display: flex; align-items: center; gap: 5px; }

  /* ─── DRAWER NAV ROW ─────────────────────────────────────── */
  .d-nav-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 12px; flex-shrink: 0;
  }
  .d-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border-mid); border-radius: 32px;
    padding: 9px 14px; font-size: 14px; font-weight: 500;
    color: var(--strong); letter-spacing: -0.28px; background: none;
    cursor: pointer;
  }
  .d-pill:active { background: var(--layer-2); }

  /* ─── DRAWER CONTENT AREA ────────────────────────────────── */
  /* Single content pane — JS swaps between "logs-list" and "logs-detail" states */
  .drawer-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ── LOG LIST state ── */
  .log-filters {
    padding: 10px 16px 8px; border-bottom: 1px solid var(--border);
    display: flex; gap: 6px; flex-shrink: 0;
  }
  .date-btn {
    display: flex; align-items: center; gap: 5px;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 10px; font-size: 12px; color: var(--defined);
    flex-shrink: 0; letter-spacing: -0.2px;
  }
  .log-sel {
    flex: 1; border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 10px; font-size: 12px; color: var(--defined);
    background: none; appearance: none; letter-spacing: -0.2px;
    min-width: 0;
  }
  .log-tbl-head {
    display: grid; grid-template-columns: 120px 1fr 1fr;
    padding: 0 16px; background: var(--layer-1);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .log-th {
    font-size: 12px; font-weight: 500; color: var(--strong);
    padding: 8px 5px; letter-spacing: -0.2px;
  }
  .log-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .log-row {
    display: grid; grid-template-columns: 120px 1fr 1fr;
    padding: 0 16px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .log-row:nth-child(odd)  { background: var(--layer-1); }
  .log-row:nth-child(even) { background: var(--layer-2); }
  .log-row.sel { background: rgba(48,105,227,0.07); }
  .log-td {
    font-size: 12px; color: var(--defined);
    padding: 9px 5px; border-bottom: 1px solid var(--border);
    line-height: 1.35; letter-spacing: -0.2px;
  }
  .log-td.time { display: flex; flex-direction: column; gap: 1px; }
  .t-main { font-size: 12px; color: var(--defined); }
  .t-sub  { font-size: 11px; color: var(--soft); }

  /* ── LOG DETAIL state — takes over the whole drawer body ── */
  .log-detail-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--layer-1);
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--strong); font-size: 14px; font-weight: 500;
    letter-spacing: -0.28px; padding: 8px 14px;
    border: 1px solid var(--border-mid); border-radius: 32px;
    background: none; flex-shrink: 0;
  }
  .back-btn:active { background: var(--layer-2); }
  .detail-chrome { display: none; }

  /* title+meta — centred, right of pill */
  .det-event-header-inline {
    flex: 1; min-width: 0; text-align: right;
  }
  .det-event-title-inline {
    font-size: 14px; font-weight: 500; color: var(--strong);
    letter-spacing: -0.28px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .det-event-meta-inline {
    font-size: 12px; color: var(--soft); letter-spacing: -0.2px; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .detail-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 16px; flex-shrink: 0; background: var(--layer-1);
  }
  .det-tab {
    font-size: 14px; color: var(--soft);
    padding: 10px 8px; border-bottom: 2px solid transparent;
    letter-spacing: -0.28px; cursor: pointer;
  }
  .det-tab.on { color: var(--strong); border-bottom-color: var(--strong); font-weight: 500; }

  .detail-scroll { flex: 1; overflow-y: auto; padding: 11px 22px; background: var(--layer-2); -webkit-overflow-scrolling: touch; }

  /* inline event header in back bar */
  .det-event-header-inline { flex: 1; padding: 0 8px; min-width: 0; }
  .det-event-title-inline { font-size: 13px; font-weight: 500; color: var(--strong); letter-spacing: -0.28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .det-event-meta-inline  { font-size: 11px; color: var(--subtle); letter-spacing: -0.2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* event summary card */
  .det-event-card { background: var(--layer-1); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .det-event-card-left { display: flex; align-items: center; gap: 8px; }
  .det-event-blue-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; flex-shrink: 0; }
  .det-event-name { font-size: 15px; font-weight: 500; color: var(--strong); letter-spacing: -0.3px; }
  .det-event-ts   { font-size: 14px; color: var(--subtle); letter-spacing: -0.28px; flex-shrink: 0; }

  /* section label */
  .det-section-label { font-size: 14px; color: var(--strong); letter-spacing: -0.28px; margin-bottom: 10px; }

  /* component cards */
  .comp-card { background: var(--layer-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; margin-bottom: 10px; }
  .comp-card-row { display: flex; align-items: center; justify-content: space-between; }
  .comp-card-left { display: flex; align-items: center; gap: 12px; }
  .comp-card-name { font-size: 16px; font-weight: 500; color: var(--strong); letter-spacing: -0.32px; }
  .comp-card-right { display: flex; align-items: center; gap: 10px; }
  .comp-card-val { font-size: 16px; font-weight: 500; color: var(--strong); letter-spacing: -0.32px; }
  .comp-chevron { color: var(--soft); font-size: 13px; line-height: 1; }
  .comp-card-details { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .comp-detail-row { display: flex; justify-content: space-between; }
  .comp-detail-k { font-size: 14px; color: var(--soft); letter-spacing: -0.28px; }
  .comp-detail-v { font-size: 14px; color: var(--strong); letter-spacing: -0.28px; }

  /* no contact table */
  .nc-table { background: var(--layer-1); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 14px; }
  .nc-table-head { display: grid; grid-template-columns: 1fr 1fr; background: var(--layer-1); }
  .nc-th { font-size: 13px; font-weight: 500; color: var(--defined); padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .nc-tr { display: grid; grid-template-columns: 1fr 1fr; }
  .nc-tr:nth-child(even) { background: var(--layer-2); }
  .nc-td { font-size: 13px; color: var(--defined); padding: 8px 10px; border-bottom: 1px solid var(--border); }

  /* structured content */
  .sec-label {
    font-size: 11px; font-weight: 500; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 6px; margin-top: 4px;
  }
  .comp-row {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .comp-left { display: flex; align-items: flex-start; gap: 8px; }
  .s-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .s-dot.g { background: #16a34a; }
  .s-dot.r { background: var(--red); }
  .s-dot.x { background: #9ca3af; }
  .comp-name { font-size: 14px; color: var(--strong); letter-spacing: -0.28px; }
  .comp-sub  { font-size: 11px; color: var(--soft); margin-top: 2px; letter-spacing: -0.2px; }
  .comp-val  { font-size: 13px; color: var(--defined); font-weight: 500; letter-spacing: -0.2px; flex-shrink: 0; }
  .nc-row {
    display: flex; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .nc-l { font-size: 13px; color: var(--defined); letter-spacing: -0.2px; }
  .nc-r { font-size: 13px; color: var(--soft); letter-spacing: -0.2px; }
  .caveat {
    background: rgba(48,105,227,0.06);
    border: 1px solid rgba(48,105,227,0.2);
    border-radius: 8px; padding: 10px 12px; margin-top: 14px;
  }
  .caveat p { font-size: 12px; color: var(--blue); line-height: 1.55; letter-spacing: -0.2px; }

  /* raw json */
  .raw-block {
    background: var(--layer-2); border-radius: 8px;
    padding: 12px; font-family: monospace;
    font-size: 11px; color: var(--defined);
    line-height: 1.75; overflow-x: auto; white-space: pre;
  }

  /* summary */
  .sum-kv {
    display: flex; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .sum-k { font-size: 13px; color: var(--soft); letter-spacing: -0.2px; }
  .sum-v { font-size: 13px; color: var(--strong); font-weight: 500; letter-spacing: -0.2px; }
  .sum-desc {
    font-size: 14px; color: var(--strong);
    line-height: 1.6; margin-bottom: 14px;
    letter-spacing: -0.28px;
  }
</style>
</head>
<body>

<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>

  <!-- ══════════════════════════════════════════════════════════
       SCREEN 1 — MAIN TRUCK LIST
  ═══════════════════════════════════════════════════════════ -->
  <div class="screen active" id="s-main">
    <div class="top-nav">
      <!-- Hamburger -->
      <button style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;flex-shrink:0;">
        <div class="hamburger"><span></span><span></span><span></span></div>
      </button>
      <!-- Logo centred absolutely -->
      <div style="position:absolute;left:50%;transform:translateX(-50%);">
        <svg width="28" height="16" viewBox="0 0 28 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.3958 0H0V3.1785H9.15381L0.367992 15.9386H8.00383L12.6497 3.22457C13.1097 1.98081 12.4197 0 10.3958 0ZM16.6517 0C14.6277 0 13.9377 1.98081 14.3977 3.22457L19.0436 15.9386H26.6794L17.8936 3.1785H27.0474V0H16.6517Z" fill="#36322D"/></svg>

          <div class="exp-row"><div class="exp-label">Account</div><div class="exp-val">${t.account}</div></div>
          <div class="exp-row"><div class="exp-label">Age</div><div class="exp-val">${t.age}</div></div>
          <div class="exp-row"><div class="exp-label">Connection</div><div class="exp-val" style="gap:5px;display:flex;align-items:center;">${connIcon}</div></div>
          <div class="exp-row"><div class="exp-label">Last Seen</div><div class="exp-val">1:16 PM 07/23/25</div></div>
          <button class="view-truck-btn" onclick="openDrawer(${i})">View Truck</button>
        </div>` : `<div class="exp-wrap"></div>`;

      html += `
        <div>
          <div class="truck-row" style="${rowBg}" onclick="toggleTruck(${i})">
            <div class="td truck-num">
              ${chevSvg(isOpen ? 180 : 90)}
              ${t.num}
            </div>
            <div class="td src-cell">${t.source === 'Customer Ticket' ? 'Customer' : 'System'}</div>
            <div class="td">${t.ign}</div>
            <div class="td age-cell">${t.age}</div>
            <div class="td">${badges}${emptyAlert}</div>
          </div>
          ${expHtml}
        </div>`;
    });
  });

  document.getElementById('truck-list').innerHTML = html;
}

function toggleGroup(gi) {
  truckGroups[gi].open = truckGroups[gi].open === false ? true : false;
  renderTrucks();
}

function toggleTruck(i) {
  expanded[i] = !expanded[i];
  renderTrucks();
  /* if expanding, scroll so the full expanded row is visible */
  if (expanded[i]) {
    setTimeout(() => {
      const row = document.querySelector(`[data-truck-idx="${i}"]`);
      if (row) {
        const scrollBody = document.querySelector('#s-main .scroll-body');
        const rowBottom = row.getBoundingClientRect().bottom;
        const containerBottom = scrollBody.getBoundingClientRect().bottom;
        const gap = 10;
        if (rowBottom > containerBottom - gap) {
          scrollBody.scrollBy({ top: rowBottom - containerBottom + gap, behavior: 'smooth' });
        }
      }
    }, 50);
  }
}

/* ── SHARED CHEVRON ──────────────────────────────── */
/* rotate(0) = up (open group), rotate(180) = down (closed group), rotate(90) = right (collapsed truck row) */
const chevSvg = (deg) => `<svg width="10" height="6" viewBox="0 0 10 6" fill="none" style="transform:rotate(${deg}deg);flex-shrink:0;"><path d="M8.75 4.75L4.75 0.75L0.75 4.75" stroke="#36322D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function openDrawer(i) {
  document.getElementById('drawer-truck-num').textContent = 'Truck: ' + trucks[i].num;
  renderLogRows();
  showLogList();
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.querySelector('.d-chrome').style.display = 'flex';
  document.querySelector('.d-nav-row').style.display = 'flex';
}

/* ── LOG LIST ────────────────────────────────────── */
function renderLogRows() {
  document.getElementById('log-scroll').innerHTML = logs.map((l,i) => `
    <div class="log-row" id="lr-${i}" onclick="openDetail(${i})"
         style="${i%2===0?'background:var(--layer-1)':'background:var(--layer-2)'}">
      <div class="log-td time"><span class="t-main">${l.date}</span><span class="t-sub">${l.time}</span></div>
      <div class="log-td">${l.type}</div>
      <div class="log-td">${l.sub}</div>
    </div>`).join('');
}

function showLogList() {
  document.getElementById('state-list').style.display = 'flex';
  document.getElementById('state-detail').style.display = 'none';
  document.querySelector('.d-chrome').style.display = 'flex';
  document.querySelector('.d-nav-row').style.display = 'flex';
}

/* ── LOG DETAIL ─────────────────────────────────── */
function openDetail(i) {
  document.querySelectorAll('.log-row').forEach(r => r.style.background = '');
  const row = document.getElementById('lr-'+i);
  if (row) row.style.background = 'rgba(48,105,227,0.07)';

  document.getElementById('det-title').textContent = logs[i].sub + ' Event';
  const meta = logs[i].date + ' ' + logs[i].time + ' · TRUCK · ' + logs[i].type;
  document.getElementById('det-meta').textContent = meta.length > 40 ? meta.substring(0, 38) + '...' : meta;

  activeTab = 'structured';
  document.querySelectorAll('.det-tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.det-tab')[1].classList.add('on');
  renderDetailContent('structured');

  /* hide chrome + nav, show detail */
  document.querySelector('.d-chrome').style.display = 'none';
  document.querySelector('.d-nav-row').style.display = 'none';
  document.getElementById('state-list').style.display = 'none';
  document.getElementById('state-detail').style.display = 'flex';
}

/* ── DETAIL TABS ─────────────────────────────────── */
function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.det-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderDetailContent(tab);
}

function renderDetailContent(tab) {
  const area = document.getElementById('detail-scroll');
  area.scrollTop = 0;

  if (tab === 'structured') {
    area.innerHTML = `
      <div class="det-section-label" style="margin-top:4px;">Online (7) - Expand All</div>

      <div class="comp-card">
        <div class="comp-card-row">
          <div class="comp-card-left"><div class="s-dot g"></div><span class="comp-card-name">Wireless Drum</span></div>
          <div class="comp-card-right">
            <span class="comp-card-val">3.54V</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#36322d9e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="comp-card-details">
          <div class="comp-detail-row"><span class="comp-detail-k">Last Seen:</span><span class="comp-detail-v">13:49:59</span></div>
          <div class="comp-detail-row"><span class="comp-detail-k">Start Up Count:</span><span class="comp-detail-v">1</span></div>
          <div class="comp-detail-row"><span class="comp-detail-k">Error Count:</span><span class="comp-detail-v">0</span></div>
        </div>
      </div>

      ${[
        ['IOX',               'g', '12.92 V'],
        ['In-Cab Dsplay',     'g', 'Active' ],
        ['External Display',  'g', 'Active' ],
        ['Bus Power',         'g', '12.76V' ],
        ['Discharge Pressure','g', 'Connected'],
        ['Charge Pressure',   'g', 'Connected'],
        ['CWR',               'g', '45° C'  ],
      ].map(([n,c,v]) => `
        <div class="comp-card">
          <div class="comp-card-row">
            <div class="comp-card-left"><div class="s-dot ${c}"></div><span class="comp-card-name">${n}</span></div>
            <div class="comp-card-right">
              <span class="comp-card-val">${v}</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#36322d9e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>`).join('')}

      <div class="nc-table">
        <div class="nc-table-head">

        </div>
        ${['Wired Drum','Roboteq','Power Module','FDM Heater','Jacket Heater','Admix Board'].map(n=>`

        <p>This snapshot reflects truck state at the moment this event was recorded — not current status. Review logs before and after this event to understand the full picture.</p>

  } else if (tab === 'summary') {
    area.innerHTML = `
      <div style="font-size:14px;color:var(--strong);line-height:1.6;margin-bottom:14px;letter-spacing:-0.28px;">A system status event was recorded. The truck reported 7 components online and 4 with no contact at this moment.</div>
      ${[['Source','TRUCK'],['Event type','System Status'],['Components online','7'],['No contact','4'],['Message time','02/17/2026 04:14 PM']].map(([k,v])=>`
        <div class="sum-kv"><span class="sum-k">${k}</span><span class="sum-v">${v}</span></div>`).join('')}
      <div class="caveat" style="margin-top:14px;">
        <p>This is a point-in-time snapshot. It does not reflect current truck state.</p>
      </div>`;

  } else {
    area.innerHTML = `<div class="raw-block">{
  "wirelessDrum": {
    "alive": true,
    "lastContactSeconds": 1775568429.56,

      "registerContents": 40,

      "versionMinor": 0
    }
  },
  "inCabDisplay": {
    "alive": true,
    "lastContactSeconds": 1775569460.29,
    "startupMessageCount": 1,
    "version": 1468
  },
  "cwr": {
    "alive": false,
    "lastContactSeconds": 1775568442.36,
    "startupMessageCount": 1
  },
  "jacketHeater": { "alive": false },
  "fdmHeater":    { "alive": false },
  "powerModuleBusStatusIOX": {
    "voltageV": 1.12,
    "currentMinmA": 0,
    "currentMaxmA": 0
  }
}</div>`;
  }
}

function toggleWtsDropdown() {
  const dd = document.getElementById('wts-dropdown');
  const chevron = document.getElementById('wts-chevron');
  const isOpen = dd.style.display === 'none';
  dd.style.display = isOpen ? 'block' : 'none';
  chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
}

function selectWts(label, el) {
  document.getElementById('wts-label').textContent = label;
  document.querySelectorAll('.wts-option').forEach(o => o.classList.remove('wts-active'));
  el.classList.add('wts-active');
  document.getElementById('wts-dropdown').style.display = 'none';
  document.getElementById('wts-chevron').style.transform = 'rotate(0deg)';
}

document.addEventListener('click', function(e) {
  const btn = document.getElementById('wts-btn');
  const dd  = document.getElementById('wts-dropdown');
  if (btn && dd && !btn.contains(e.target) && !dd.contains(e.target)) {
    dd.style.display = 'none';
    const ch = document.getElementById('wts-chevron');
    if (ch) ch.style.transform = 'rotate(0deg)';
  }
});

/* ── INIT ──────────────────────────────────────── */
renderTrucks();
</script>
</body>
</html>
