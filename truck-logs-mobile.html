<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifi – Truck Logs Mobile Prototype</title>
<style>
  /* ─── TRINITY TOKENS ─────────────────────────────────────── */
  :root {
    --base:          #f6f4f2;
    --layer-1:       #ffffff;
    --layer-2:       #f6f4f2;
    --strong:        #36322d;
    --defined:       #36322dc2;
    --soft:          #36322d9e;
    --subtle:        #36322d80;
    --border:        #36322d24;
    --border-mid:    rgba(54,50,45,0.30);
    --blue:          #3069e3;
    --blue-link:     #295ccc;
    --red:           #d70100;
    --amber:         #ffba0d;
    --radius-sm:     4px;
    --radius-md:     16px;
    --radius-lg:     24px;
    --font:          'ABC Repro', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  /* ─── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  button { font-family: var(--font); cursor: pointer; background: none; border: none; }
  input, select { font-family: var(--font); }
  body {
    background: #cbc9c6;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 16px 64px;
    font-family: var(--font);
  }

  /* ─── PHONE SHELL ────────────────────────────────────────── */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--base);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 2px 0 1px #a09d99, 0 12px 60px rgba(0,0,0,0.28);
  }

  /* ─── SCREENS ────────────────────────────────────────────── */
  /* All screens are stacked; JS toggles .active */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ─── SHARED TOP NAV ─────────────────────────────────────── */
  .top-nav {
    background: var(--layer-1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .hamburger { display: flex; flex-direction: column; gap: 4px; width: 20px; }
  .hamburger span { display: block; height: 1.5px; background: var(--strong); border-radius: 1px; }
  .logo { font-size: 15px; font-weight: 600; color: var(--strong); letter-spacing: -0.4px; }
  .bell-wrap { position: relative; }
  .bell-dot {
    position: absolute; top: -2px; right: -2px;
    width: 8px; height: 8px;
    background: var(--red); border-radius: 50%;
    border: 1.5px solid var(--layer-1);
  }

  /* ─── SCROLLABLE BODY ────────────────────────────────────── */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    background: var(--layer-1);
    -webkit-overflow-scrolling: touch;
  }

  /* ─── MAIN TRUCK LIST ────────────────────────────────────── */
  .page-pad { padding: 16px; }
  .page-title {
    font-size: 24px; font-weight: 500; color: var(--strong);
    letter-spacing: -0.72px; line-height: 1.2;
    padding: 8px;
  }
  .page-sub {
    font-size: 12px; color: var(--soft);
    padding: 0 8px 8px;
  }
  .filter-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 4px 0 10px;
  }
  .btn-pill {
    display: flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); border-radius: 32px;
    padding: 8px 12px; font-size: 14px; color: var(--strong);
    letter-spacing: -0.28px;
  }
  .btn-pill + .btn-pill { margin-left: 6px; }
  .left-filters { display: flex; }
  .view-toggle {
    display: flex; border: 1px solid var(--border); border-radius: 32px; overflow: hidden;
  }
  .vt-btn { padding: 8px 11px; display: flex; align-items: center; justify-content: center; }
  .vt-btn.on { background: var(--blue); }
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--border); border-radius: 24px;
    padding: 10px 14px; margin-bottom: 10px;
  }
  .search-bar input {
    flex: 1; border: none; outline: none;
    font-size: 14px; color: var(--soft);
    background: none; letter-spacing: -0.28px;
  }
  .overview-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border-mid); border-radius: 32px;
    padding: 8px 14px; font-size: 14px; font-weight: 500;
    color: var(--strong); margin-bottom: 10px;
    letter-spacing: -0.28px;
  }

  /* ─── TRUCK TABLE ────────────────────────────────────────── */
  .src-cell  { font-size: 12px; line-height: 1.25; }
  .age-cell  { font-size: 12px; color: var(--soft) !important; }

  .group-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; background: var(--layer-2);
    border-bottom: 1px solid var(--border);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .group-header:active { background: rgba(54,50,45,0.08); }
  .group-label { font-size: 13px; color: var(--strong); font-weight: 500; letter-spacing: -0.2px; }

  .tbl-head {
    display: grid;
    grid-template-columns: 74px 1fr 46px 54px 82px;
  }
  .th {
    font-size: 14px; font-weight: 500; color: var(--strong);
    padding: 8px; letter-spacing: -0.28px; line-height: 1.3;
  }
  .th:first-child { border-right: 1.5px solid var(--border); }

  .truck-row {
    display: grid;
    grid-template-columns: 74px 1fr 46px 54px 82px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .truck-row:nth-child(odd)  { background: var(--layer-1); }
  .truck-row:nth-child(even) { background: var(--layer-2); }
  .td {
    font-size: 14px; color: var(--defined);
    padding: 8px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 5px;
    letter-spacing: -0.28px; line-height: 1.3;
  }
  .td.truck-num {
    border-right: 1.5px solid var(--border);
    justify-content: flex-end; gap: 4px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 5px; border-radius: var(--radius-sm);
    font-size: 11px; font-weight: 500;
  }
  .badge.err { background: var(--red); color: #fff; }
  .badge.wrn { background: var(--amber); color: var(--strong); }

  /* expanded content */
  .exp-wrap { display: none; background: var(--layer-2); }
  .exp-wrap.open { display: block; }
  .exp-row {
    display: grid; grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .exp-label {
    font-size: 14px; font-weight: 500; color: var(--strong);
    padding: 8px; letter-spacing: -0.28px;
  }
  .exp-val {
    font-size: 14px; color: var(--defined);
    padding: 8px; letter-spacing: -0.28px;
    display: flex; align-items: center; gap: 6px;
  }
  .view-truck-btn {
    display: block; width: calc(100% - 16px); margin: 12px 8px;
    background: var(--blue); color: #fff;
    border-radius: 32px; padding: 11px;
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.28px; text-align: center;
  }

  /* ─── DRAWER (slides from right over whole phone) ────────── */
  .drawer {
    position: absolute; inset: 0;
    background: var(--layer-1);
    border-radius: 44px; overflow: hidden;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.30s cubic-bezier(0.4,0,0.2,1);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-nav-bar { position: relative; z-index: 20; background: var(--layer-1); }

  .drawer-chrome { display: none; }
  .chrome-btns { display: flex; align-items: center; gap: 5px; }
  .chrome-btn {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .chrome-btn--border {
    border: 1px solid var(--border); background: none;
  }
  .chrome-btn--border:active { background: var(--layer-2); }
  .chrome-btn--dark {
    background: var(--strong); border: none;
  }
  .chrome-btn--dark:active { opacity: 0.8; }

  /* ─── DRAWER CHROME ROW ──────────────────────────────────── */
  .d-chrome {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 14px 12px; flex-shrink: 0;
  }
  .d-truck-id { display: flex; align-items: center; gap: 10px; }
  .d-truck-label { font-size: 20px; font-weight: 500; color: var(--strong); letter-spacing: -0.5px; }
  .d-ign-pill {
    display: flex; align-items: center; gap: 5px;
    background: #d5f1d2; border-radius: 20px; padding: 5px 10px;
    font-size: 13px; font-weight: 500; color: #1e6252;
  }
  .d-ign-dot { width: 7px; height: 7px; background: #16a34a; border-radius: 50%; flex-shrink: 0; }
  .d-chrome-btns { display: flex; align-items: center; gap: 5px; }

  /* ─── DRAWER NAV ROW ─────────────────────────────────────── */
  .d-nav-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 12px; flex-shrink: 0;
  }
  .d-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border-mid); border-radius: 32px;
    padding: 9px 14px; font-size: 14px; font-weight: 500;
    color: var(--strong); letter-spacing: -0.28px; background: none;
    cursor: pointer;
  }
  .d-pill:active { background: var(--layer-2); }

  /* ─── DRAWER CONTENT AREA ────────────────────────────────── */
  /* Single content pane — JS swaps between "logs-list" and "logs-detail" states */
  .drawer-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ── LOG LIST state ── */
  .log-filters {
    padding: 10px 16px 8px; border-bottom: 1px solid var(--border);
    display: flex; gap: 6px; flex-shrink: 0;
  }
  .date-btn {
    display: flex; align-items: center; gap: 5px;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 10px; font-size: 12px; color: var(--defined);
    flex-shrink: 0; letter-spacing: -0.2px;
  }
  .log-sel {
    flex: 1; border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 10px; font-size: 12px; color: var(--defined);
    background: none; appearance: none; letter-spacing: -0.2px;
    min-width: 0;
  }
  .log-tbl-head {
    display: grid; grid-template-columns: 120px 1fr 1fr;
    padding: 0 16px; background: var(--layer-1);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .log-th {
    font-size: 12px; font-weight: 500; color: var(--strong);
    padding: 8px 5px; letter-spacing: -0.2px;
  }
  .log-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .log-row {
    display: grid; grid-template-columns: 120px 1fr 1fr;
    padding: 0 16px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .log-row:nth-child(odd)  { background: var(--layer-1); }
  .log-row:nth-child(even) { background: var(--layer-2); }
  .log-row.sel { background: rgba(48,105,227,0.07); }
  .log-td {
    font-size: 12px; color: var(--defined);
    padding: 9px 5px; border-bottom: 1px solid var(--border);
    line-height: 1.35; letter-spacing: -0.2px;
  }
  .log-td.time { display: flex; flex-direction: column; gap: 1px; }
  .t-main { font-size: 12px; color: var(--defined); }
  .t-sub  { font-size: 11px; color: var(--soft); }

  /* ── LOG DETAIL state — takes over the whole drawer body ── */
  .log-detail-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--layer-1);
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--strong); font-size: 14px; font-weight: 500;
    letter-spacing: -0.28px; padding: 8px 14px;
    border: 1px solid var(--border-mid); border-radius: 32px;
    background: none; flex-shrink: 0;
  }
  .back-btn:active { background: var(--layer-2); }
  .detail-chrome { display: none; }

  /* title+meta — centred, right of pill */
  .det-event-header-inline {
    flex: 1; min-width: 0; text-align: right;
  }
  .det-event-title-inline {
    font-size: 14px; font-weight: 500; color: var(--strong);
    letter-spacing: -0.28px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .det-event-meta-inline {
    font-size: 12px; color: var(--soft); letter-spacing: -0.2px; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .detail-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 16px; flex-shrink: 0; background: var(--layer-1);
  }
  .det-tab {
    font-size: 14px; color: var(--soft);
    padding: 10px 8px; border-bottom: 2px solid transparent;
    letter-spacing: -0.28px; cursor: pointer;
  }
  .det-tab.on { color: var(--strong); border-bottom-color: var(--strong); font-weight: 500; }

  .detail-scroll { flex: 1; overflow-y: auto; padding: 11px 22px; background: var(--layer-2); -webkit-overflow-scrolling: touch; }

  /* inline event header in back bar */
  .det-event-header-inline { flex: 1; padding: 0 8px; min-width: 0; }
  .det-event-title-inline { font-size: 13px; font-weight: 500; color: var(--strong); letter-spacing: -0.28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .det-event-meta-inline  { font-size: 11px; color: var(--subtle); letter-spacing: -0.2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* event summary card */
  .det-event-card { background: var(--layer-1); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .det-event-card-left { display: flex; align-items: center; gap: 8px; }
  .det-event-blue-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; flex-shrink: 0; }
  .det-event-name { font-size: 15px; font-weight: 500; color: var(--strong); letter-spacing: -0.3px; }
  .det-event-ts   { font-size: 14px; color: var(--subtle); letter-spacing: -0.28px; flex-shrink: 0; }

  /* section label */
  .det-section-label { font-size: 14px; color: var(--strong); letter-spacing: -0.28px; margin-bottom: 10px; }

  /* component cards */
  .comp-card { background: var(--layer-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; margin-bottom: 10px; }
  .comp-card-row { display: flex; align-items: center; justify-content: space-between; }
  .comp-card-left { display: flex; align-items: center; gap: 12px; }
  .comp-card-name { font-size: 16px; font-weight: 500; color: var(--strong); letter-spacing: -0.32px; }
  .comp-card-right { display: flex; align-items: center; gap: 10px; }
  .comp-card-val { font-size: 16px; font-weight: 500; color: var(--strong); letter-spacing: -0.32px; }
  .comp-chevron { color: var(--soft); font-size: 13px; line-height: 1; }
  .comp-card-details { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .comp-detail-row { display: flex; justify-content: space-between; }
  .comp-detail-k { font-size: 14px; color: var(--soft); letter-spacing: -0.28px; }
  .comp-detail-v { font-size: 14px; color: var(--strong); letter-spacing: -0.28px; }

  /* no contact table */
  .nc-table { background: var(--layer-1); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 14px; }
  .nc-table-head { display: grid; grid-template-columns: 1fr 1fr; background: var(--layer-1); }
  .nc-th { font-size: 13px; font-weight: 500; color: var(--defined); padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .nc-tr { display: grid; grid-template-columns: 1fr 1fr; }
  .nc-tr:nth-child(even) { background: var(--layer-2); }
  .nc-td { font-size: 13px; color: var(--defined); padding: 8px 10px; border-bottom: 1px solid var(--border); }

  /* structured content */
  .sec-label {
    font-size: 11px; font-weight: 500; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 6px; margin-top: 4px;
  }
  .comp-row {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .comp-left { display: flex; align-items: flex-start; gap: 8px; }
  .s-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .s-dot.g { background: #16a34a; }
  .s-dot.r { background: var(--red); }
  .s-dot.x { background: #9ca3af; }
  .comp-name { font-size: 14px; color: var(--strong); letter-spacing: -0.28px; }
  .comp-sub  { font-size: 11px; color: var(--soft); margin-top: 2px; letter-spacing: -0.2px; }
  .comp-val  { font-size: 13px; color: var(--defined); font-weight: 500; letter-spacing: -0.2px; flex-shrink: 0; }
  .nc-row {
    display: flex; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .nc-l { font-size: 13px; color: var(--defined); letter-spacing: -0.2px; }
  .nc-r { font-size: 13px; color: var(--soft); letter-spacing: -0.2px; }
  .caveat {
    background: rgba(48,105,227,0.06);
    border: 1px solid rgba(48,105,227,0.2);
    border-radius: 8px; padding: 10px 12px; margin-top: 14px;
  }
  .caveat p { font-size: 12px; color: var(--blue); line-height: 1.55; letter-spacing: -0.2px; }

  /* raw json */
  .raw-block {
    background: var(--layer-2); border-radius: 8px;
    padding: 12px; font-family: monospace;
    font-size: 11px; color: var(--defined);
    line-height: 1.75; overflow-x: auto; white-space: pre;
  }

  /* summary */
  .sum-kv {
    display: flex; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .sum-k { font-size: 13px; color: var(--soft); letter-spacing: -0.2px; }
  .sum-v { font-size: 13px; color: var(--strong); font-weight: 500; letter-spacing: -0.2px; }
  .sum-desc {
    font-size: 14px; color: var(--strong);
    line-height: 1.6; margin-bottom: 14px;
    letter-spacing: -0.28px;
  }
</style>
</head>
<body>

<div class="phone">

  <!-- ══════════════════════════════════════════════════════════
       SCREEN 1 — MAIN TRUCK LIST
  ═══════════════════════════════════════════════════════════ -->
  <div class="screen active" id="s-main">
    <div class="top-nav">
      <div class="hamburger"><span></span><span></span><span></span></div>
      <div class="logo">7K verifi</div>
      <div class="bell-wrap">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2a6 6 0 00-6 6v3l-1.5 2.5h15L16 11V8a6 6 0 00-6-6z" stroke="#36322d" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M8.5 16.5a1.5 1.5 0 003 0" stroke="#36322d" stroke-width="1.4"/>
        </svg>
        <div class="bell-dot"></div>
      </div>
    </div>

    <div class="scroll-body">
      <div class="page-pad">
        <div class="page-title">Diagnostic Center</div>
        <div class="page-sub">Last updated: 20 seconds ago</div>

        <div class="filter-row">
          <div class="left-filters">
            <button class="btn-pill">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 4h12M4 8h8M6 12h4" stroke="#36322d" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="btn-pill" style="margin-left:6px;">
              <span style="font-size:16px;letter-spacing:1px;color:var(--strong);">···</span>
            </button>
          </div>
          <div class="view-toggle">
            <div class="vt-btn on">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="2" y="2" width="5" height="5" rx="1" fill="white"/>
                <rect x="9" y="2" width="5" height="5" rx="1" fill="white"/>
                <rect x="2" y="9" width="5" height="5" rx="1" fill="white"/>
                <rect x="9" y="9" width="5" height="5" rx="1" fill="white"/>
              </svg>
            </div>
            <div class="vt-btn">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="2" y="3.5" width="12" height="1.5" rx="0.75" fill="#36322d99"/>
                <rect x="2" y="7.25" width="12" height="1.5" rx="0.75" fill="#36322d99"/>
                <rect x="2" y="11" width="12" height="1.5" rx="0.75" fill="#36322d99"/>
              </svg>
            </div>
            <div class="vt-btn">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="5.5" stroke="#36322d99" stroke-width="1.3"/>
                <path d="M2.5 8h11M8 2.5c-2 1.5-2.5 3-2.5 5.5s.5 4 2.5 5.5M8 2.5c2 1.5 2.5 3 2.5 5.5s-.5 4-2.5 5.5" stroke="#36322d99" stroke-width="1"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="search-bar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="8" r="5" stroke="#36322d9e" stroke-width="1.4"/>

        <button class="overview-pill">

          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 3l4 4-4 4" stroke="#36322d" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- TABLE HEADER -->
        <div class="tbl-head">
          <div class="th" style="border-right:1.5px solid var(--border);">Truck</div>

  <!-- ══════════════════════════════════════════════════════════
       DRAWER — slides in from right
  ═══════════════════════════════════════════════════════════ -->
  <div class="drawer" id="drawer">

    <!-- ROW 1: Truck identity + chrome buttons -->
    <div class="d-chrome">
      <div class="d-truck-id">
        <span class="d-truck-label" id="drawer-truck-num">Truck: 45689</span>
        <div class="d-ign-pill"><div class="d-ign-dot"></div>Ignition on</div>
      </div>
      <div class="d-chrome-btns">
        <button class="chrome-btn chrome-btn--border">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 3l-5 4 5 4" stroke="#36322d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="chrome-btn chrome-btn--border">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 3l5 4-5 4" stroke="#36322d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="chrome-btn chrome-btn--dark" onclick="closeDrawer()">

    <!-- ROW 2: Section nav pill + Filters pill -->
    <div class="d-nav-row">
      <button class="d-pill">
        Truck Logs
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M3 5l3.5 3.5L10 5" stroke="#36322d" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="d-pill">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">

        </svg>
        Filters
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M3 5l3.5 3.5L10 5" stroke="#36322d" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- ── DRAWER BODY: single pane, two states ── -->
    <div class="drawer-body" id="drawer-body">

      <!-- STATE A: LOG LIST -->
      <div id="state-list" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div class="log-tbl-head">
          <div class="log-th">Message Time</div>
          <div class="log-th">Type</div>
          <div class="log-th">Sub Type</div>
        </div>
        <div class="log-scroll" id="log-scroll"></div>
      </div>

      <!-- STATE B: LOG DETAIL -->
      <div id="state-detail" style="display:none;flex-direction:column;flex:1;overflow:hidden;">

        <!-- Back bar: pill left | title+meta centre -->
        <div class="log-detail-bar">
          <button class="back-btn" onclick="showLogList()">

              <path d="M9 3l-5 4 5 4" stroke="#36322d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logs
          </button>
          <div class="det-event-header-inline">
            <div class="det-event-title-inline" id="det-title">Ticketed Received Event</div>
            <div class="det-event-meta-inline" id="det-meta">02/17 03:49 pm · TRUCK · Ticket Sent.</div>
          </div>
        </div>

        <div class="detail-tabs">
          <div class="det-tab" onclick="switchTab('summary', this)">Summary</div>
          <div class="det-tab on" onclick="switchTab('structured', this)">Structured</div>
          <div class="det-tab" onclick="switchTab('raw', this)">Raw Json</div>

        <div class="detail-scroll" id="detail-scroll"></div>

</div><!-- /phone -->

<script>
/* ── DATA ───────────────────────────────────────── */
const truckGroups = [
  {
    label: 'Phoenix Central',
    uptime: '94.3%',
    attention: 4, /* trucks needing attention at this plant */
    open: true,
    trucks: [
      { num:'45689', ver:'V3', ign:'On',  ignDetail:'6 hr',  source:'Customer Ticket', plant:'Phoenix Central', impact:'Not Managing',  issue:'Water System', account:'Cemex',        age:'3 min',  conn:'live',  err:1, wrn:10 },
      { num:'12457', ver:'V4', ign:'On',  ignDetail:'5 hr',  source:'Customer Ticket', plant:'Phoenix Central', impact:'Not Measuring', issue:'Water System', account:'Cemex',        age:'15 min', conn:'none',  err:2, wrn:10 },
      { num:'39821', ver:'V3', ign:'On',  ignDetail:'3 hr',  source:'Customer Ticket', plant:'Phoenix Central', impact:'Verify Down',   issue:'Drum RPM',     account:'Cemex',        age:'8 hrs',  conn:'live',  err:0, wrn:10 },
      { num:'53127', ver:'V3', ign:'On',  ignDetail:'1 hr',  source:'Customer Ticket', plant:'Phoenix Central', impact:'Not Measuring', issue:'Water System', account:'Cemex',        age:'2 days', conn:'live',  err:1, wrn:0  },
    ]
  },
  {
    label: 'Mesa South',
    uptime: '96.3%',
    attention: 4,
    open: true,
    trucks: [
      { num:'67234', ver:'V4', ign:'Off', ignDetail:'3 hrs', source:'Customer Ticket', plant:'Mesa South', impact:'At Risk',       issue:'Water System', account:'AZ Materials', age:'15 min', conn:'live',  err:0, wrn:10 },
      { num:'84760', ver:'V5', ign:'Off', ignDetail:'1 hr',  source:'System Alert',    plant:'Mesa South', impact:'Not Measuring', issue:'Hydraulic',    account:'AZ Materials', age:'4 hrs',  conn:'live',  err:2, wrn:10 },
      { num:'98214', ver:'V5', ign:'Off', ignDetail:'30 min',source:'System Alert',    plant:'Mesa South', impact:'At Risk',       issue:'Hydraulic',    account:'AZ Materials', age:'1 day',  conn:'none',  err:1, wrn:0  },
      { num:'21348', ver:'V3', ign:'On',  ignDetail:'1 hr',  source:'System Alert',    plant:'Mesa South', impact:'Not Measuring', issue:'Hydraulic',    account:'AZ Materials', age:'2 days', conn:'live',  err:2, wrn:10 },
    ]
  },
];

/* flat list for row iteration */
const trucks = truckGroups.flatMap(g => g.trucks);

const logs = [
  { date:'02/17/2026', time:'04:14 PM', type:'Ticket Sent',       sub:'Ticketed Received'  },
  { date:'02/17/2026', time:'04:14 PM', type:'Ticketed Received',  sub:'Buildup Data'       },
  { date:'02/18/2026', time:'09:30 AM', type:'Backend Request',    sub:'Identity'           },
  { date:'02/18/2026', time:'11:00 AM', type:'Event',              sub:'Drum Sensor'        },
  { date:'02/19/2026', time:'02:15 PM', type:'Event',              sub:'Fluid Error'        },
  { date:'02/19/2026', time:'03:00 PM', type:'Ticketed Received',  sub:'Feedback Session'   },
  { date:'02/20/2026', time:'10:00 AM', type:'Event',              sub:'Build Up Data'      },
  { date:'02/20/2026', time:'01:45 PM', type:'Event',              sub:'Fluid Error'        },
  { date:'02/21/2026', time:'04:30 PM', type:'Event',              sub:'Fluid Error'        },
  { date:'02/21/2026', time:'05:15 PM', type:'Event',              sub:'Fluid Error'        },
  { date:'02/22/2026', time:'09:00 AM', type:'Ticketed Received',  sub:'Ticketed Received'  },
  { date:'02/22/2026', time:'12:00 PM', type:'Backend Request',    sub:'Identity'           },
  { date:'02/23/2026', time:'08:30 AM', type:'Backend Request',    sub:'Identity'           },
  { date:'02/23/2026', time:'02:30 PM', type:'Backend Request',    sub:'Identity'           },
  { date:'02/24/2026', time:'03:00 PM', type:'Backend Request',    sub:'Identity'           },
];

/* ── STATE ──────────────────────────────────────── */
let expanded = {};
let activeTab = 'structured';

/* ── TRUCK LIST ─────────────────────────────────── */
function renderTrucks() {
  let html = '';
  let globalIdx = 0;

  truckGroups.forEach((group, gi) => {
    const isGroupOpen = group.open !== false;
    const groupChev = isGroupOpen
      ? `<path d="M3 5l5 5 5-5" stroke="#36322d" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>`
      : `<path d="M5 3l5 5-5 5" stroke="#36322d" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>`;

    html += `
      <div class="group-header" onclick="toggleGroup(${gi})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">${groupChev}</svg>
        <span class="badge err" style="font-size:11px;padding:2px 6px;">${group.attention}</span>
        <span class="group-label">${group.label} — Uptime ${group.uptime}</span>
      </div>`;

    if (!isGroupOpen) {
      globalIdx += group.trucks.length;
      return;
    }

    group.trucks.forEach(t => {
      const i = globalIdx++;
      const isOpen = !!expanded[i];
      const chevDown  = `<path d="M3 5l5 5 5-5" stroke="#36322d9e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>`;
      const chevRight = `<path d="M5 3l5 5-5 5" stroke="#36322d9e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>`;
      const badges = [
        t.err > 0 ? `<span class="badge err"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="white" stroke-width="1"/><path d="M5 3v2.2M5 6.8h.01" stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg>${t.err}</span>` : '',
        t.wrn > 0 ? `<span class="badge wrn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1.5L9.5 8.5H.5L5 1.5z" stroke="#36322d" stroke-width="1" stroke-linejoin="round"/><path d="M5 4.5v1.5M5 7.5h.01" stroke="#36322d" stroke-width="1" stroke-linecap="round"/></svg>${t.wrn}</span>` : '',
      ].join('');
      const emptyAlert = (t.err===0 && t.wrn===0) ? `<span style="color:var(--soft);font-size:13px;">—</span>` : '';
      const rowBg = i%2===0 ? 'background:var(--layer-1)' : 'background:var(--layer-2)';

      const connIcon = t.conn === 'live'
        ? `<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="11.5" r="1" fill="#16a34a"/><path d="M5 9A3.5 3.5 0 017.5 8 3.5 3.5 0 0110 9" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round"/><path d="M2.5 6.5A7 7 0 017.5 5a7 7 0 015 1.5" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round"/></svg> Live`
        : `<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 2l11 11" stroke="#9ca3af" stroke-width="1.3" stroke-linecap="round"/><circle cx="7.5" cy="11.5" r="1" fill="#9ca3af"/><path d="M5 9A3.5 3.5 0 017.5 8 3.5 3.5 0 0110 9" stroke="#9ca3af" stroke-width="1.2" stroke-linecap="round"/></svg> <span style="color:var(--soft)">No connection</span>`;

      const expHtml = isOpen ? `
        <div class="exp-wrap open">
          <div class="exp-row"><div class="exp-label">Source</div><div class="exp-val">${t.source}</div></div>
          <div class="exp-row"><div class="exp-label">Version</div><div class="exp-val">${t.ver}</div></div>
          <div class="exp-row"><div class="exp-label">Plant</div><div class="exp-val">${t.plant}</div></div>
          <div class="exp-row"><div class="exp-label">Ignition</div><div class="exp-val">${t.ign} — ${t.ignDetail}</div></div>
          <div class="exp-row"><div class="exp-label">Impact</div><div class="exp-val">${t.impact}</div></div>
          <div class="exp-row"><div class="exp-label">Issue</div><div class="exp-val">${t.issue}</div></div>
          <div class="exp-row"><div class="exp-label">Account</div><div class="exp-val">${t.account}</div></div>
          <div class="exp-row"><div class="exp-label">Age</div><div class="exp-val">${t.age}</div></div>
          <div class="exp-row"><div class="exp-label">Connection</div><div class="exp-val" style="gap:5px;display:flex;align-items:center;">${connIcon}</div></div>
          <div class="exp-row"><div class="exp-label">Last Seen</div><div class="exp-val">1:16 PM 07/23/25</div></div>
          <button class="view-truck-btn" onclick="openDrawer(${i})">View Truck</button>
        </div>` : `<div class="exp-wrap"></div>`;

      html += `
        <div>
          <div class="truck-row" style="${rowBg}" onclick="toggleTruck(${i})">
            <div class="td truck-num">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">${isOpen ? chevDown : chevRight}</svg>
              ${t.num}
            </div>
            <div class="td src-cell">${t.source === 'Customer Ticket' ? 'Customer' : 'System'}</div>
            <div class="td">${t.ign}</div>
            <div class="td age-cell">${t.age}</div>
            <div class="td">${badges}${emptyAlert}</div>
          </div>
          ${expHtml}
        </div>`;
    });
  });

  document.getElementById('truck-list').innerHTML = html;
}

function toggleGroup(gi) {
  truckGroups[gi].open = truckGroups[gi].open === false ? true : false;
  renderTrucks();
}

function toggleTruck(i) {
  expanded[i] = !expanded[i];
  renderTrucks();
}

/* ── DRAWER ─────────────────────────────────────── */
function openDrawer(i) {
  document.getElementById('drawer-truck-num').textContent = 'Truck: ' + trucks[i].num;
  renderLogRows();
  showLogList();
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.querySelector('.d-chrome').style.display = 'flex';
  document.querySelector('.d-nav-row').style.display = 'flex';
}

/* ── LOG LIST ────────────────────────────────────── */
function renderLogRows() {
  document.getElementById('log-scroll').innerHTML = logs.map((l,i) => `
    <div class="log-row" id="lr-${i}" onclick="openDetail(${i})"
         style="${i%2===0?'background:var(--layer-1)':'background:var(--layer-2)'}">
      <div class="log-td time"><span class="t-main">${l.date}</span><span class="t-sub">${l.time}</span></div>
      <div class="log-td">${l.type}</div>
      <div class="log-td">${l.sub}</div>
    </div>`).join('');
}

function showLogList() {
  document.getElementById('state-list').style.display = 'flex';
  document.getElementById('state-detail').style.display = 'none';
  document.querySelector('.d-chrome').style.display = 'flex';
  document.querySelector('.d-nav-row').style.display = 'flex';
}

/* ── LOG DETAIL ─────────────────────────────────── */
function openDetail(i) {
  document.querySelectorAll('.log-row').forEach(r => r.style.background = '');
  const row = document.getElementById('lr-'+i);
  if (row) row.style.background = 'rgba(48,105,227,0.07)';

  document.getElementById('det-title').textContent = logs[i].sub + ' Event';
  const meta = logs[i].date + ' ' + logs[i].time + ' · TRUCK · ' + logs[i].type;
  document.getElementById('det-meta').textContent = meta.length > 40 ? meta.substring(0, 38) + '...' : meta;

  activeTab = 'structured';
  document.querySelectorAll('.det-tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.det-tab')[1].classList.add('on');
  renderDetailContent('structured');

  /* hide chrome + nav, show detail */
  document.querySelector('.d-chrome').style.display = 'none';
  document.querySelector('.d-nav-row').style.display = 'none';
  document.getElementById('state-list').style.display = 'none';
  document.getElementById('state-detail').style.display = 'flex';
}

/* ── DETAIL TABS ─────────────────────────────────── */
function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.det-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderDetailContent(tab);
}

function renderDetailContent(tab) {
  const area = document.getElementById('detail-scroll');
  area.scrollTop = 0;

  if (tab === 'structured') {
    area.innerHTML = `
      <div class="det-section-label" style="margin-top:4px;">Online (7) - Expand All</div>

      <div class="comp-card">
        <div class="comp-card-row">
          <div class="comp-card-left"><div class="s-dot g"></div><span class="comp-card-name">Wireless Drum</span></div>
          <div class="comp-card-right">
            <span class="comp-card-val">3.54V</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#36322d9e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="comp-card-details">
          <div class="comp-detail-row"><span class="comp-detail-k">Last Seen:</span><span class="comp-detail-v">13:49:59</span></div>
          <div class="comp-detail-row"><span class="comp-detail-k">Start Up Count:</span><span class="comp-detail-v">1</span></div>
          <div class="comp-detail-row"><span class="comp-detail-k">Error Count:</span><span class="comp-detail-v">0</span></div>
        </div>
      </div>

      ${[
        ['IOX',               'g', '12.92 V'],
        ['In-Cab Dsplay',     'g', 'Active' ],
        ['External Display',  'g', 'Active' ],
        ['Bus Power',         'g', '12.76V' ],
        ['Discharge Pressure','g', 'Connected'],
        ['Charge Pressure',   'g', 'Connected'],
        ['CWR',               'g', '45° C'  ],
      ].map(([n,c,v]) => `
        <div class="comp-card">
          <div class="comp-card-row">
            <div class="comp-card-left"><div class="s-dot ${c}"></div><span class="comp-card-name">${n}</span></div>
            <div class="comp-card-right">
              <span class="comp-card-val">${v}</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#36322d9e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>`).join('')}

      <div class="nc-table">
        <div class="nc-table-head">
          <div class="nc-th">Components</div>
          <div class="nc-th">Status</div>
        </div>
        ${['Wired Drum','Roboteq','Power Module','FDM Heater','Jacket Heater','Admix Board'].map(n=>`
          <div class="nc-tr"><div class="nc-td">${n}</div><div class="nc-td">No Contact</div></div>`).join('')}
      </div>

      <div class="caveat" style="margin-top:14px;">
        <p>This snapshot reflects truck state at the moment this event was recorded — not current status. Review logs before and after this event to understand the full picture.</p>
      </div>`;

  } else if (tab === 'summary') {
    area.innerHTML = `
      <div style="font-size:14px;color:var(--strong);line-height:1.6;margin-bottom:14px;letter-spacing:-0.28px;">A system status event was recorded. The truck reported 7 components online and 4 with no contact at this moment.</div>
      ${[['Source','TRUCK'],['Event type','System Status'],['Components online','7'],['No contact','4'],['Message time','02/17/2026 04:14 PM']].map(([k,v])=>`
        <div class="sum-kv"><span class="sum-k">${k}</span><span class="sum-v">${v}</span></div>`).join('')}
      <div class="caveat" style="margin-top:14px;">
        <p>This is a point-in-time snapshot. It does not reflect current truck state.</p>
      </div>`;

  } else {
    area.innerHTML = `<div class="raw-block">{
  "wirelessDrum": {
    "alive": true,
    "lastContactSeconds": 1775568429.56,
    "microS08": {
      "registerContents": 40,
      "versionMajor": 33,
      "versionMinor": 0
    }
  },
  "inCabDisplay": {
    "alive": true,
    "lastContactSeconds": 1775569460.29,
    "startupMessageCount": 1,
    "version": 1468
  },
  "cwr": {
    "alive": false,
    "lastContactSeconds": 1775568442.36,
    "startupMessageCount": 1
  },
  "jacketHeater": { "alive": false },
  "fdmHeater":    { "alive": false },
  "powerModuleBusStatusIOX": {
    "voltageV": 1.12,
    "currentMinmA": 0,
    "currentMaxmA": 0
  }
}</div>`;
  }
}

/* ── INIT ──────────────────────────────────────── */
renderTrucks();
</script>
</body>
