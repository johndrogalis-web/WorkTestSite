  const GUIDE = { N, advance: () => advance(), clear: () => setLastAction(null) };
  const caseKeys = (prefix, m) => [prefix+m.id, prefix+"cc-"+m.id, prefix+"sched-"+m.id, ...m.colis.map(c=>prefix+c.id)]; // every step key a move/mid case can emit — for spotlight wiring
  const seenTours = React.useRef({}); // your-turn pins auto-open ONCE per key per session; afterwards the T pin stays clickable but quiet
  React.useEffect(() => { if (N.manual && N.key) seenTours.current[N.key] = true; }, [N.manual, N.key]);
  const youStep = (k) => (N.manual && N.key === k) ? { ...N, firstTime: !seenTours.current[k] } : null;
  const advance = () => {
    // Walk the FIRST unit through the real record modal — validation lives inside the unit, and Amicus must see that.
    if ((N.key==="coli" || N.key==="val" || N.key==="bill") && N.unit && !walked[N.key]) {
      setWalked(w => ({...w, [N.key]:true}));
      if (N.roles && N.roles.length && !N.roles.includes(role)) setRole(N.roles[0]);
      setTab("install");
      setOpenColi({engine:"order", caseId:"CASE-0101", coliId:N.unit, guided:true, mode:N.key});
      setLastAction(null);
      return;
    }
    if (!N.run) return;
    const as = (N.roles && N.roles.length) ? N.roles[0] : null;
    if (as && !N.roles.includes(role)) setRole(as);
    N.run(as);
    if (!N.free) setLastAction({ key:N.key, who:N.who, label:N.label, when:Date.now() });
    setTimeout(() => { const el = document.querySelector('[data-spot~="' + (N.key||"") + '"]'); if (el) el.scrollIntoView({behavior:"smooth", block:"center"}); }, 150);
  };

  const spine = created ? [
    ["Draft & dual approval", approvalDone],
    ["Installation Specialist", imConfirmed],
    [gateNeeded ? "Contract / RM / Fin gate" : "Contract gate (skipped)", gateNeeded ? gateDone : null],
    ["Supply Chain · IO", shipped],
    ["Units created (Hub)", hubCreated],
    ["Install & billing", installClosed],
    ["Returns · labor · IO closure", retReceived && ioClosed && (laborDone || fields.labor==="Customer")],
    ["SC order closed", scClosed],
    ["Final close · owner TBD", false],
  ] : [];
  const currentIdx = spine.findIndex(([,d]) => d === false);

  const fieldRow = (label, value, editFn) => {
    const pend = changed[label];
    return (
      <div key={label} style={{display:"flex", alignItems:"center", gap:8, padding:"5px 0", borderBottom:`1px solid ${C.borderLt}`, background: pend ? C.warnBg : "transparent", flexWrap:"wrap"}}>
        <span style={{width:170, fontSize:12, color:C.sub}}>{label}</span>
        <span style={{fontSize:13, fontWeight:600, flex:1}}>{value}{locked && " 🔒"}</span>
        {!locked && !killed && !installClosed && <Btn role={role} setRole={setRole} need={shipped ? ["CSM","FSM","Installation Specialist"] : ["CSM","FSM"]} tone="neutral" onClick={editFn || (()=>flagField(label, role))}>edit</Btn>}
        {pend && <span style={{fontSize:11}}>
          {!pend.CSM ? <Btn role={role} setRole={setRole} need="CSM" tone="warn" onClick={()=>reapprove(label,"CSM")}>CSM ✓</Btn> : <Chip tone="ok">CSM ✓</Chip>}{" "}
          {!pend.FSM ? <Btn role={role} setRole={setRole} need="FSM" tone="warn" onClick={()=>reapprove(label,"FSM")}>FSM ✓</Btn> : <Chip tone="ok">FSM ✓</Chip>}
        </span>}
      </div>
    );
  };
  const TabBtn = ({id, label}) => (
    <button onClick={()=>setTab(id)} style={{border:"none", borderBottom: tab===id ? `3px solid ${C.link}` : "3px solid transparent", background:"none", padding:"8px 12px", fontSize:13, fontWeight: tab===id?700:500, color: tab===id?C.link:C.sub, cursor:"pointer"}}>
      {label}{N.tab===id && tab!==id ? " ●" : ""}
    </button>
  );
  const cell = (val, done) => <td style={{padding:"5px 8px", fontSize:11, background: done ? C.green : C.orange, border:`1px solid ${C.border}`, fontWeight:600, textAlign:"center", whiteSpace:"nowrap"}}>{val}</td>;

  const caseRow = (id, type, detail, status, tone, onOpen) => (
    <div key={id} style={{display:"flex", alignItems:"center", gap:10, padding:"8px 6px", borderBottom:`1px solid ${C.borderLt}`, flexWrap:"wrap"}}>
      <span onClick={onOpen} style={{fontWeight:700, fontSize:13, color:onOpen?C.link:C.text, cursor:onOpen?"pointer":"default", width:92}}>{id}</span>
      <Chip tone="neutral">{type}</Chip>
      <span style={{fontSize:12, flex:1, minWidth:160}}>{detail}</span>
      <Chip tone={tone}>{status}</Chip>
    </div>
  );

  const renderColiModal = () => {
    const {engine, caseId, coliId} = openColi;
    const close = () => setOpenColi(null);

    if (engine === "order") {
      const i = colis.findIndex(c=>c.unit===coliId);
      if (i<0) return null;
      const c = colis[i];
      return <Modal title={coliId + " — Install COLI"} badges={[<Chip key="s" tone={c.status.startsWith("Validated")?"ok":c.status==="Pending FSM"?"warn":c.status.startsWith("On Hold")?"err":"neutral"}>{c.status}</Chip>, coliBillResolved(c) && <Chip key="l" tone="purp">🔒 {c.billable==="yes" ? "billed · " + c.billMonth : "non-billable"}</Chip>]} onClose={close}>
        {openColi.guided && <div style={{display:"flex", justifyContent:"flex-end", marginBottom:4}}><Why key={"modal-"+openColi.mode+"-"+coliId} author="Guided tour" initial="T" defaultOpen>
          <b style={{color:C.warn}}>✋ Your move — inside the unit record.</b> {openColi.mode==="coli" ? "Install work really lives here: tick the 12 checklist items (Check All fast-forwards), set Service Ready = Yes + Equipment Shipped Back, then Submit COLI." : openColi.mode==="bill" ? "Billing lives ON THE COLI (July 15 call, 15:23): confirm billable + month here — this unit locks forever. The case locks when every COLI is resolved." : "FSM validation happens here, inside the record: hit Validate (check & fix) — problems become a WOLI on the unit."} <span style={{display:"block", marginTop:4, color:C.sub}}>Remaining units fast-forward automatically after this one.</span>
        </Why></div>}
        <FieldGrid rows={[
          ["Truck #",c.truck],["TCG/Unit #",c.tcg],["Mixer Make",c.mixer],["WDS #",c.wds],["Propulsion",c.prop],["System",fields.system],
          ["VIN (opt)","1HTMM"+c.tcg.slice(-1)+"824"+c.wds.slice(-1)+"L"],["Assigned FST",fields.fst],
          ["Install Date",c.status==="Not Started"?"—":"07/16/26"],["Completion",c.status.startsWith("Validated")?"07/16/26":"—"],
          ["Billing Status", c.billable==="yes" ? "Billed · " + c.billMonth : c.billable==="no-ok" ? "Closed — non-billable" : "—"],["CSM Billable Status",(c.billable==="yes"?"Billable":c.billable?"Non-billable ("+c.billable.replace("no-","")+")":"—")+" · USD"],
        ]} />
        {docsFor(c.type).length>0 && <div style={{marginBottom:10, fontSize:12}}>
          <span style={{color:C.sub, fontWeight:600}}>Attached docs: </span>
          {docsFor(c.type).map((f,k)=><span key={k} title={f} style={{display:"inline-block", margin:"2px 4px 2px 0", padding:"2px 7px", borderRadius:10, border:`1px solid ${C.border}`, color:C.link, cursor:"pointer"}}>📄 {f}</span>)}
        </div>}
        <div style={{columns:2, columnGap:16, fontSize:12}}>
          {CHECKLIST.map((item,k)=>(<label key={k} style={{display:"block", breakInside:"avoid", padding:"2px 0"}}><input type="checkbox" checked={k<c.checks} onChange={()=>patchColi(i,{checks:k<c.checks?k:k+1})} disabled={c.status!=="Not Started"}/> {item}</label>))}
        </div>
        <div style={{marginTop:8, display:"flex", alignItems:"center", gap:14, flexWrap:"wrap"}}>
          {c.status==="Not Started" && c.checks<CHECKLIST.length && <Btn role={role} setRole={setRole} need="Crew" tone="neutral" onClick={()=>patchColi(i,{checks:CHECKLIST.length})}>Check all ({crewLabel})</Btn>}
          <span style={{fontSize:12}}>Service Ready
            <label style={{marginLeft:6}}><input type="radio" checked={c.serviceReady==="Yes"} onChange={()=>patchColi(i,{serviceReady:"Yes"})} disabled={c.status!=="Not Started"}/> Yes</label>
            <label style={{marginLeft:6}}><input type="radio" checked={c.serviceReady==="No"} onChange={()=>patchColi(i,{serviceReady:"No"})} disabled={c.status!=="Not Started"}/> No</label>
            <Why>System Service Ready is tied to billing and the service lifecycle — Ready = No means not billable, FSM gets a reminder, and rush parts can be raised (Spec v1.1).</Why>
          </span>
          <label style={{fontSize:12}}><input type="checkbox" checked={c.shipBack} onChange={e=>patchColi(i,{shipBack:e.target.checked})} disabled={c.status!=="Not Started"}/> Equipment shipped back</label>
        </div>
        <div style={{marginTop:10}}>
          {c.status==="Not Started" && <Btn role={role} setRole={setRole} need="Crew" tone="ok" disabled={!coliReady(c) && c.serviceReady!=="No"} onClick={()=>{submitColi(i); close();}}>Submit COLI</Btn>}
          {c.status.startsWith("On Hold") && <Btn role={role} setRole={setRole} need="Supply Chain" tone="warn" onClick={()=>{resumeHold(i); close();}}>Rush parts delivered — reopen</Btn>}
          {c.status==="Pending FSM" && (unitHasOpenWoli(c.unit) ? <Btn role={role} setRole={setRole} need="FSM" tone="err" onClick={()=>{woliResolve(c.unit);}}>Resolve WOLI</Btn> : <React.Fragment>
            <Btn role={role} setRole={setRole} need="FSM" tone="ok" onClick={()=>{validateColi(i); close();}}>Validate</Btn><Why>Validation is check-and-fix, not pass/fail: problems become a WOLI on the unit, a coordinated fix, or an on-the-spot fix (Spec §4.4).</Why>
            <Btn role={role} setRole={setRole} need="FSM" tone="purp" onClick={()=>{woliColi(i); close();}}>Log WOLI fix</Btn>
          </React.Fragment>)}
        </div>
        {c.status.startsWith("Validated") && (sentCC || !ccEnabled) && !c.billable && <div style={{marginTop:10, paddingTop:8, borderTop:`1px solid ${C.borderLt}`, display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", fontSize:12}}>
          <b>CSM billing — on this COLI:</b>
          <span style={{display:"inline-flex", alignItems:"center", gap:4, fontSize:12, color:C.sub}}>Month <Chip tone="ok">auto · from case</Chip></span>
          <input id={"ob-"+c.unit} placeholder="Billing comments (why this call)" style={{minWidth:180, padding:3, border:`1px solid ${C.border}`, borderRadius:4, fontSize:12}}/>
          <Btn role={role} setRole={setRole} need="CSM" tone="purp" onClick={()=>{confirmColiBill(i, null, document.getElementById("ob-"+c.unit).value); close();}}>Confirm billable</Btn>
          <Why>Billing lives ON THE COLI (July 15 call, 15:23) and the CSM types COMMENTS about why they made the call — month is auto-pulled from the case, not entered (Ariel, July 16 review). Confirming locks THIS COLI forever; the install case locks when every COLI is resolved.</Why>
          <Btn role={role} setRole={setRole} need="CSM" tone="err" onClick={()=>{noBillColi(i); close();}}>No-bill</Btn>
          <select value={noBillReason} onChange={e=>setNoBillReason(e.target.value)} style={{fontSize:11, padding:3}}>
            <option>Replacement unit — on us</option>
            <option>Warranty rework</option>
            <option>Contract covers install</option>
            <option>Goodwill / customer retention</option>
          </select>
        </div>}
        {["no-pending","no-pending-fin","no-rejected"].includes(c.billable) && <Note tone="warn">No-bill ("{c.noBillReason}") {c.billable==="no-pending" ? "awaiting RM approval" : c.billable==="no-pending-fin" ? "awaiting Finance approval (>5 units)" : "rejected by RM — CSM must revise or escalate"} — see the case card.</Note>}
        {c.status.startsWith("Validated") && coliBillResolved(c) && <ClosureBanner/>}
      </Modal>;
    }

    if (engine === "move") {
      const m = moveCases.find(x=>x.id===caseId); if (!m) return null;
      const c = m.colis.find(x=>x.id===coliId); if (!c) return null;
      const list = coliListFor(c);
      return <Modal title={c.id + " — " + c.type + " COLI (" + caseId + ")"} badges={[<Chip key="s" tone={c.status.includes("Billed")?"ok":c.status==="Cancelled"?"neutral":c.status.includes("Hold")||c.status.includes("Held")?"warn":"info"}>{c.status}</Chip>, c.verified && <Chip key="v" tone="ok">{c.verified}</Chip>]} onClose={close}>
        {c.type!=="Billing-only" && <FieldGrid rows={[
          ["Truck now",c.truck],["TCG/Unit #",(c.tcg||"—")],
          ["Truck stamped @ create",c.truckStampedAtCreate],["Truck stamped @ complete",c.truckStampedAtComplete||"— (pending)"],
          ["Mixer Make",c.mixer],["WDS #",c.wds||"—"],["System Type",c.system],["Assigned FST",c.fst],
          ["Work Performed by",c.by],["Install / Completion",c.install+" / "+c.complete],
          ["CSM Billable Status",c.billStatus],["Billable",c.billable],["Parts Consumed",c.partsConsumed||"—"],[" ",""],
        ]} />}
        {c.type!=="Billing-only" && docsFor(c.type).length>0 && <div style={{marginBottom:10, fontSize:12}}>
          <span style={{color:C.sub, fontWeight:600}}>Attached docs: </span>
          {docsFor(c.type).map((f,k)=><span key={k} title={f} style={{display:"inline-block", margin:"2px 4px 2px 0", padding:"2px 7px", borderRadius:10, border:`1px solid ${C.border}`, color:C.link, cursor:"pointer"}}>📄 {f}</span>)}
        </div>}
        {(c.status==="Ready to Dispatch" || c.status==="Activated — Ready to Dispatch") && c.type!=="Billing-only" && <div>
          <div style={{fontSize:12, fontWeight:600, marginBottom:2}}>{list===DEINSTALL_CHECKLIST ? "De-install checklist (5 items)" : "Checklist ("+list.length+" items)"}</div>
          <div style={{columns:2, columnGap:16, fontSize:12}}>{list.map((item,k)=>(<label key={k} style={{display:"block", breakInside:"avoid", padding:"2px 0"}}><input type="checkbox" checked={k<c.checks} onChange={()=>patchColiM(m.id,c.id,{checks:k<c.checks?k:k+1})} disabled={c.status!=="Ready to Dispatch" && c.status!=="Activated — Ready to Dispatch"}/> {item}</label>))}</div>
          {c.checks<list.length && <Btn role={role} setRole={setRole} need="Crew" tone="neutral" onClick={()=>patchColiM(m.id,c.id,{checks:list.length})}>Check all</Btn>}
          <div style={{marginTop:6}}><span style={{fontSize:12}}>System Ready:
            <label style={{marginLeft:6}}><input type="radio" checked={c.ready==="Yes"} onChange={()=>patchColiM(m.id,c.id,{ready:"Yes"})}/> Yes</label>
            <label style={{marginLeft:6}}><input type="radio" checked={c.ready==="No"} onChange={()=>patchColiM(m.id,c.id,{ready:"No"})}/> No</label>
          </span></div>
          {c.ready==="No" && <input placeholder="Reason if not ready" onChange={e=>patchColiM(m.id,c.id,{notReadyReason:e.target.value})} style={{marginTop:6, fontSize:12, padding:4, border:`1px solid ${C.border}`, borderRadius:4}}/>}
          <div style={{marginTop:8, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
            <input placeholder="Parts consumed (e.g. Wire harness ×1)" id={"pcm-"+c.id} style={{fontSize:12, padding:4, border:`1px solid ${C.border}`, borderRadius:4, width:190}}/>
            <Btn role={role} setRole={setRole} need="Crew" tone="ok" disabled={!moveColiReady(c) && c.ready!=="No"} onClick={()=>{moveComplete(m.id,c.id,document.getElementById("pcm-"+c.id).value); close();}}>{c.type} checklist — Complete</Btn>
            {role !== "Crew" && moveColiReady(c) && <span style={{fontSize:11, color:C.warn, marginLeft:6}}>⤴ Crew signs off. Switch under “Acting as”, or let ▶ Next do it.</span>}
          </div>
        </div>}
        {c.status==="Submitted – Pending FSM" && (unitHasOpenWoli(c.unit) ? <Btn role={role} setRole={setRole} need="FSM" tone="err" onClick={()=>{woliResolve(c.unit);}}>Resolve WOLI</Btn> : <React.Fragment>
          <Btn role={role} setRole={setRole} need="FSM" tone="ok" onClick={()=>{moveValidate(m.id,c.id); close();}}>Validate</Btn><Why>Hard two-stage gate: 3rd-party/customer crews have no Hub access, so their close is only "Submitted" — the record isn't real or billable until the FSM validates it (Spec v1.4).</Why>
          <Btn role={role} setRole={setRole} need="FSM" tone="purp" onClick={()=>{moveWoli(m.id,c.id); close();}}>Log WOLI fix</Btn>
        </React.Fragment>)}
        {c.status==="Work Complete" && (unitHasOpenWoli(c.unit) ? <Note tone="err">⚠ Open WOLI on {c.unit} — blocking billing/lock. <Btn role={role} setRole={setRole} need="FSM" tone="err" onClick={()=>{woliResolve(c.unit);}}>Resolve WOLI</Btn></Note> : <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
          <select id={"mm2-"+c.id} style={{fontSize:12, padding:3}} defaultValue="07/2026"><option>07/2026</option><option>08/2026</option></select>
          <Btn role={role} setRole={setRole} need="CSM" tone="purp" onClick={()=>{moveBillConfirm(m.id,c.id,document.getElementById("mm2-"+c.id).value); close();}}>Confirm billable + month</Btn><Why>The one immutability moment: confirming billable + month locks this COLI forever — billed COLIs can never be edited or cancelled (Spec §7.3).</Why>
        </div>)}
        {c.status==="On Hold — Awaiting Truck" && <React.Fragment>
          <Btn role={role} setRole={setRole} need={["FSM","CSM","Crew"]} tone="warn" onClick={()=>{moveReady(m.id,c.id); close();}}>Mark truck ready</Btn>
          <Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="neutral" onClick={()=>{cancelColi(m.id,c.id); close();}}>Cancel COLI</Btn>
        </React.Fragment>}
        {c.status==="On Hold — Not Ready" && <React.Fragment><Note tone="warn">Not billable · FSM reminder active · optional rush parts.</Note><Btn role={role} setRole={setRole} need="Supply Chain" tone="warn" onClick={()=>{moveResumeHold(m.id,c.id); close();}}>Rush parts delivered — reopen</Btn></React.Fragment>}
        {c.status==="Requested" && <Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="ok" onClick={()=>{moveUnitSwitch(m.id,c.id); close();}}>Request unit switch</Btn>}
        {c.status==="Unit Switch Requested" && (c.truckAlsoChanges ? <Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="ok" onClick={()=>{moveTruckSwitch(m.id,c.id); close();}}>Request truck switch</Btn> : <Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="purp" onClick={()=>{moveSendCC(m.id,c.id); close();}}>Send to Command Center</Btn>)}
        {c.status==="Truck Switch Requested" && <Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="purp" onClick={()=>{moveSendCC(m.id,c.id); close();}}>Send to Command Center</Btn>}
        {c.status==="Command Center Action" && (isAcctChange(m.reason) ? <React.Fragment><Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="ok" onClick={()=>{moveTeamConfirm(m.id,c.id); close();}}>Confirm move complete</Btn><Why>Account changes are not actually non-physical: unit switch (+ truck switch if flagged) route through Command Center, and the TEAM confirming the move is what closes it (Spec v1.5 item 9).</Why></React.Fragment> : <React.Fragment><Btn role={role} setRole={setRole} need="CSM" tone="ok" onClick={()=>{nonPhysConfirmSimple(m.id,c.id); close();}}>Confirm name change</Btn><Why>Transfer to Another Truck is a name change only — no field work, no checklist, and usually no bill. It exists purely to document the change (Spec v1.4).</Why></React.Fragment>)}
        {c.status==="Awaiting SC receipt" && <React.Fragment><Btn role={role} setRole={setRole} need="Supply Chain" tone="ok" onClick={()=>{moveReceipt(m.id,c.id); close();}}>Confirm receipt</Btn><Why>Supply Chain confirming arrival (+ which unit) triggers removal from Hub — UNIT DEATH. The stamped WOLI record survives in Salesforce (Spec §6.3). Dual-state design (July 15 call, 27:45–30:20): TODAY Salesforce/SC owns the return end-to-end (build this). FUTURE: the FST marks the unit “pending return” in Hub when they pull it; this case then watches for the unit to disappear as its trigger. Amicus: build today’s state, leave the hook for the Hub-pending trigger.</Why></React.Fragment>}
        {c.status.includes("Billed") && <ClosureBanner/>}
      </Modal>;
    }

    if (engine === "mid") {
      const m = midCases.find(x=>x.id===caseId); if (!m) return null;
      const c = m.colis.find(x=>x.id===coliId); if (!c) return null;
      return <Modal title={c.id + " — " + c.type + " COLI (" + caseId + ")"} badges={[<Chip key="s" tone={c.status.includes("Billed")?"ok":c.status.includes("Hold")?"warn":"info"}>{c.status}</Chip>, c.verified && <Chip key="v" tone="ok">{c.verified}</Chip>]} onClose={close}>
        <FieldGrid rows={[
          ["Truck now",c.truck],["TCG/Unit #",c.tcg],
          ["Truck stamped @ create",c.truckStampedAtCreate],["Truck stamped @ complete",c.truckStampedAtComplete||"— (pending)"],
          ["Mixer Make",c.mixer],["WDS #",c.wds],["System Type",c.system],["Assigned FST",c.fst],
          ["Work Performed by",c.by],["Install / Completion",c.install+" / "+c.complete],
          ["CSM Billable Status",c.billStatus],["Billable",c.billable],["Parts Consumed",c.partsConsumed||"—"],[" ",""],
        ]} />
        {docsFor(c.type).length>0 && <div style={{marginBottom:10, fontSize:12}}>
          <span style={{color:C.sub, fontWeight:600}}>Attached docs: </span>
          {docsFor(c.type).map((f,k)=><span key={k} title={f} style={{display:"inline-block", margin:"2px 4px 2px 0", padding:"2px 7px", borderRadius:10, border:`1px solid ${C.border}`, color:C.link, cursor:"pointer"}}>📄 {f}</span>)}
        </div>}
        {c.status==="Ready to Dispatch" && <div>
          <div style={{fontSize:12, fontWeight:600, marginBottom:2}}>Checklist ({CHECKLIST.length} items) — same list used everywhere</div>
          <div style={{columns:2, columnGap:16, fontSize:12}}>{CHECKLIST.map((item,k)=>(<label key={k} style={{display:"block", breakInside:"avoid", padding:"2px 0"}}><input type="checkbox" checked={k<c.checks} onChange={()=>setMidCases(mc=>mc.map(x=>x.id===m.id?{...x,colis:x.colis.map(y=>y.id===c.id?{...y,checks:k<y.checks?k:k+1}:y)}:x))} disabled={c.status!=="Ready to Dispatch"}/> {item}</label>))}</div>
          {c.checks<CHECKLIST.length && <Btn role={role} setRole={setRole} need="Crew" tone="neutral" onClick={()=>setMidCases(mc=>mc.map(x=>x.id===m.id?{...x,colis:x.colis.map(y=>y.id===c.id?{...y,checks:CHECKLIST.length}:y)}:x))}>Check all</Btn>}
          {c.by==="Verifi" && <div style={{fontSize:12, color:C.sub, marginTop:4}}>+ Verifi-only commissioning: tilt · settings · config · firmware · software</div>}
          <div style={{marginTop:6}}><span style={{fontSize:12}}>System Ready:
            <label style={{marginLeft:6}}><input type="radio" checked={c.ready==="Yes"} onChange={()=>setMidCases(mc=>mc.map(x=>x.id===m.id?{...x,colis:x.colis.map(y=>y.id===c.id?{...y,ready:"Yes"}:y)}:x))}/> Yes</label>
            <label style={{marginLeft:6}}><input type="radio" checked={c.ready==="No"} onChange={()=>setMidCases(mc=>mc.map(x=>x.id===m.id?{...x,colis:x.colis.map(y=>y.id===c.id?{...y,ready:"No"}:y)}:x))}/> No</label>
          </span></div>
          {c.ready==="No" && <input placeholder="Reason if not ready" onChange={e=>setMidCases(mc=>mc.map(x=>x.id===m.id?{...x,colis:x.colis.map(y=>y.id===c.id?{...y,notReadyReason:e.target.value}:y)}:x))} style={{marginTop:6, fontSize:12, padding:4, border:`1px solid ${C.border}`, borderRadius:4}}/>}
          <div style={{marginTop:8, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
            <input placeholder="Parts consumed" id={"mpc2-"+c.id} style={{fontSize:12, padding:4, border:`1px solid ${C.border}`, borderRadius:4, width:170}}/>
            <Btn role={role} setRole={setRole} need="Crew" tone="ok" disabled={!(c.checks===CHECKLIST.length && c.ready==="Yes") && c.ready!=="No"} onClick={()=>{midComplete(m.id,c.id,document.getElementById("mpc2-"+c.id).value); close();}}>Complete</Btn>
            {role !== "Crew" && c.checks===CHECKLIST.length && c.ready==="Yes" && <span style={{fontSize:11, color:C.warn, marginLeft:6}}>⤴ Crew signs off. Switch under “Acting as”, or let ▶ Next do it.</span>}
          </div>
        </div>}
        {c.status==="On Hold — Not Ready" && <React.Fragment><Note tone="warn">Not billable · FSM reminder active · optional rush parts.</Note><Btn role={role} setRole={setRole} need="Supply Chain" tone="warn" onClick={()=>{midResumeHold(m.id,c.id); close();}}>Rush parts delivered — reopen</Btn></React.Fragment>}
        {c.status==="Submitted – Pending FSM" && (unitHasOpenWoli(c.unit) ? <Btn role={role} setRole={setRole} need="FSM" tone="err" onClick={()=>{woliResolve(c.unit);}}>Resolve WOLI</Btn> : <React.Fragment>
          <Btn role={role} setRole={setRole} need="FSM" tone="ok" onClick={()=>{midValidate(m.id,c.id); close();}}>Validate</Btn><Why>Hard two-stage gate: 3rd-party/customer crews have no Hub access, so their close is only "Submitted" — the record isn't real or billable until the FSM validates it (Spec v1.4).</Why>
          <Btn role={role} setRole={setRole} need="FSM" tone="purp" onClick={()=>{midWoli(m.id,c.id); close();}}>Log WOLI fix</Btn>
        </React.Fragment>)}
        {c.status==="Work Complete" && (unitHasOpenWoli(c.unit) ? <Note tone="err">⚠ Open WOLI on {c.unit} — blocking billing/lock. <Btn role={role} setRole={setRole} need="FSM" tone="err" onClick={()=>{woliResolve(c.unit);}}>Resolve WOLI</Btn></Note> : <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
          <select id={"mm3-"+c.id} style={{fontSize:12, padding:3}} defaultValue="07/2026"><option>07/2026</option><option>08/2026</option></select>
          <Btn role={role} setRole={setRole} need="CSM" tone="purp" onClick={()=>{midBillConfirm(m.id,c.id,document.getElementById("mm3-"+c.id).value); close();}}>Confirm billable + month</Btn><Why>The one immutability moment: confirming billable + month locks this COLI forever — billed COLIs can never be edited or cancelled (Spec §7.3).</Why>
        </div>)}
        {c.status.includes("Billed") && <ClosureBanner/>}
      </Modal>;
    }
    return null;
  };

  return (
    <div style={{height:"100vh", background:"#20242D", color:C.text, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      {/* ─ GUIDE DOCK — sticky, always visible; magenta = not-the-product, same language as the comment pins ─ */}
      <div style={{position:"relative", zIndex:45, flex:"none", background:"#20242D", borderBottom:"3px solid #E5397F", boxShadow:"0 6px 18px rgba(0,0,0,.35)"}}>
      <div style={{color:"#fff", padding:"6px 16px 4px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8}}>
        <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
          <span style={{background:"#E5397F", color:"#fff", borderRadius:4, padding:"2px 8px", fontSize:10, fontWeight:800, letterSpacing:.5}}>GUIDE LAYER</span>
          <span style={{fontSize:12, color:"#9BA3B2"}}>not part of the product</span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:8}}>
          <button onClick={()=>setShowLegend(v=>!v)} style={{background:"none", color:"#9BA3B2", border:"1px solid #3A4150", borderRadius:4, padding:"3px 10px", fontSize:11, fontWeight:600, cursor:"pointer"}}>■ color code {showLegend ? "▴" : "▾"}</button>
          <button onClick={onRestart} style={{background:"rgba(255,255,255,.1)", color:"#fff", border:"1px solid #3A4150", borderRadius:4, padding:"3px 12px", fontSize:11, fontWeight:700, cursor:"pointer"}}>⟲ Restart</button>
        </div>
      </div>
      {showLegend && <div style={{padding:"0 16px 6px", fontSize:11, color:"#9BA3B2", display:"flex", gap:12, flexWrap:"wrap", alignItems:"center"}}>
        <span style={{color:"#E5397F", fontWeight:700}}>guide-only — real buttons ship in standard Salesforce styling:</span>
        <span style={{color:"#B58BEF"}}>■ purple = billing · lock · Command Center</span>
        <span style={{color:"#FF8A80"}}>■ red = blocking / loud</span>
        <span style={{color:"#7DD69A"}}>■ green = advance</span>
        <span style={{color:"#E8C15A"}}>■ amber = gate / waiting</span>
      </div>}

      <div style={{padding:"3px 16px 5px", display:"flex", gap:6, flexWrap:"wrap", alignItems:"center"}}>
        <span title="roles are dynamic, not people" style={{fontSize:10, color:"#8A90A0", marginRight:4, fontWeight:700, letterSpacing:.6}}>ACTING AS</span>
        {ROLES.map(([r, sub]) => (
          <button key={r} onClick={()=>setRole(r)} title={sub}
            style={{borderRadius:14, border: role===r ? "1px solid #fff" : "1px solid #3A4150", background: role===r ? "#fff" : "transparent", color: role===r ? "#20242D" : "#C9CED8", padding:"2px 11px", fontSize:12, fontWeight: role===r?700:500, cursor:"pointer"}}>
            {r}
          </button>
        ))}
      </div>

      {created && <div style={{padding:"3px 16px 5px"}}>
        <div style={{fontSize:10, color:"#8A90A0", marginBottom:4, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", fontWeight:700, letterSpacing:.6}}>STORY PROGRESS — ORD-1042 {killed && <Chip tone="err">KILLED</Chip>}<Why>In the real build this becomes a Salesforce Path on the Order case — a stage bar Amicus builds, with stages like Draft &amp; dual approval → Installation Specialist → Contract/RM/Finance gate → Supply Chain · IO → Units created (Hub) → Install &amp; billing → Returns · IO closure → SC order closed → Final close. Two bits here are guide-only, NOT stage names: “Units created (Hub)” is a rename from “Units born” per July 16 review — Ariel: "consider naming change" — open to a better label from her. “(skipped)” narrates a conditional this order didn’t hit, and “owner TBD” is an open parking-lot question (who closes the order case — Finance or SC?), still undecided in the spec.</Why></div>
        <div style={{display:"flex", alignItems:"center", flexWrap:"wrap", gap:4}}>
          {spine.map(([label, done], i) => (
            <React.Fragment key={label}>
              <Chip tone={done===true ? "ok" : done===null ? "neutral" : i===currentIdx ? "info" : "neutral"} dim={done===null || (done===false && i!==currentIdx)}>
                {done===true ? "✓ " : i===currentIdx ? "● " : ""}{label}
              </Chip>
              {i < spine.length-1 && <span style={{color:"#4A5160"}}>—</span>}
            </React.Fragment>
          ))}
          {orderDone && <Why key="finish" author="Guided tour" initial="T" defaultOpen>
            <b>🏁 Workflow complete.</b> You just ran the entire order-install lifecycle — order → dual approval → ship → units born in Hub → install → validate → bill (locked forever) → SAP → returns → IO closure → SC close.
            <span style={{display:"block", marginTop:5}}>The one step that can’t run is <b>Final close</b>: its owner is an open spec question (Finance or Supply Chain?) — the flow deliberately parks here so nobody forgets to decide.</span>
            <span style={{display:"block", marginTop:8, textAlign:"right"}}><button onClick={onRestart} style={{background:C.link, border:"1px solid " + C.link, borderRadius:14, padding:"4px 14px", fontSize:12, fontWeight:700, color:"#fff", cursor:"pointer"}}>⟲ Reset the workflow</button></span>
            <span style={{display:"block", marginTop:5, color:"#777", fontSize:11}}>…or leave it as-is and start a Verifi Service case to walk de-install / re-install.</span>
          </Why>}
        </div>
      </div>}

      <div style={{margin:"5px 16px 12px", background:"#2A2F3B", border: N.manual ? "1px solid #E8C15A" : "1px solid #3A4150", borderRadius:10, padding:"9px 14px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", boxShadow:"0 2px 10px rgba(0,0,0,.3)"}}>
        {lastAction && <span style={{display:"inline-flex", alignItems:"center", gap:6, fontSize:12, minWidth:0}}>
          <b style={{color:"#7DD69A", whiteSpace:"nowrap"}}>✓ {lastAction.who}</b><span style={{color:"#9BA3B2"}}>{lastAction.label}</span>
        </span>}
        {lastAction && <span style={{color:"#4A5160"}}>→</span>}
        <span style={{flex:1, minWidth:240, fontSize:13, color:"#fff"}}>
          <span style={{background:TONES[N.tone][1], color:TONES[N.tone][0], borderRadius:4, padding:"1px 7px", fontSize:10, fontWeight:800, marginRight:8, whiteSpace:"nowrap"}}>{N.manual ? "✋ YOUR TURN" : "NEXT"}</span>
          <b>{N.who}</b> <span style={{color:"#B9BEC9"}}>— {N.text}</span>
        </span>
        {N.run && <button onClick={advance} title={"Runs this step as " + N.who + " and highlights where it happened in the window — or pick a role under Acting as and drive every button yourself"} style={{background:C.ok, color:"#fff", border:"1px solid " + C.ok, borderRadius:6, padding:"7px 16px", fontSize:13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"}}>▶ Next — {N.label}</button>}
        {N.manual && <button onClick={showMe} style={{background:"none", color:"#E8C15A", border:"1px solid #E8C15A", borderRadius:6, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"}}>✋ Show me where</button>}
      </div>
      </div>{/* ─ end guide dock ─ */}

      <div style={{display:"flex", gap:14, alignItems:"stretch", flexWrap:"nowrap", margin:"14px 16px 16px", flex:1, minHeight:0}}>
      {/* ─ PRODUCT WINDOW — everything inside this frame is the Salesforce UI that gets built ─ */}
      <div style={{flex:"2 1 620px", minWidth:360, borderRadius:10, boxShadow:"0 12px 34px rgba(0,0,0,.4)", display:"flex", flexDirection:"column", minHeight:0}}>
        <div style={{background:"#E8EBF0", border:"1px solid #C6CBD4", borderBottom:"none", borderRadius:"10px 10px 0 0", padding:"7px 12px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
          <span style={{display:"inline-flex", gap:5}}><span style={{width:10,height:10,borderRadius:"50%",background:"#FF5F57"}}/><span style={{width:10,height:10,borderRadius:"50%",background:"#FEBC2E"}}/><span style={{width:10,height:10,borderRadius:"50%",background:"#28C840"}}/></span>
          <span style={{fontSize:12, fontWeight:700, color:"#3A3F47"}}>Salesforce — Verifi Console</span>
          <span style={{marginLeft:"auto", fontSize:11, color:"#7A8089", fontWeight:600}}>THE PRODUCT — everything inside this window is what gets built</span>
        </div>
        <div style={{background:C.page, border:"1px solid #C6CBD4", borderTop:"none", borderRadius:"0 0 10px 10px", padding:"12px 12px 20px", flex:1, minHeight:0, overflowY:"auto"}}>
      <div style={{display:"flex", gap:12, alignItems:"flex-start", flexWrap:"wrap"}}>
        <div style={{flex:"2 1 560px", minWidth:340}}>
          <div style={{background:"#fff", border:`1px solid ${C.border}`, borderRadius:"6px 6px 0 0", display:"flex", flexWrap:"wrap"}}>
            <TabBtn id="cases" label="Cases" />
            <TabBtn id="order" label="Order" />
            <TabBtn id="install" label={"Install" + (colis.length ? " · 0101" : "")} />
            <TabBtn id="units" label="Units" />
            <TabBtn id="returns" label="Returns" />
            <TabBtn id="sc" label="SC dashboard" />
            <TabBtn id="history" label={"History" + (fieldHistory.length ? " ("+fieldHistory.length+")" : "")} />
            <TabBtn id="spec" label="Spec" />
          </div>
          <div style={{background:"#fff", border:`1px solid ${C.border}`, borderTop:"none", borderRadius:"0 0 6px 6px", padding:12, marginBottom:12}}>

            {tab==="cases" && <div>
              <Card title={"All cases (" + ((created?1:0)+(colis.length?1:0)+midCases.length+moveCases.length) + ") — the team's one view"} hot={hot("create")} badge={<Btn role={role} setRole={setRole} tone="ok" onClick={openPicker}>＋ New Case</Btn>}>
                {!created && !picker && <div style={{textAlign:"center", padding:"20px", color:C.sub, fontSize:13}}>No cases yet. Everything — orders, installs, upgrades, movements — starts at ＋ New Case.</div>}
                {created && caseRow("ORD-1042","New Unit Order", fields.customer + " · " + fields.trucks + " trucks · " + fields.system, killed?"Killed":scClosed?"Tail — final close TBD":installClosed?"Open — order tail":atSC?"At Supply Chain":"In approval", killed?"err":installClosed?"warn":"info", ()=>setTab("order"))}
                {colis.length>0 && caseRow("CASE-0101","Verifi Install · New Install", "3 units · " + crewLabel, installClosed?"Closed":anyNoBillPending?"No-bill pending":locked?(colis.every(c=>c.billable==="no-ok")?"Non-billable · locked":"Billed · locked"):"Open", installClosed?"ok":anyNoBillPending?"warn":"info", ()=>setTab("install"))}
                {midCases.map(m=>caseRow(m.id,"Verifi Install · "+m.reason, m.unit+" · by "+m.by, m.status, m.status==="Closed"?"ok":"info", null))}

              {moveForm && <Card title="New Case: Verifi Service" you={youStep("form-move")} spot="form-move" badge={<Why>The Install Reason picklist drives which COLIs get generated (e.g. combined De-install &amp; Re-Install creates both at once). Multi-unit: the checkbox picker creates one COLI set per unit, each guarded individually (Spec v1.4–v1.5).</Why>}>
                {moveErr && <Note tone="err">⚠ {moveErr}</Note>}

                  <select value={moveForm.system} onChange={e=>setMoveForm(m=>({...m,system:e.target.value}))} style={{padding:5, border:`1px solid ${C.border}`, borderRadius:4}}>{SYSTEMS.slice(0,5).map(s=><option key={s}>{s}</option>)}</select>

                  <div style={{display:"flex", flexWrap:"wrap", gap:6, marginTop:4}}>

                <div style={{marginTop:10}}><Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="ok" onClick={submitMove} disabled={!moveForm.units.length}>Save &amp; generate COLI(s)</Btn><Btn role={role} setRole={setRole} tone="neutral" onClick={()=>{setMoveForm(null); setMoveErr("");}}>Cancel</Btn></div>
                <Note tone="neutral">Required fields by reason are DRAFT until the Hub's authoritative list lands. Return-to-Verifi holds the whole case for Finance (First Commissioned surfaced for depreciation; approval triggers the RO + parts manifest).</Note>
              </Card>}

              {moveCases.map(m=>(
                <Card key={m.id} title={m.id + " — " + m.reason + " · " + m.units.join(", ")} hot={N.key && N.key.startsWith("mv-") && (N.key.includes(m.id) || m.colis.some(c=>N.key===("mv-"+c.id)))} just={m.status==="Closed" ? null : just(...caseKeys("mv-",m))} spot={caseKeys("mv-",m).join(" ")} coach={GUIDE} badge={<span style={{display:"inline-flex", alignItems:"center", gap:4}}><Chip tone={m.status==="Closed"?"ok":m.status==="Pending Finance"||m.status==="Rejected"?"err":"info"}>{m.status}</Chip>{isAcctChange(m.reason) && <Why>Billing cutover on transfers (July 15 call, 37:10): unit IDs only transfer between PARENTED accounts (e.g. Folsom ↔ Silver Strike, the Semex family). Everyone else: whole-month billing — no prorated billing exists today. Amicus: don’t build proration; the cutover is month-granular.</Why>}{m.colis.some(c=>c.type==="Re-Install") && <Why>Future automation to capture now (July 15 call, 21:45–23:27): the re-install needs a comment/field for “going on truck 123”; the data flow then validates the stamped unit actually landed there — stamped-vs-live mismatch → flag CSM/FSM automatically. Field goes in v1; the flag automation is future state.</Why>}{m.status==="Closed" && !(picker || showOrderForm || installForm || moveForm) && <Why key={"done-"+m.id} author="Guided tour" initial="T" defaultOpen><b>🏁 {m.id} complete.</b> {m.reason} on {m.units.join(", ")} ran end to end — checklist gate, FSM stage-gate where 3rd-party/customer did the work, per-COLI billing lock, Command Center close.<span style={{display:"block", marginTop:5, color:"#777", fontSize:11}}>Pick the next flow at ＋ New Case — or ⟲ Restart to reset everything.</span></Why>}</span>}>
                  {m.reason.includes("Another") && <Note tone="warn">⚠ Transfer parts consumption routes through a <b>different PR (transfer IO / PR-against-the-case)</b>, not the regular work-order path — flagged, not yet numbered. <b>Open question for Finance/Supply Chain.</b></Note>}
                  <div style={{display:"flex", gap:4, marginBottom:8, borderBottom:`1px solid ${C.borderLt}`}}>
                    {["Related","Details"].map(t=><button key={t} onClick={()=>setSubTab(s=>({...s,[m.id]:t}))} style={{border:"none", background:"none", padding:"4px 10px", fontSize:12, fontWeight:(subTab[m.id]||"Related")===t?700:500, color:(subTab[m.id]||"Related")===t?C.link:C.sub, borderBottom:(subTab[m.id]||"Related")===t?`2px solid ${C.link}`:"2px solid transparent", cursor:"pointer"}}>{t}</button>)}

                    <Btn role={role} setRole={setRole} need={["CSM","FSM"]} tone="neutral" onClick={()=>moveWithdraw(m.id)}>Withdraw case</Btn>

              <Card title="Command Center (transitional)" badge={<Chip tone={ccEnabled?"info":"neutral"}>{ccEnabled?"step ON":"bypassed"}</Chip>}>
                <label style={{fontSize:12}}><input type="checkbox" checked={ccEnabled} onChange={e=>{setCcEnabled(e.target.checked); addLog("System", e.target.checked ? "Command Center step turned ON — every engine routes through it before closing." : "Command Center step turned OFF (toggle) — cases close directly, bypassing CC. — Spec §4.6");}}/> Route Order-install, Movement, and Mid-life through Command Center before closing</label>
                <Note tone="neutral">First-class, toggleable step (Spec §4.6) — meant to come off once the org trusts the system. Applies everywhere except Supply Chain's own order-closing steps, which never routed through CC.</Note>
              </Card>
              <Card title="Supply Chain dashboard — James's tracker, live" hot={hot("labor")||hot("ioclose")||hot("scclose")} just={just("labor","ioclose","scclose")} spot="labor ioclose scclose" coach={GUIDE} badge={<Chip tone={hubTask?"err":scClosed?"ok":"neutral"}>{hubTask?"HUB TASK OPEN":scClosed?"SC ORDER CLOSED":"tracking"}</Chip>}>
                {!created && <Note tone="neutral">Empty until an order exists.</Note>}
                {created && <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse", fontSize:11, width:"100%"}}>
                    <thead><tr>
                      {["Order","Requested On-Site","Labor","IO / PO / GL / CC","Est Ship","Actual Ship","Shipment Processed","Fleet","Drop","Labor Processed","Returns Processed","IO Closure","SC Closed","Comments"].map(h=>
                        <th key={h} style={{padding:"5px 8px", border:`1px solid ${C.border}`, background:"#EAF0F6", whiteSpace:"nowrap", fontSize:11}}>{h}</th>)}
                    </tr></thead>
                    <tbody><tr>
                      <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, fontWeight:700, whiteSpace:"nowrap"}}>ORD-1042</td>
                      {cell(fields.reqDate, true)}
                      {cell(fields.labor, true)}
                      {cell(ioCreated ? "IO-6076812" : "Needed", ioCreated)}
                      {cell(estDate || "Needed", !!estDate)}
                      {cell(shipped ? "07/14/26" : "Needed", shipped)}
                      {cell(hubCreated ? "07/15/26" : "Needed", hubCreated)}
                      {cell("TLC", true)}
                      {cell(shipped ? "2 dest" : "—", shipped)}
                      {cell(fields.labor==="Customer" ? "N/A" : laborDone ? "Done" : "Needed", laborDone || fields.labor==="Customer")}
                      {cell(retReceived ? fields.fsm.split(" ")[0] + " (FSM)" : "Needed", retReceived)}
                      {cell(ioClosed ? "Closed" : "Needed", ioClosed)}
                      {cell(scClosed ? "✓" : "Open", scClosed)}
                      <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, fontSize:11}}>{!contract && !gateDone ? "Waiting on contract signing." : killed ? "Order killed." : ""}</td>
                    </tr></tbody>
                  </table>
                </div>}
                <div style={{marginTop:10}}>
                  {shipped && fields.labor!=="Customer" && !laborDone && <Btn role={role} setRole={setRole} need="Supply Chain" tone="ok" onClick={processLabor}>Process labor ({fields.labor})</Btn>}
                  {retReceived && ioCreated && !ioClosed && <Btn role={role} setRole={setRole} need="Finance" tone="ok" onClick={closeIO}>IO closure</Btn>}
                  {retReceived && ioClosed && (laborDone || (created && fields.labor==="Customer")) && !scClosed && <Btn role={role} setRole={setRole} need="Supply Chain" tone="ok" onClick={closeSC}>Close SC order</Btn>}
                  {hubTask && <Btn role={role} setRole={setRole} need="Supply Chain" tone="err" onClick={createHub}>Create units in Hub — LOUD</Btn>}
                </div>
                <Note tone="neutral">SC close requires: shipment processed + labor + returns + IO closure — the "rest of the supply chain documentation" tail. Order-case final close (owner TBD) sits above this.</Note>
              </Card>
            </div>}

            {tab==="history" && <div>
              <Card title="Field History — the real audit trail" badge={<Chip tone="neutral">{fieldHistory.length} changes</Chip>}>
                <Note tone="neutral">This is a structured, queryable record (old value → new value → who → when) — distinct from the narrative Activity Log. Requested in Phase 0 ("full field history required, who changed what last") and not actually delivered until now.</Note>
                {!fieldHistory.length && <div style={{fontSize:12, color:C.sub, padding:"10px 0"}}>No tracked field changes yet. Try editing Truck Count or Install Labor on the Order tab, or running a billing decision.</div>}
                {fieldHistory.length>0 && <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse", fontSize:12, width:"100%"}}>
                    <thead><tr>{["Record","Field","Old Value","New Value","Changed By","When"].map(h=><th key={h} style={{padding:"6px 8px", border:`1px solid ${C.border}`, background:"#EAF0F6", textAlign:"left", whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                    <tbody>{fieldHistory.map(h=>(
                      <tr key={h.n}>
                        <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, fontWeight:700, whiteSpace:"nowrap"}}>{h.record}</td>
                        <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, whiteSpace:"nowrap"}}>{h.field}</td>
                        <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, color:C.err}}>{String(h.oldVal)}</td>
                        <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, color:C.ok, fontWeight:600}}>{String(h.newVal)}</td>
                        <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, whiteSpace:"nowrap"}}><Chip tone="info">{h.who}</Chip></td>
                        <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, color:C.sub, whiteSpace:"nowrap"}}>{h.when}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>}
                <Note tone="warn">Scope note: currently tracks Order-case fields (Truck Count, Install Labor) and billing-status transitions — the two places the spec explicitly calls for auditability. Extending to every editable field (COLI fields, movement-case fields) is straightforward with the same `recordHistory` pattern — flag if you want that widened before this ships to the team.</Note>
              </Card>
            </div>}

            {tab==="spec" && <div style={{fontSize:13, lineHeight:1.7}}>
              <b>v13 — Spec v1.2 coverage:</b>
              <div>0 · Everything starts at Cases → ＋ New Case picker (New Unit Order · Verifi Install · Verifi Service; the rest greyed like the real picker).</div>
              <div>1 · All-cases list for the team · 2 · Order spine incl. <b>&gt;40 → Finance</b> gate (recovered) · 3 · Billing review actionable from the thread; No-bill + reason intact · 4 · Real COLIs · 5 · <b>Verifi Service</b> (real Install Reason picklist — "Transfer" killed as physical work, split into non-physical name/account-change COLIs vs physical de/re-install COLIs), real Truck-Install fields, 3rd-party manual TCG + FSM validation gate, Service Ready hold, data-flow "verified" indicator, per-COLI billing-month confirm, schedule-lite, Pending-Finance return + parts manifest, cancel COLI, duplicate guard, case roll-up close · 6 · Returns six-stage stepper · 7 · SC dashboard with <b>IO Closure + SC order close</b> (restored).</div>
              <Note tone="neutral">📌 Parked: damaged/DOA · full WOLI workflow (this build only adds "blocks billing/lock" — real field-team process still TBD) · cadence · billing object · Customer Onboarding phase · cross-account timing (SF won't know when the unit moves — Hub data flow). Command Center toggle is now built (SC dashboard tab).</Note>
            </div>}
          </div>
        </div>

      </div>
        </div>
      </div>{/* ─ end product window ─ */}

      {/* ─ GUIDE NARRATION — the story so far; content is guide, but the capability it stands in for is a real requirement ─ */}
      <div style={{flex:"1 1 300px", minWidth:280, background:"#20242D", border:"1px solid #3A4050", borderTop:"3px solid #E5397F", borderRadius:10, boxShadow:"0 10px 26px rgba(0,0,0,.35)", display:"flex", flexDirection:"column", minHeight:0}}>
        <div style={{padding:"8px 12px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
          <span style={{background:"#E5397F", color:"#fff", borderRadius:4, padding:"2px 8px", fontSize:10, fontWeight:800, letterSpacing:.5}}>GUIDE</span>
          <span style={{fontSize:12, fontWeight:700, color:"#fff"}}>Narration — the story so far</span>
          <span style={{marginLeft:"auto", fontSize:11, color:"#B9BEC9"}}>{log.length} handoffs</span>
        </div>
        <div style={{margin:"0 8px 8px", background:"#fff", borderRadius:8, padding:"8px 10px", flex:1, minHeight:0, display:"flex", flexDirection:"column"}}>
          <div style={{fontSize:11, color:C.sub, paddingBottom:6, marginBottom:2, borderBottom:`1px solid ${C.borderLt}`}}>These spec-citation narrations are guide-only — but in the real build this panel becomes the case feed + field history: the end-to-end “no one ever has to ask what’s happening” requirement. The History tab in the window is the real audit-trail piece.</div>
          {!log.length && <div style={{fontSize:12, color:C.sub, paddingTop:4}}>Nothing yet — the thread starts at ＋ New Case.</div>}
          <div style={{flex:1, minHeight:0, overflowY:"auto"}}>
            {log.map(e=>(
              <div key={e.n} style={{padding:"6px 0", borderBottom:`1px solid ${C.borderLt}`, fontSize:12}}>
                <div><Chip tone="info">{e.who}</Chip> <span style={{color:C.sub}}>#{e.n}</span></div>
                <div style={{marginTop:2}}>{e.msg}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      </div>{/* ─ end page flex ─ */}
      {openColi && renderColiModal()}
    </div>
  );
}

function Root() {
  const [epoch, setEpoch] = useState(0);
  return <App key={epoch} onRestart={()=>setEpoch(e=>e+1)} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
