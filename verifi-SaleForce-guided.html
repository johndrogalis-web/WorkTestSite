<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifi Console — Flow Prototype v22 (Guided)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body, #root { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid #0176D3; outline-offset: 1px; }
  @keyframes spotPulse { 0% { box-shadow: 0 0 0 0 rgba(46,132,74,.45); } 70% { box-shadow: 0 0 0 12px rgba(46,132,74,0); } 100% { box-shadow: 0 0 0 0 rgba(46,132,74,0); } }
  @keyframes spotHole { 0%, 68% { box-shadow: 0 0 0 4px rgba(46,132,74,.9), 0 0 0 100vmax rgba(8,14,22,.55); } 100% { box-shadow: 0 0 0 3px rgba(46,132,74,.25), 0 0 0 100vmax rgba(8,14,22,0); } }
  [data-spot] { scroll-margin: 16px 0 24px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {
  page:"#F3F3F3", border:"#DDDBDA", borderLt:"#EAEAEA",
  text:"#181818", sub:"#5C5C5C", link:"#0176D3", topBar:"#16325C",
  ok:"#2E844A", okBg:"#EFFCF4", warn:"#A56500", warnBg:"#FEF3E7",
  info:"#0176D3", infoBg:"#EEF4FE", purp:"#7526E3", purpBg:"#F4EEFC",
  err:"#BA0517", errBg:"#FEF1EE", neutral:"#5C5C5C", neutralBg:"#F2F2F2",
  green:"#D6F0DC", orange:"#FBE3D0",
};
const TONES = { ok:[C.ok,C.okBg], warn:[C.warn,C.warnBg], info:[C.info,C.infoBg], err:[C.err,C.errBg], purp:[C.purp,C.purpBg], neutral:[C.neutral,C.neutralBg] };

const ROLES = [
  ["CSM","customer success"], ["FSM","field service"],
  ["Installation Specialist","real title — Campbell / Bruschi today"], ["Supply Chain","dynamic · James K today"],
  ["Finance","dynamic · Jim today"], ["Regional Manager",""],
  ["Crew","FST / 3rd party / customer"], ["Command Center","transitional team"],
];

const CHECKLIST = [
  "Air system leak-free (OEM + Verifi)", "Water system leak-free (OEM + Verifi)", "Hydraulic connections leak-free",
  ">5 satellites", "Connected to cellular + backend", "Hydraulic charge/discharge correct",
  "Drum speeds registering", "Fluids adding accurately (WNM)", "All connections tightened",
  "Cables/hoses protected from abrasion", "Truck cleaned of install debris", "All documentation complete",
];
const DEINSTALL_CHECKLIST = [
  "System powered down safely", "Unit removed from truck", "Components bagged & labeled for return",
  "Truck wiring capped / secured", "Photos taken of removal",
];
const MIXERS = ["McNeilus","Beck","Terex","Revolution","Oshkosh","ConTech","Continental"];
const SYSTEMS = ["V3","V3 w/ Admix","V5 Basic (VAS)","Spark","V5 temperate water","V5 cold water","V5 w/ Admix","V5 — Module only (Upgrade)"];
const INSTALL_REASONS = ["New Install (brownfield)"]; // Upgrade routes through New Unit Ordering per build-thread
const SERVICE_REASONS = ["Re-Install","Re-Install — Truck Damage/Paint/New Drum","De-install & Re-Install (new truck)","Deinstall — Keep at Account","Deinstall — Return Unit to Verifi","Transfer to Another Truck (name change only — no physical work)","Transfer to Another Account (unit + truck switch, routes via Command Center)"];
const PRESET_FILES = { "Install":["v5 equipment & install content 25-0718.pdf","FST V5 Installation Checklist.docx","FST V5 Air Schematics Checklist.docx"], "De-install":["FST V5 De-install Checklist.docx","Safety protocols"], "Re-Install":["FST V5 Re-install Checklist.docx","FST V5 Truck Testing Checklist.docx"], "Return":["V5 Return Order Checklist.docx","Site readiness checklist"] };
// Fake how-to docs, per-COLI — same preset library used everywhere else, just surfaced at the COLI level now (was only a case-level text note before).
const docsFor = (type) => {
  if (!type) return [];
  if (type.startsWith("Install")) return PRESET_FILES["Install"];
  if (type.startsWith("De-install")) return PRESET_FILES["De-install"].concat(type.includes("Return") ? PRESET_FILES["Return"] : []);
  if (type === "Re-Install") return PRESET_FILES["Re-Install"];
  if (type.includes("Return")) return PRESET_FILES["Return"];
  return [];
};
const WORKBY = ["Verifi","Customer","3rd Party"];
const RET_STAGES = ["Requested","BOL uploaded","Picked up (3rd party)","Shipped — SC takes over","Received","Processed"];
const FAKE_TYPES = ["Account Configuration","Annual Planning","Mixes / Slumps","Reporting / Data","SBM Case","Service Case","Settings / Code","Ticketing","Software Releases"];
const TERRITORY = {
  "AZ Materials — Plant 12": { fsm:"Marcus T. (FSM)", fst:"Matthew Machado (FST)", loc:"2200 Kiln Rd, Phoenix AZ" },
  "Globex Concrete — Plant 3": { fsm:"J. Rivera (FSM)", fst:"D. Okafor (FST)", loc:"41 Quarry Ave, Tucson AZ" },
};
const PARTS = ["V5 temperate water system","V5 cold water system","V5 Admix (Z-bracket)","V3 water system","Spark (brain)","Display","Flow meter","Front-discharge adder kit"];

function Chip({tone="neutral", children, dim}) {
  const [fg,bg] = TONES[tone];
  return <span style={{background:bg, color:fg, border:`1px solid ${fg}22`, borderRadius:10, padding:"1px 8px", fontSize:11, fontWeight:600, whiteSpace:"nowrap", opacity:dim?0.5:1}}>{children}</span>;
}
function Btn({role, need, onClick, children, tone="info", disabled, title, big, setRole}) {
  // Role-gating is simulator behavior (real Salesforce hides actions by profile). Blocked = quiet lock;
  // switch hats via "Acting as" or let the guided Next act as the owner. The old per-button "→ role"
  // switcher is retired — it was pre-guided-Next scaffolding and drowned every screen in blue buttons.
  const needs = Array.isArray(need) ? need : (need ? [need] : []);
  const roleBlocked = needs.length > 0 && !needs.includes(role);
  const off = disabled || roleBlocked;
  const [fg,bg] = TONES[tone];
  return (
    <span style={{display:"inline-flex", alignItems:"center", marginRight:6, marginBottom:4}}>
      <button onClick={off ? undefined : onClick} disabled={off}
        title={roleBlocked ? ("Needs: " + needs.join(" or ") + " — pick it under \u201CActing as\u201D, or let \u25B6 Next act as the owner") : (title || "")}
        style={{ background: off ? "#F4F4F4" : bg, color: off ? "#9b9b9b" : fg,
          border:`1px solid ${off ? C.border : fg}`, borderRadius: 4, padding: big ? "6px 14px" : "4px 10px",
          fontSize: big ? 13 : 12, fontWeight:700, cursor: off ? "not-allowed" : "pointer" }}>
        {children}{roleBlocked ? " \uD83D\uDD12" : ""}
      </button>
    </span>
  );
}
function Card({title, badge, children, hot, just, spot, you, coach}) {
  // just = {who, label} when the last guided step happened inside this card → green spotlight + caption
  // spot = space-separated step keys; the guided Next scrolls to [data-spot~="key"]
  return (
    <div data-spot={spot} style={{background:"#fff", border:`1px solid ${just ? C.ok : you ? C.warn : hot ? C.link : C.border}`, boxShadow: just ? `0 0 0 3px ${C.okBg}` : you ? `0 0 0 3px ${C.warnBg}` : hot ? `0 0 0 2px ${C.infoBg}` : "none", borderRadius:6, marginBottom:12, position:"relative", zIndex: just ? 31 : "auto"}}>
      {just && just.when && <span key={just.when} style={{position:"absolute", inset:0, borderRadius:6, pointerEvents:"none", animation:"spotHole 3s ease forwards"}} />}
      <div style={{padding:"8px 12px", borderBottom:`1px solid ${C.borderLt}`, display:"flex", justifyContent:"space-between", alignItems:"center", background: just ? C.okBg : you ? C.warnBg : hot ? C.infoBg : "transparent", flexWrap:"wrap", gap:6}}>
        <span style={{fontSize:13, fontWeight:700}}>{hot ? "▶ " : ""}{title}</span>
        <span style={{display:"inline-flex", alignItems:"center", gap:6}}>{badge}
        {(just || you) && <Why key={just ? String(just.when) : ("you-" + ((you && you.key) || "x"))} author="Guided tour" initial="T" defaultOpen={just ? true : !!(you && you.firstTime)}>
          {just ? <span style={{display:"block"}}>
            <b style={{color:C.ok}}>✓ {just.who}</b> — {just.label}
            {coach && coach.N && <span style={{display:"block", marginTop:4}}>{coach.N.manual ? coach.N.text : <span>Next: <b>{coach.N.who}</b> — {coach.N.text}</span>}</span>}
            {coach && coach.N && coach.N.run && <span style={{display:"block", marginTop:8, textAlign:"right"}}><button onClick={coach.advance} style={{background:C.link, border:"1px solid " + C.link, borderRadius:14, padding:"4px 14px", fontSize:12, fontWeight:700, color:"#fff", cursor:"pointer"}}>Next →</button></span>}
          </span> : <span style={{display:"block"}}><b style={{color:C.warn}}>✋ Your move</b> — {(you && you.text) ? you.text : "Fill this in; the tour resumes after save."}</span>}
        </Why>}
        </span>
      </div>
      <div style={{padding:12}}>{children}</div>
    </div>
  );
}
function Note({children, tone="info"}) {
  const [fg,bg] = TONES[tone];
  return <div style={{background:bg, borderLeft:`3px solid ${fg}`, padding:"6px 10px", fontSize:12, borderRadius:3, margin:"6px 0"}}>{children}</div>;
}
/* Why — a Figma/Miro-style comment pin. Deliberately looks like a review-layer comment floating ON TOP
   of the prototype (teardrop avatar pin + white comment card with author), so it cannot be mistaken for UI. */
function Why({children, author="Spec note", initial="S", defaultOpen=false}) {
  const [open, setOpen] = useState(defaultOpen);
  const [pos, setPos] = useState(null);
  const btnRef = React.useRef(null);
  const pinColor = "#E5397F";
  const W = 280;
  // Popover renders position:fixed at the viewport top layer (z 300) — above the window, dock, and modals —
  // clamped to the screen, so no pin placement ever needs individual checking.
  const place = () => {
    const el = btnRef.current; if (!el) return;
    const r = el.getBoundingClientRect();
    let left = r.right - W; if (left < 8) left = 8; if (left + W > window.innerWidth - 8) left = window.innerWidth - W - 8;
    const below = r.bottom + 8; const flip = below > window.innerHeight - 200;
    setPos({ left, top: flip ? r.top - 8 : below, flip });
  };
  React.useLayoutEffect(() => { if (defaultOpen) place(); }, []);
  React.useEffect(() => {
    if (!open) return;
    let raf = null;
    const h = () => { if (raf) return; raf = requestAnimationFrame(() => { raf = null; place(); }); };
    window.addEventListener("scroll", h, true); window.addEventListener("resize", h);
    return () => { window.removeEventListener("scroll", h, true); window.removeEventListener("resize", h); if (raf) cancelAnimationFrame(raf); };
  }, [open]);
  const toggle = (e) => { e.stopPropagation(); if (!open) place(); setOpen(o => !o); };
  return (
    <span style={{position:"relative", display:"inline-block", marginLeft:8, verticalAlign:"middle"}}>
      <button ref={btnRef} onClick={toggle} title={author + " — comment (not part of the prototype)"}
        style={{width:26, height:26, borderRadius:"50% 50% 50% 4px", border:"2px solid #fff", background:pinColor, color:"#fff",
          fontSize:12, fontWeight:800, cursor:"pointer", lineHeight:"22px", padding:0, boxShadow:"0 2px 8px rgba(0,0,0,.35)",
          transform:"translateY(-4px) rotate(-45deg)"}}>
        <span style={{display:"inline-block", transform:"rotate(45deg)"}}>{initial}</span>
      </button>
      {open && pos && <span onClick={e=>e.stopPropagation()} style={{position:"fixed", zIndex:300, top:pos.top, left:pos.left, width:W,
        transform: pos.flip ? "translateY(-100%)" : "none",
        background:"#fff", borderRadius:12, padding:"12px 14px", boxShadow:"0 8px 28px rgba(0,0,0,.28)", textAlign:"left",
        fontWeight:400, border:"1px solid rgba(0,0,0,.06)", maxHeight:"70vh", overflowY:"auto"}}>
        <span style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
          <span style={{width:22, height:22, borderRadius:"50%", background:pinColor, color:"#fff", fontSize:11, fontWeight:800, display:"inline-flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>{initial}</span>
          <span style={{fontSize:12, fontWeight:700, color:"#111"}}>{author}</span>
          <span style={{fontSize:11, color:"#999"}}>· not part of the prototype</span>
          <button onClick={(e)=>{e.stopPropagation(); setOpen(false);}} style={{marginLeft:"auto", border:"none", background:"none", color:"#999", cursor:"pointer", fontSize:13, lineHeight:1, padding:0}}>✕</button>
        </span>
        <span style={{display:"block", fontSize:12, color:"#333", lineHeight:1.45}}>{children}</span>
      </span>}
    </span>
  );
}

/* Shared across all 3 COLI engines (Order-install, Movement, Mid-life) — H/I/K/L */
function ColiTable({colis, onOpen}) {
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{borderCollapse:"collapse", fontSize:12, width:"100%"}}>
        <thead><tr>{["COLI","Type","Unit","Truck","Work By","Status","Docs",""].map(h=><th key={h} style={{padding:"5px 8px", border:`1px solid ${C.border}`, background:"#EAF0F6", textAlign:"left", whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
        <tbody>{colis.map(c=>(
          <tr key={c.id} onClick={()=>onOpen(c.id)} style={{cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background=C.infoBg} onMouseOut={e=>e.currentTarget.style.background="transparent"}>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, color:C.link, fontWeight:600, whiteSpace:"nowrap"}}>{c.id}</td>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, whiteSpace:"nowrap"}}>{c.type}</td>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, whiteSpace:"nowrap"}}>{c.unit||"—"}</td>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, whiteSpace:"nowrap"}}>{c.truck}{(c.truckStampedAtCreate || c.truckStampedAtComplete) && <div style={{fontSize:10, color:C.sub, lineHeight:1.3}}>@create: <b>{c.truckStampedAtCreate||"—"}</b>{c.truckStampedAtComplete!==undefined && <span> · @complete: <b>{c.truckStampedAtComplete||(c.type.startsWith("De-install")?"— empty confirmed":"— pending")}</b></span>}</div>}</td>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, whiteSpace:"nowrap"}}>{c.by}</td>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, whiteSpace:"nowrap"}}><Chip tone={c.status.includes("Billed")?"ok":c.status.includes("Hold")||c.status.includes("Held")?"warn":c.status.includes("Pending")||c.status==="Requested"?"warn":"info"}>{c.status}</Chip>{c.verified && <span style={{marginLeft:4}}><Chip tone="ok">{c.verified}</Chip></span>}</td>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, fontSize:11, color:C.sub, maxWidth:160}} onClick={e=>e.stopPropagation()}>{docsFor(c.type).length ? docsFor(c.type).map((f,i)=><div key={i} title={f} style={{whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", color:C.link, cursor:"pointer"}}>📄 {f}</div>) : "—"}</td>
            <td style={{padding:"5px 8px", border:`1px solid ${C.border}`, color:C.link, fontSize:11}}>Open →</td>
          </tr>
        ))}</tbody>
      </table>
    </div>
  );
}
function Modal({title, badges, onClose, children}) {
  return (
    <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,.35)", zIndex:50, display:"flex", alignItems:"center", justifyContent:"center", padding:16}} onClick={onClose}>
      <div style={{background:"#fff", borderRadius:8, maxWidth:640, width:"100%", maxHeight:"85vh", overflowY:"auto", boxShadow:"0 8px 30px rgba(0,0,0,.25)"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"14px 18px", borderBottom:`1px solid ${C.borderLt}`, display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
          <div><div style={{fontWeight:700, fontSize:15}}>{title}</div><div style={{marginTop:4, display:"flex", gap:6, flexWrap:"wrap"}}>{badges}</div></div>
          <button onClick={onClose} style={{border:"none", background:"none", fontSize:18, cursor:"pointer", color:C.sub, lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:16}}>{children}</div>
      </div>
    </div>
  );
}
function FieldGrid({rows}) {
  return <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"3px 16px", fontSize:12, color:C.sub, marginBottom:10}}>
    {rows.map(([label,val,extra],i)=><span key={i}>{label}: <b style={{color:C.text}}>{val}</b>{extra}</span>)}
  </div>;
}
function ClosureBanner() {
  return <Note tone="ok">✓ <b>Closure recorded.</b> Operational billing: event date = the date the work happened; CSM confirms billable + month at case close.</Note>;
}


function App({onRestart}) {
  const [role, setRole] = useState("CSM");
  const [tab, setTab]   = useState("cases");
  const [openColi, setOpenColi] = useState(null); // {engine:"order"|"move"|"mid", caseId, coliId} — K
  const [subTab, setSubTab] = useState({}); // {caseId: "Related"|"Details"} — H, defaults to Related
  const [lastAction, setLastAction] = useState(null); // {key, who, label, when} — guided Next: what just ran + where to spotlight
  const [showLegend, setShowLegend] = useState(true); // guide-dock color-code legend, shown by default (collapsible)
  const [walked, setWalked] = useState({}); // guided tour: which step kinds were walked through the modal once (rest fast-forward)
  const [log, setLog]   = useState([]);
  const addLog = (who, msg) => setLog(l=>[{n:l.length+1, who, msg}, ...l]);
  const [fieldHistory, setFieldHistory] = useState([]); // {n, field, oldVal, newVal, who, when, record} — real audit trail, not prose
  const recordHistory = (record, field, oldVal, newVal, who) => setFieldHistory(h=>[{n:h.length+1, record, field, oldVal, newVal, who, when: new Date().toLocaleString()}, ...h]);

  /* new-case picker + forms */
  const [picker, setPicker] = useState(false);
  const [showOrderForm, setShowOrderForm] = useState(false);
  const [installForm, setInstallForm] = useState(null); // {reason, unit, by}
  const [moveForm, setMoveForm] = useState(null);       // {intent, unit, by, dest}
  const [creator, setCreator] = useState(null);
  const [draft, setDraft] = useState({ customer:"AZ Materials — Plant 12", trucks:3, system:"V5 Basic (VAS)", labor:"3rd Party", reqDate:"07/21/26", model:"Lease", contact:"R. Alvarez", phone:"(602) 555-0144", liftgate:true, hours:"6a–2p M–F", priority:"Medium", parts:{"V5 temperate water system":3,"Spark (brain)":3,"Display":3,"Flow meter":1} });
  const approver = creator === "CSM" ? "FSM" : "CSM";

  /* order state */
  const [created, setCreated] = useState(false);
  const [fields, setFields] = useState(null);
  const [changed, setChanged] = useState({});
  const [dualApproved, setDualApproved] = useState(false);
  const [killed, setKilled] = useState(false);
  const [hasIM, setHasIM] = useState(true);
  const [imConfirmed, setImConfirmed] = useState(false);
  const [crew, setCrew] = useState("Precision Install Co. (3rd party)");
  const [contract, setContract] = useState(true);
  const [finOK, setFinOK] = useState(false);       // no-contract gate
  const [finBigOK, setFinBigOK] = useState(false); // >40 trucks gate (recovered from build thread)
  const [rmOK, setRmOK] = useState(false);
  const [ioCreated, setIoCreated] = useState(false);
  const [ioClosed, setIoClosed] = useState(false);
  const [laborDone, setLaborDone] = useState(false);
  const [scClosed, setScClosed] = useState(false); // SC order closure (restored)
  const [estDate, setEstDate] = useState(null);
  const [shipped, setShipped] = useState(false);
  const [hubTask, setHubTask] = useState(false);
  const [hubCreated, setHubCreated] = useState(false);
  const [units, setUnits] = useState([
    { id:"U-2511-A01", truck:"TRK-201", status:"installed", waiting:0, seeded:true },
    { id:"U-2511-A02", truck:"TRK-207", status:"installed", waiting:0, seeded:true },
    { id:"U-2511-A03", truck:"—", status:"available", waiting:0, seeded:true }, // always-available unit, kept off a truck so Re-Install is testable without running a De-install case first
  ]);
  const [colis, setColis] = useState([]);
  const [wolis, setWolis] = useState([]);
  const [sentCC, setSentCC] = useState(false);
  // Billing grain CHANGED per July 15 call (15:23): the billable decision lives ON THE COLI, not the case.
  const [noBillReason, setNoBillReason] = useState("Replacement unit — on us"); // default reason for per-COLI no-bills
  const [installClosed, setInstallClosed] = useState(false);
  const [ret, setRet] = useState({ parts:true, unit:"", stage:0 });
  const retShippedBack = ret.stage>=3, retReceived = ret.stage>=5;
  const [midCases, setMidCases] = useState([]);   // Verifi Install: upgrade / brownfield
  const [moveCases, setMoveCases] = useState([]); // Verifi Service: {id,reason,unit,by,account,status,colis:[{...}],schedule}
  const coliBillResolved = (c) => c.billable === "yes" || c.billable === "no-ok";
  const locked = colis.length > 0 && colis.every(coliBillResolved); // case locks when EVERY COLI's billing is resolved
  const anyNoBillPending = colis.some(c => ["no-pending","no-pending-fin","no-rejected"].includes(c.billable));
  const [ccEnabled, setCcEnabled] = useState(true); // Command Center — first-class step, toggleable off once the system is trusted. — Spec §4.6, Q26
  const [installSchedule, setInstallSchedule] = useState(null); // schedule-lite, extended to Order-install physical COLIs

  // Cross-engine duplicate guard: at most one OPEN case may hold a unit, across Order-install / Mid-life / Movement.
  // "Open" = case/engine not yet closed — NOT the same as "unbilled". A de-install COLI + its own pending re-install
  // living on ONE case is the intended hold pattern, never a conflict (Franco, 7/04). This only flags a SECOND,
  // separate case reaching for a unit that already has one.
  const unitOpenElsewhere = (unit, excludeCaseId) => {
    if (!locked && colis.some(c => c.unit === unit)) return { engine: "Order-install", id: "CASE-0101" };
    const mid = midCases.find(m => m.id !== excludeCaseId && m.status !== "Closed" && m.colis.some(c => c.unit === unit));
    if (mid) return { engine: "Mid-life", id: mid.id };
    const mv = moveCases.find(m => m.id !== excludeCaseId && m.status !== "Closed" && m.status !== "Rejected" && m.colis.some(c => c.unit === unit));
    if (mv) return { engine: "Movement", id: mv.id };
    return null;
  };
  // WOLI-blocks-lock: minimal implementation (real WOLI workflow still 📌 parked with field teams). `wolis` already
  // tracks unit IDs with an open fix; this just gives it teeth against every billing/lock action, cross-engine.
  const unitHasOpenWoli = (unit) => wolis.includes(unit);
  const woliResolve = (unit) => { setWolis(w => w.filter(u => u !== unit)); addLog("FSM", `${unit}: WOLI fix confirmed complete — cleared. Billing/lock can proceed. — minimal impl, pending field-teams' real WOLI workflow 📌`); };

  const pendingFields = Object.keys(changed);
  const approvalDone  = dualApproved && pendingFields.length === 0 && !killed;
  const gateNeeded    = created && (!contract || fields.trucks > 20);
  const gateDone      = !gateNeeded || ((contract ? true : (finOK && rmOK)) && ((created && fields.trucks > 20) ? rmOK : true) && ((created && fields.trucks > 40) ? finBigOK : true));
  const atSC          = approvalDone && imConfirmed && gateDone && !killed;
  const allValidated  = colis.length > 0 && colis.every(c => c.status.startsWith("Validated"));

  /* ── New Case picker routing ── */
  const openPicker = () => { setPicker(true); setTab("cases"); };
  const pickType = (t) => {
    setPicker(false);
    if (!["CSM","FSM"].includes(role)) { setRole("CSM"); addLog("System","Switched role to CSM — CSM/FSM create cases."); }
    if (t==="order") { setShowOrderForm(true); }
    if (t==="install") { setInstallForm({ reason:"New Install (brownfield)", account:"AZ Materials — Plant 12", system:"V5 Basic (VAS)", by:"Verifi", truck:"TRK-701" }); addLog("System","Verifi Install entrance: existing systems already on hand. Upgrades route through New Unit Ordering instead (System Type: Module only). — build-thread"); }
    if (t==="move") { setMoveErr(""); setMoveForm({ reason:"Re-Install", units:[], by:"Verifi", dest:"Globex Concrete (Acct B)", account:"AZ Materials — Plant 12", system:"V5", truckAlsoChanges:false }); }
  };

  const submitOrder = () => {
    const who = ["CSM","FSM"].includes(role) ? role : "CSM";
    const t = TERRITORY[draft.customer];
    setFields({...draft, csm:"Dana R. (CSM)", fsm:t.fsm, fst:t.fst, loc:t.loc}); setCreated(true); setShowOrderForm(false); setCreator(who);
    addLog(who, `ORD-1042 created via dynamic form — the form IS the case (1:1 replacement of MIN-00006 incl. the parts sheet). Account/location selected → auto-pulled ${t.fsm} + ${t.fst}. Creator (${who}) approval recorded; ${who==="CSM"?"FSM":"CSM"} approves next. Requested on-site: ${draft.reqDate}. — Spec §2.2–2.3`);
  };

  /* ── Phase 0 ── */
  const flagField = (f, who) => {
    if (shipped) { addLog(who, `Updated "${f}" post-ship → notify-only; propagated everywhere it's referenced. — Spec §4.2`); return; }
    setChanged(c => ({...c, [f]:{CSM:false, FSM:false}}));
    addLog(who, `Edited "${f}" → highlighted; re-approval by BOTH CSM & FSM required. History recorded. — Spec §2.4`);
  };
  const editTrucks = () => { const cyc={3:24,24:45,45:3}; const old=fields.trucks; const v=cyc[fields.trucks]||3; setFields(f=>({...f, trucks:v})); recordHistory("ORD-1042","Truck count",old,v,role); flagField("Truck count", role); if(v>20) addLog("System", v>40 ? "Truck count > 40 → Finance approval ALSO required (>20 → RM). — build-thread rule" : "Truck count > 20 → RM approval required. — Spec §2.6"); };
  const editLabor  = () => { const o=["Verifi","Customer","3rd Party"]; const old=fields.labor; const v=o[(o.indexOf(fields.labor)+1)%3]; setFields(f=>({...f, labor:v})); recordHistory("ORD-1042","Install labor",old,v,role); flagField("Install labor", role); };
  const reapprove  = (f, r) => setChanged(c => { const e={...c[f],[r]:true}; const n={...c}; if(e.CSM&&e.FSM){delete n[f]; addLog("System",`"${f}" re-approved by both — cleared.`);} else n[f]=e; return n; });
  const reapproveAll = (as) => pendingFields.forEach(f => reapprove(f, as || role)); // as = role guided Next is acting as (setRole is async, closures see stale role)
  const approveOrder = () => { setDualApproved(true); addLog(approver,"Reviewed whole order line-by-line and approved (dual approval complete). — Spec §2.3"); };
  const killOrder  = () => { setKilled(true); addLog(role,"Order KILLED — terminable by design. — Spec §2.7"); };
  const imConfirm  = () => { setImConfirmed(true); addLog(hasIM?"Installation Specialist":"Supply Chain", (hasIM?"Installation Specialist":"Supply Chain (fallback — FSM+CSM+SC notified)") + ` confirmed labor (${fields.labor}) and crew: ${crew}. → Released to Supply Chain. — Spec §2.5`); };
  const imOwnEdit  = () => { setCrew("Ramos Field Services (3rd party)"); addLog("Installation Specialist","Updated own field (crew/schedule) → notify-only. — Spec §2.5"); };
  const imWeek     = () => addLog("System","1 idle week → weekly escalation reminder to Installation Specialist. 📌 cadence w/ SC. — Spec §2.5");

  /* ── Phase 1 ── */
  const createIO   = () => { setIoCreated(true); addLog("Finance","IO/PO/GL/CC created at Supply Chain. Blocks order close, not shipping. — Spec §2.8"); };
  const setEst     = () => { setEstDate("07/14/26"); addLog("Supply Chain","Estimated ship date set: 07/14/26 (requested " + fields.reqDate + "). — Spec §3.1"); };
  const markShipped = () => {
    setShipped(true); setHubTask(true);
    setUnits(us=>[...us, ...[1,2,3].map(i => ({ id:"U-2607-00"+i, truck:"—", status:"shipped", waiting:0 }))]);
    addLog("Supply Chain","Mark Shipped → 3 unit IDs BORN in Salesforce. Docs uploaded; split 2 destinations. — Spec §3.2");
    addLog("System","Excess Return Order RO-311 auto-created (over-ship policy). Field-team FYI: incoming installs, NO TRUCKS ASSIGNED YET — trucks confirmed as they arrive, inside the install flow. — build-thread rule");
    addLog("System","TASK → Supply Chain: create units in Hub. LOUD — resolve BEFORE units arrive. — Spec §3.3");
  };
  const createHub  = () => {
    setHubCreated(true); setHubTask(false);
    setColis([1,2,3].map(i => ({ unit:"U-2607-00"+i, status:"Not Started", checks:0, serviceReady:null, shipBack:false, open:false, truck:"TRK-90"+i, tcg:"TCG-4"+i, mixer:MIXERS[i%3], wds:"WDS-77"+i, prop:i%2?"Pump":"Pressure" })));
    addLog("Supply Chain","Units created in Hub → Hub owns sync from now on.");
    addLog("System","Hub-synced units detected → install case CASE-0101 auto-created: one case, one install-WOLI (COLI) per unit. — Spec §3.4");
  };
  const processLabor = () => { setLaborDone(true); addLog("Supply Chain","Labor processed (" + fields.labor + " labor — never customer labor). — Spec §3.5"); };
  const scheduleInstall = (as) => { setInstallSchedule({loc:fields.loc, date:"07/18/26", team:fields.fst+" team"}); addLog(as || role, `CASE-0101: schedule-lite confirmed — ${fields.loc}, opens 07/18/26, team ${fields.fst} team (confirmed, not auto-assigned). CSM CC'd. — Spec v1.5, extended to all physical COLIs`); };
  const closeSC = () => { setScClosed(true); addLog("Supply Chain","SC order CLOSED on the tracker — shipment processed + labor + IO closure all green. — Spec §3.6 (restored)"); };

  /* ── Phase 2: COLIs ── */
  const crewLabel = created ? (fields.labor === "Verifi" ? "FST (Verifi)" : fields.labor === "Customer" ? "Customer crew" : "3rd-party crew") : "";
  const stampTruck = (uid, truck) => setUnits(us => us.map(u => u.id===uid ? {...u, status:"installed", truck} : u));
  const patchColi = (i, patch) => setColis(cs => cs.map((c,j)=> j===i ? {...c, ...patch} : c));
  const coliReady = (c) => c.checks===CHECKLIST.length && c.serviceReady==="Yes" && c.shipBack;
  const submitColi = (i) => {
    const c = colis[i];
    if (c.serviceReady === "No") { patchColi(i, {status:"On Hold — not service ready"}); addLog("Crew", `${c.unit}: Service Ready = NO → On Hold; Product Request (rush parts) raised. — Spec v1.1`); return; }
    if (fields.labor === "Verifi") { patchColi(i, {status:"Validated (auto)", open:false}); stampTruck(c.unit, c.truck); addLog("Crew", `${c.unit}: checklist complete by FST → Validated automatically (Verifi exempt). Truck ${c.truck} confirmed on arrival + STAMPED. — Spec §4.3`); return; }
    patchColi(i, {status:"Pending FSM", open:false});
    addLog("Crew", `${c.unit}: checklist + fields complete by ${crewLabel} → Pending FSM. — Spec §4.3`);
  };
  const validateColi = (i) => { const c=colis[i]; patchColi(i, {status:"Validated"}); stampTruck(c.unit, c.truck); addLog("FSM", `${c.unit}: validated (check & fix). Truck ${c.truck} STAMPED — Unit ID + TCG + Truck on the WOLI so the record survives even if the unit later disappears. — Spec §4.4, build-thread`); };
  const woliColi = (i) => { const u=colis[i].unit; setWolis(w=>[...w,u]); addLog("FSM", `${u}: issue → WOLI created for the fix. 📌 field teams. — Spec §4.4`); };
  const resumeHold = (i) => { const c=colis[i]; patchColi(i, {status:"Not Started", serviceReady:null}); addLog("Supply Chain", `${c.unit}: rush parts delivered → COLI reopened.`); };
  const sendCC   = () => { setSentCC(true); addLog("FSM", "Sent to COMMAND CENTER (transitional, toggleable). — Spec §4.5–4.6"); };
  const openWoliUnits = () => colis.filter(c => unitHasOpenWoli(c.unit)).map(c=>c.unit);
  const confirmColiBill = (i, as, comments) => { const c = colis[i]; if (!c) return; if (unitHasOpenWoli(c.unit)) { addLog("System", `Blocked — open WOLI on ${c.unit}. Resolve the fix before locking billing on this COLI.`); return; } const autoMonth = "Jul 2026"; /* Month auto-pulled from the case, not entered — July 16 review */ const cmt = (comments||"").trim() || "—"; recordHistory("CASE-0101", c.unit + " · CSM Billable Status", "—", `Billable · ${autoMonth}`, as || role); patchColi(i, { billable:"yes", billMonth:autoMonth, billComments:cmt }); addLog("CSM", `${c.unit}: billable confirmed ON THE COLI (month auto=${autoMonth}, comments: "${cmt}") → this COLI locks forever. — July 15+16 review`); };
  const noBillColi = (i, reason) => { const c = colis[i]; if (!c) return; if (unitHasOpenWoli(c.unit)) { addLog("System", `Blocked — open WOLI on ${c.unit}.`); return; } const r = reason || noBillReason; recordHistory("CASE-0101", c.unit + " · CSM Billable Status", "—", `No-bill: ${r}`, role); patchColi(i, { billable:"no-pending", noBillReason:r }); addLog("CSM", `${c.unit}: NO-BILL requested ("${r}") — needs RM approval (Finance too if the no-billed set exceeds 5 units). — Spec v1.3`); };
  const noBillSet = (pred) => colis.map((c,j)=>({c,j})).filter(x=>pred(x.c));
  const rmNoBill = () => { const pend = noBillSet(c=>c.billable==="no-pending"); if (!pend.length) return; if (pend.length>5) { pend.forEach(({j})=>patchColi(j,{billable:"no-pending-fin"})); addLog("Regional Manager", `No-bill approved by RM for ${pend.length} COLIs → >5 units, escalates to Finance for second approval. — Spec v1.3`); } else { pend.forEach(({c,j})=>{ recordHistory("CASE-0101", c.unit+" · CSM Billable Status", "No-bill: "+(c.noBillReason||noBillReason), "Non-billable (RM approved)", "Regional Manager"); patchColi(j,{billable:"no-ok"}); }); addLog("Regional Manager", `No-bill APPROVED by RM → ${pend.map(x=>x.c.unit).join(", ")} lock as NON-BILLABLE. — Spec v1.3`); } };
  const finNoBill = () => { const pend = noBillSet(c=>c.billable==="no-pending-fin"); if (!pend.length) return; pend.forEach(({c,j})=>{ recordHistory("CASE-0101", c.unit+" · CSM Billable Status", "No-bill: "+(c.noBillReason||noBillReason), "Non-billable (Finance approved)", "Finance"); patchColi(j,{billable:"no-ok"}); }); addLog("Finance", `No-bill APPROVED by Finance (>5 units) → ${pend.map(x=>x.c.unit).join(", ")} lock as NON-BILLABLE. — Spec v1.3`); };
  const rmRejectNoBill  = () => { noBillSet(c=>c.billable==="no-pending").forEach(({j})=>patchColi(j,{billable:"no-rejected"})); addLog("Regional Manager", `No-bill REJECTED by RM → bounced back to CSM (per-COLI).`); };
  const finRejectNoBill = () => { noBillSet(c=>c.billable==="no-pending-fin").forEach(({j})=>patchColi(j,{billable:null})); addLog("Finance","No-bill REJECTED by Finance (final) → those COLIs revert and must proceed as billable."); };
  const csmReviseNoBill = (reason) => { setNoBillReason(reason); noBillSet(c=>c.billable==="no-rejected").forEach(({j})=>patchColi(j,{billable:"no-pending", noBillReason:reason})); addLog("CSM", `No-bill reason revised to "${reason}" → resubmitted to RM.`); };
  const csmEscalateFinance = () => { noBillSet(c=>c.billable==="no-rejected").forEach(({j})=>patchColi(j,{billable:"no-pending-fin"})); addLog("CSM","No-bill escalated straight to Finance after RM rejection."); };
  const pushSAP  = () => { setInstallClosed(true); addLog("Command Center","Pushed to SAP → INSTALL case closed" + (colis.every(c=>c.billable==="no-ok") ? " as NON-BILLABLE (approved)" : "") + ". ORDER case continues. — Spec §4.5, §4.7"); };

  /* ── Phase 4: returns ── */
  const advanceReturn = () => {
    const s = ret.stage + 1;
    setRet(r=>({...r, stage:s}));
    const what = [ret.parts && "excess parts", ret.unit && ("UNIT " + ret.unit)].filter(Boolean).join(" + ");
    if (s===1) addLog("FSM", `RO-311: requested + BOL uploaded — ${what}${ret.unit ? " (unit picker — the field SF is missing today)" : ""}. — Spec §6.1`);
    if (s===2) addLog("FSM", "RO-311: 3rd-party logistics picked up on site.");
    if (s===3) addLog("Supply Chain", "RO-311: shipped — SC owns the return from here. — Spec §6.2");
    if (s===4) addLog("Supply Chain", "RO-311: received at Verifi.");
    if (s===5) {
      if (ret.unit) { setUnits(us=>us.map(u=>u.id===ret.unit ? {...u, status:"retired", truck:"—"} : u)); addLog("Supply Chain", `RO-311 PROCESSED: arrival confirmed — ${what}. Unit ${ret.unit} identified → removed from Hub (UNIT DEATH; stamped WOLI survives)${ret.parts?"; parts restocked, no Hub action for them":""}. — Spec §6.3`); }
      else addLog("Supply Chain", "RO-311 PROCESSED — parts only, restocked, no Hub removal. — Spec §6.3");
    }
  };
  const closeIO = () => { setIoClosed(true); addLog("Finance","IO closed on the order case."); };

  /* ── Verifi Install mid-life (Upgrade / brownfield) ── */
  const submitInstallCase = () => {
    const m = installForm;
    const dupTruck = units.find(u => u.truck === m.truck && u.status === "installed");
    if (dupTruck) { addLog("System", `Blocked — ${dupTruck.id} is already registered on truck ${m.truck}. Check for an existing unit record before registering a new one (brownfield dedupe). — build-thread`); return; }
    const id = "CASE-02" + (10 + midCases.length);
    const newUnitId = "U-BF"+(1000+midCases.length);
    setUnits(us=>[...us, { id:newUnitId, truck:m.truck, status:"installed", waiting:0 }]);
    const t = TERRITORY[m.account];
    const coli = { id:"COLI-"+id.slice(-4), unit:newUnitId, type:"Install", status:"Ready to Dispatch", by:m.by, truck:m.truck, truckStampedAtCreate:m.truck, checks:0,
      tcg:"TCG-BF"+id.slice(-2), wds:"WDS-BF"+id.slice(-2), mixer:MIXERS[id.length%3], system:m.system, ready:null, fst:t.fst, install:"—", complete:"—", billStatus:"—", billable:"pending work", manualTcg:m.by!=="Verifi", partsConsumed:"" };
    setMidCases(mc=>[...mc, {id, reason:m.reason, unit:newUnitId, by:m.by, account:m.account, status:"In Progress", colis:[coli], schedule:null}]);
    setInstallForm(null);
    addLog(role, `${id} created — Verifi Install: ${m.reason} on new unit ${newUnitId} (equipment already on hand, registered now), truck ${m.truck}, by ${m.by}, Assigned FST auto-pulled (${t.fst}). Same COLI engine as everywhere else — checklist, validation gate, billing lock. — Spec §5.1`);
  };
  const midWoli = (mid, cid) => { const m=midCases.find(x=>x.id===mid); const c=m.colis.find(x=>x.id===cid); setWolis(w=>[...w,c.unit]); addLog("FSM", `${c.unit}: issue found → WOLI created for the fix. 📌 field teams.`); };
  const midSchedule = (id, loc, date, team) => { setMidCases(mc=>mc.map(m=>m.id===id?{...m, schedule:{loc,date,team}}:m)); addLog(role, `${id}: schedule-lite confirmed — ${loc}, opens ${date}, team ${team} (confirmed, not auto-assigned). CSM CC'd. Lands on the Planning Gantt. — Spec v1.5`); };
  const midComplete = (mid, cid, parts) => setMidCases(mc=>mc.map(m=>{ if(m.id!==mid) return m;
    const c = m.colis.find(x=>x.id===cid);
    if (c.ready==="No") { addLog("Crew", `${cid}: System Ready = No, "${c.notReadyReason||"see comment"}" → HOLD. Not billable; FSM reminder; optional rush parts.`); return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"On Hold — Not Ready"}:x)}; }
    if (c.by!=="Verifi") { addLog("Crew", `${cid}: checklist complete by ${c.by} (TCG entered manually — no Hub access) → "Submitted – Pending FSM Validation".`); return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Submitted – Pending FSM", partsConsumed:parts||x.partsConsumed}:x)}; }
    addLog("Crew", `${cid}: 13-item checklist + Verifi-only commissioning signed off → Work Complete. Truck ${c.truck} stamped at creation, confirmed at completion.${parts?` Parts consumed: ${parts}.`:""}`);
    return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Work Complete", complete:"07/16/26", truckStampedAtComplete:c.truck, verified:"✓ verified by data flow", partsConsumed:parts||x.partsConsumed}:x)};
  }));
  const midValidate = (mid, cid) => setMidCases(mc=>mc.map(m=>{ if(m.id!==mid) return m;
    addLog("FSM", `${cid}: FSM validated 3rd-party/customer install → real/billable.`);
    return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Work Complete", complete:"07/16/26", truckStampedAtComplete:x.truck, verified:"✓ verified by data flow"}:x)};
  }));
  const midResumeHold = (mid, cid) => setMidCases(mc=>mc.map(m=>{ if(m.id!==mid) return m; addLog("Supply Chain", `${cid}: rush parts delivered → COLI reopened.`); return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Ready to Dispatch", ready:null, checks:x.checks}:x)}; }));
  const midBillConfirm = (mid, cid, month) => setMidCases(mc=>mc.map(m=>{ if(m.id!==mid) return m;
    const c = m.colis.find(x=>x.id===cid);
    if (unitHasOpenWoli(c.unit)) { addLog("System", `${cid}: BLOCKED — open WOLI on ${c.unit}. Resolve the fix before locking billing.`); return m; }
    recordHistory(cid,"CSM Billable Status","—","Billable: Yes · "+month,"CSM");
    addLog("CSM", `${cid}: confirmed billable, month ${month}. LOCKED.`);
    const cols = m.colis.map(x=>x.id===cid?{...x,status:"Billed 🔒", billStatus:"Billed", billable:"Billable: Yes · "+month}:x);
    const allDone = cols.every(x=>x.status.includes("Billed"));
    return {...m, colis:cols, status: allDone ? (ccEnabled ? "Ready for Command Center" : "Closed") : m.status};
  }));
  const midSendToCC = (id) => setMidCases(mc=>mc.map(m=>m.id===id?{...m, status:"Closed"}:m)) || addLog("Command Center", `${id}: all COLIs billed → pushed to SAP, case CLOSED. — Spec §4.5–4.6`);

  /* ── Unit Movement / Verifi Service (v18: multi-unit, combined reason, dual stamp) ── */
  const [moveErr, setMoveErr] = useState("");
  const isPhysical = (reason) => reason.startsWith("Re-Install") || reason.startsWith("Deinstall") || reason.startsWith("De-install &");
  const needsReinstall = (reason) => reason.startsWith("Re-Install") || reason.startsWith("De-install &");
  const isReturn = (reason) => reason.includes("Return Unit to Verifi");
  const isNonPhysical = (reason) => reason.startsWith("Transfer");
  const isAcctChange = (reason) => reason.includes("Another Account");
  const validForReason = (reason, status) => {
    if (reason.startsWith("Re-Install")) return status==="available"; // must already be off a truck
    if (reason.startsWith("De-install &")) return status==="installed"; // moving to a new truck — must be currently mounted
    if (reason.startsWith("Deinstall")) return status==="installed"; // can't de-install what isn't installed
    if (reason.startsWith("Transfer to Another Truck")) return status==="installed"; // name/truck-mapping change on a mounted unit
    if (reason.startsWith("Transfer to Another Account")) return status==="installed"; // moving an active install to a new account
    return true;
  };
  const submitMove = () => {
    const m = moveForm;
    const wrongStatus = m.units.filter(u => !validForReason(m.reason, (units.find(x=>x.id===u)||{}).status));
    if (wrongStatus.length) { setMoveErr(`"${m.reason}" doesn't apply to: ${wrongStatus.join(", ")} (wrong status). This is enforced here too, not just in the picker.`); addLog("System", `Blocked at submit — reason/status mismatch on ${wrongStatus.join(", ")}.`); return; }
    const blocked = m.units.map(u => ({ u, conflict: unitOpenElsewhere(u) })).filter(x => x.conflict);
    if (blocked.length) {
      setMoveErr(`Blocked: ${blocked.map(b=>`${b.u} (open on ${b.conflict.engine} ${b.conflict.id})`).join("; ")}. Close/resolve it first, or deselect.`);
      addLog("System", `${blocked.map(b=>b.u).join(", ")}: DUPLICATE GUARD (cross-engine — Order-install/Mid-life/Movement) — blocked. — build-thread`);
      return;
    }
    if (!m.units.length) { setMoveErr("Pick at least one unit."); return; }
    setMoveErr("");
    const id = "000030" + (10 + moveCases.length);
    const isRet = isReturn(m.reason), phys = isPhysical(m.reason), nonPhys = isNonPhysical(m.reason), acctChg = isAcctChange(m.reason);
    const t = TERRITORY[m.account];
    const cols = [];
    m.units.forEach((uid, i) => {
      const truckNow = (units.find(u=>u.id===uid)||{}).truck||"—";
      if (nonPhys) {
        cols.push({ id:"COLI-"+id.slice(-4)+String.fromCharCode(65+i), unit:uid, type:"Billing-only", status: acctChg?"Requested":"Command Center Action", by:m.by, truck:truckNow,
          tcg:"", wds:"", mixer:"", system:"", ready:"—", fst:t.fst, install:"—", complete:"—", billStatus:"—", billable:"pending CSM confirm", truckAlsoChanges:m.truckAlsoChanges });
      }
      if (phys) {
        const needsFin = isRet;
        const wantsDeinstall = m.reason.startsWith("Deinstall") || m.reason.startsWith("De-install &");
        const standaloneReinstall = m.reason.startsWith("Re-Install"); // pure re-install — the unit is ALREADY off a truck (validForReason requires "available"); no de-install happens in this case, so it's basically an install job, not a hold.
        if (wantsDeinstall) {
          cols.push({ id:"COLI-"+id.slice(-4)+String.fromCharCode(65+i*2), unit:uid, type: isRet?"De-install (Return)":"De-install", status: needsFin?"Held — Pending Finance":"Ready to Dispatch", by:m.by, truck:truckNow, truckStampedAtCreate:truckNow, checks:0,
            tcg:"TCG-5"+id.slice(-2)+i, wds:"WDS-8"+id.slice(-2)+i, mixer:MIXERS[(id.length+i)%3], system:m.system, ready:null, fst:t.fst, install:"—", complete:"—", billStatus:"—", billable:"pending work", manualTcg:m.by!=="Verifi", partsConsumed:"" });
        }
        if (needsReinstall(m.reason)) cols.push({ id:"COLI-"+id.slice(-4)+String.fromCharCode(65+i*2+1), unit:uid, type:"Re-Install", status: standaloneReinstall ? "Ready to Dispatch" : "On Hold — Awaiting Truck", by:m.by, truck: standaloneReinstall ? truckNow : "—", truckStampedAtCreate: standaloneReinstall ? truckNow : "— (pending)", checks:0,
          tcg:"", wds:"", mixer:MIXERS[(id.length+i)%3], system:m.system, ready:null, fst:t.fst, install:"—", complete:"—", billStatus:"—", billable:"pending work", manualTcg:m.by!=="Verifi", partsConsumed:"" });
      }
    });
    setMoveCases(mc=>[...mc, {id, reason:m.reason, units:m.units, by:m.by, account:m.account, dest:acctChg?m.dest:null, status: isRet?"Pending Finance":"In Progress", colis:cols, schedule:null}]);
    setMoveForm(null);
    if (nonPhys) addLog(role, `${id} created — ${m.reason} on ${m.units.length} unit(s): ${m.units.join(", ")}. ${acctChg ? "Physical-adjacent: unit switch (+ truck switch if needed) must be requested before Command Center processes it, then the team confirms." : "Billing-only COLI, straight to Command Center Action."} ${acctChg?`Destination account: ${m.dest}. `:""}— build-thread`);
    else addLog(role, `${id} created — Install Reason: ${m.reason}, ${m.units.length} unit(s): ${m.units.join(", ")}, by ${m.by}, Assigned FST auto-pulled (${t.fst}). ${m.reason.startsWith("Re-Install") ? "Standalone Re-Install — unit already off a truck, no de-install in this case; Re-Install COLI goes straight to Ready to Dispatch (basically an install)." : "Truck STAMPED at creation on each De-install COLI."} ${m.by!=="Verifi" ? "3rd-party/Customer: no Hub visibility → TCG entered manually; close = Submitted, pending FSM validation." : ""} ${isRet?"Held: Finance approval BEFORE dispatch — First Commissioned surfaced for depreciation; approval triggers the Return Order + parts manifest.":""} — build-thread`);
  };
  const patchMove = (id, fn) => setMoveCases(mc=>mc.map(m=>m.id===id?fn(m):m));
  const patchColiM = (mid, cid, patch) => patchMove(mid, m => ({...m, colis: m.colis.map(c=>c.id===cid?{...c,...patch}:c)}));
  const rollup = (m, cols) => { const allDone = cols.every(x=>x.status.includes("Billed")||x.status==="Cancelled"||x.status.includes("Confirmed")); if (allDone) addLog("System", `${m.id}: all COLIs closed → case rolls up to CLOSED.`); return allDone; };
  const moveFinance = (id, ok) => patchMove(id, m => {
    if(!ok){ addLog("Finance", `${id}: REJECTED — case returns to CSM/FSM for edit or resubmission.`); return {...m, status:"Rejected"}; }
    addLog("Finance", `${id}: depreciation approved (First Commissioned reviewed) → Return Order + parts manifest triggered; de-install released to dispatch. — build-thread`);
    return {...m, status:"In Progress", colis:m.colis.map(c=>c.type.startsWith("De-install")?{...c,status:"Ready to Dispatch"}:c)};
  });
  const moveResubmit = (id) => patchMove(id, m => { addLog(role, `${id}: resubmitted to Finance after edit/review.`); return {...m, status:"Pending Finance"}; });
  const moveWithdraw = (id) => patchMove(id, m => { addLog(role, `${id}: withdrawn — case closed without proceeding.`); return {...m, status:"Closed"}; });
  const moveSchedule = (id, loc, date, team) => { patchMove(id, m=>({...m, schedule:{loc,date,team}})); addLog(role, `${id}: schedule-lite confirmed — ${loc}, opens ${date}, team ${team} (confirmed, not auto-assigned). CSM CC'd. Lands on the Planning Gantt at the bottom — never a Service Appointment, never counted against FST dispatch KPIs. — build-thread`); };
  const coliListFor = (c) => c.type.startsWith("De-install") ? DEINSTALL_CHECKLIST : CHECKLIST;
  const moveColiReady = (c) => c.checks === coliListFor(c).length && c.ready==="Yes";
  const nonVerifi = (c) => c.by!=="Verifi";
  const moveComplete = (mid, cid, coliParts) => patchMove(mid, m => {
    const c = m.colis.find(x=>x.id===cid);
    if (c.ready==="No") { addLog("Crew", `${cid}: System Ready = No, "${c.notReadyReason||"see comment"}" → HOLD. Not billable; FSM reminder; optional rush parts.`); return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"On Hold — Not Ready"}:x)}; }
    if (nonVerifi(c)) {
      addLog("Crew", `${cid}: checklist complete by ${c.by} (TCG entered manually — no Hub access) → "Submitted – Pending FSM Validation" — stage-gate before it's real/billable.`);
      return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Submitted – Pending FSM", partsConsumed:coliParts||x.partsConsumed}:x)};
    }
    const finalTruck = c.type==="Re-Install" ? "TRK-9"+id_suffix(mid) : "—";
    if (c.type.startsWith("De-install")) setUnits(us=>us.map(u=>u.id===c.unit?{...u, status: isReturn(m.reason)?"in transit (return)":"available", truck:"—", waiting:0}:u));
    if (c.type==="Re-Install") setUnits(us=>us.map(u=>u.id===c.unit?{...u, status:"installed", truck:finalTruck, waiting:0}:u));
    addLog("Crew", `${cid}: checklist signed off (proof of work${c.type.startsWith("De-install")?" — de-install-specific: power-down, unit removed, components bagged & labeled, wiring capped, PHOTOS TAKEN":", incl. Verifi-only tilt/settings/config/firmware/software"}) → Work Complete. Truck field STAMPED AT COMPLETION (${c.type==="Re-Install"?finalTruck:"— removed"}) — was already stamped at creation (${c.truckStampedAtCreate}); both stamps compared to unit's live truck → data-flow "✓ verified" indicator.${coliParts?` Parts consumed: ${coliParts}.`:""}`);
    return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Work Complete", complete:"07/16/26", truck:finalTruck, truckStampedAtComplete: c.type==="Re-Install"?finalTruck:"— (removed)", verified:"✓ verified by data flow", partsConsumed:coliParts||x.partsConsumed}:x)};
  });
  function id_suffix(mid){ return mid.slice(-4); }
  const moveValidate = (mid, cid) => patchMove(mid, m => {
    const c = m.colis.find(x=>x.id===cid);
    const finalTruck = c.type==="Re-Install" ? "TRK-9"+id_suffix(mid) : "—";
    if (c.type.startsWith("De-install")) setUnits(us=>us.map(u=>u.id===c.unit?{...u, status: isReturn(m.reason)?"in transit (return)":"available", truck:"—", waiting:0}:u));
    if (c.type==="Re-Install") setUnits(us=>us.map(u=>u.id===c.unit?{...u, status:"installed", truck:finalTruck, waiting:0}:u));
    addLog("FSM", `${cid}: FSM VALIDATED (3rd-party/customer stage-gate) → now real/billable. Truck field stamp compared to unit's live truck — "✓ verified by data flow".`);
    return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Work Complete", complete:"07/16/26", truck:finalTruck, truckStampedAtComplete: c.type==="Re-Install"?finalTruck:"— (removed)", verified:"✓ verified by data flow"}:x)};
  });
  const moveWoli = (mid, cid) => { const m=moveCases.find(x=>x.id===mid); const c=m.colis.find(x=>x.id===cid); setWolis(w=>[...w,c.unit]); addLog("FSM", `${c.unit}: issue found → WOLI created for the fix. 📌 field teams.`); };
  const moveBillConfirm = (mid, cid, month) => patchMove(mid, m => {
    const c = m.colis.find(x=>x.id===cid);
    if (unitHasOpenWoli(c.unit)) { addLog("System", `${cid}: BLOCKED — open WOLI on ${c.unit}. Resolve the fix before locking billing.`); return m; }
    recordHistory(cid,"CSM Billable Status","—","Billable: Yes · "+month,"CSM");
    addLog("CSM", `${cid}: confirmed billable, month ${month} (unit's actual commission/decommission date from data flow). Per-COLI billing fires on its own clock — nothing waits for a slow truck or for the case's IO/GL (separate Finance process). LOCKED.`);
    const cols = m.colis.map(x=>x.id===cid?{...x,status:"Billed 🔒", billStatus:"Billed", billable:"Billable: Yes · "+month}:x);
    if (isReturn(m.reason) && c.type.startsWith("De-install")) { addLog("Supply Chain", `${cid}: awaiting SC receipt of returned unit ${c.unit} before Hub removal.`); return {...m, colis:cols, status:"Awaiting SC receipt"}; }
    return {...m, colis:cols, status: rollup(m,cols) ? (ccEnabled ? "Ready for Command Center" : "Closed") : m.status};
  });
  const moveSendToCC = (id) => patchMove(id, m => { addLog("Command Center", `${m.id}: all COLIs billed/cancelled → pushed to SAP, case CLOSED. — Spec §4.5–4.6`); return {...m, status:"Closed"}; });
  // Non-physical Account Change sub-workflow: Requested → Unit Switch → (Truck Switch) → Command Center Action → Confirmed
  const moveUnitSwitch = (mid, cid) => patchColiM(mid, cid, {status:"Unit Switch Requested"}) || addLog(role, `${cid}: unit switch requested.`);
  const moveTruckSwitch = (mid, cid) => patchColiM(mid, cid, {status:"Truck Switch Requested"}) || addLog(role, `${cid}: truck switch also requested (destination account uses a different truck).`);
  const moveSendCC = (mid, cid) => patchColiM(mid, cid, {status:"Command Center Action"}) || addLog(role, `${cid}: sent to Command Center to process the account move.`);
  const moveTeamConfirm = (mid, cid) => patchMove(mid, m => { addLog("CSM", `${cid}: Command Center processed the move — team confirmed. Closed.`); const cols=m.colis.map(x=>x.id===cid?{...x,status:"Confirmed — Closed"}:x); return {...m, colis:cols, status: rollup(m,cols)?"Closed":m.status}; });
  const nonPhysConfirmSimple = (mid, cid) => patchMove(mid, m => { addLog("CSM", `${cid}: non-physical name change confirmed via Command Center. Usually no billing.`); const cols=m.colis.map(x=>x.id===cid?{...x,status:"Confirmed — Closed"}:x); return {...m, colis:cols, status: rollup(m,cols)?"Closed":m.status}; });
  const moveReceipt = (mid, cid) => patchMove(mid, m => {
    const c = m.colis.find(x=>x.id===cid);
    setUnits(us=>us.map(u=>u.id===c.unit?{...u, status:"retired", truck:"—"}:u));
    addLog("Supply Chain", `${cid}: parts manifest received + unit confirmed (${c.unit}) → removed in Hub. UNIT DEATH — the stamped COLI survives the disappearing asset. — build-thread`);
    const cols = m.colis.map(x=>x.id===cid?{...x,status:"Received — Closed"}:x);
    return {...m, colis:cols, status: rollup(m,cols) ? "Closed" : m.status};
  });
  const moveReady = (mid, cid) => patchMove(mid, m => { addLog(role==="Crew"?"Customer (portal)":role, `${cid}: truck ready → Reinstall COLI ACTIVATED, auto-assigned to FST. (FSM, CSM, or the customer via portal can trigger this; 13-day gentle aging reminder while waiting — keeps multiple open re-installs from piling up on the same truck.) — Spec §5.5`); return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Activated — Ready to Dispatch"}:x)}; });
  const moveResumeHold = (mid, cid) => patchMove(mid, m => { addLog("Supply Chain", `${cid}: rush parts delivered → COLI reopened.`); return {...m, colis:m.colis.map(x=>x.id===cid?{...x,status:"Ready to Dispatch", ready:null}:x)}; });
  const cancelColi = (mid, cid) => patchMove(mid, m => {
    const c = m.colis.find(x=>x.id===cid);
    if (c.status.includes("Billed")) { addLog("System", `${cid}: CANNOT cancel — billed/locked COLIs are immutable.`); return m; }
    addLog(role, `${cid} CANCELLED (customer dropped the truck) — kept for audit. — build-thread`);
    const cols = m.colis.map(x=>x.id===cid?{...x,status:"Cancelled"}:x);
    return {...m, colis:cols, status: rollup(m,cols) ? "Closed" : m.status};
  });
  const week = (uid) => setUnits(us=>us.map(u=>{ if(u.id!==uid) return u; const w=u.waiting+7; if(w>13) addLog("System", `${uid}: waiting ${w}d → gentle 13-day aging reminder on pending reinstalls. — Spec §5.5`); return {...u, waiting:w}; }));

  /* ── THE THREAD ── */
  const jump = (t, fn) => (...a) => { setTab(t); if (fn) fn(...a); }; // args pass through — guided Next hands the acting role to role-sensitive steps
  const nextOrderStep = () => {
    if (!created) return null; // no order yet — let mid/move cases surface, or fall through to "create" at the very end
    if (killed) return { who:"—", text:"Order killed. ⟲ Restart to run again.", tone:"err", key:"killed" };
    if (pendingFields.length) { const needR = ["CSM","FSM"].filter(r => pendingFields.some(f => !changed[f][r])); return { who:(needR.join(" & ")||"CSM & FSM"), text:`Re-approve highlighted field(s): ${pendingFields.join(", ")}. Both CSM and FSM must sign off — one role per step.`, tone:"warn", roles:(needR.length?needR:["CSM","FSM"]), label:"Re-approve as " + (needR[0]||"CSM"), run: jump("order", reapproveAll), tab:"order", key:"fields" }; }
    if (!dualApproved) return { who:approver, text:`Review the whole order line-by-line and approve (creator was ${creator}).`, tone:"info", roles:[approver], label:"Approve whole order", run: jump("order", approveOrder), tab:"order", key:"approve" };
    if (!imConfirmed) return { who:hasIM?"Installation Specialist":"Supply Chain (fallback)", text:"Confirm labor type & crew.", tone:"info", roles:[hasIM?"Installation Specialist":"Supply Chain"], label:"Confirm labor & crew", run: jump("order", imConfirm), tab:"order", key:"im" };
    if (gateNeeded && !gateDone) {
      const needFin = !contract && !finOK, needRM = ((!contract) || fields.trucks>20) && !rmOK, needBig = fields.trucks>40 && !finBigOK;
      const roles = [ (needFin||needBig) && "Finance", needRM && "Regional Manager"].filter(Boolean);
      return { who:roles.join(" + "), text: (needBig ? ">40 trucks → Finance approval. " : "") + (needRM ? ">20 trucks → RM approval. " : "") + (!contract ? "No contract → Finance + RM." : ""), tone:"warn", roles, label:"Approve gate as " + (roles.includes(role)?role:"…"), run: jump("order", (as)=>{ const r = as || role; if(r==="Finance"){ if(needFin){setFinOK(true);addLog("Finance","Approved (no-contract gate).");} if(needBig){setFinBigOK(true);addLog("Finance","Approved (>40 trucks). — build-thread rule");} } if(r==="Regional Manager"&&needRM){setRmOK(true);addLog("Regional Manager","Approved (>20 trucks).");} }), tab:"order", key:"gate" };
    }
    if (!estDate) return { who:"Supply Chain", text:"Set estimated ship date. (Finance: IO in parallel.)", tone:"info", roles:["Supply Chain"], label:"Set estimated ship date", run: jump("order", setEst), tab:"order", key:"est" };
    if (!shipped) return { who:"Supply Chain", text:"Mark Shipped → units born in Salesforce.", tone:"info", roles:["Supply Chain"], label:"Mark Shipped", run: jump("order", markShipped), tab:"order", key:"ship" };
    if (hubTask) return { who:"Supply Chain", text:"LOUD: create units in Hub before arrival.", tone:"err", roles:["Supply Chain"], label:"Create units in Hub", run: jump("order", createHub), tab:"order", key:"hub" };
    if (colis.length && !installSchedule && colis.some(c=>c.status==="Not Started")) return { who:"FSM or CSM", text:"Confirm schedule-lite (team & open-date) before the checklist.", tone:"info", roles:["FSM","CSM"], label:"Confirm team & open-date", run: jump("install", scheduleInstall), tab:"install", key:"sched-order" };
    if (!allValidated) {
      const hi = colis.findIndex(c=>c.status.startsWith("On Hold"));
      if (hi>=0) return { who:"Supply Chain", text:`${colis[hi].unit} On Hold — rush parts (Product Request), then reopen.`, tone:"warn", roles:["Supply Chain"], label:"Rush parts delivered", run: jump("install", ()=>resumeHold(hi)), tab:"install", key:"hold" };
      const pi = colis.findIndex(c=>c.status==="Pending FSM");
      if (pi>=0 && unitHasOpenWoli(colis[pi].unit)) return { who:"FSM", text:`${colis[pi].unit}: open WOLI is blocking further progress — resolve the fix.`, tone:"err", roles:["FSM"], label:"Resolve WOLI — "+colis[pi].unit, run: jump("install", ()=>woliResolve(colis[pi].unit)), tab:"install", key:"woli" };
      if (pi>=0) return { who:"FSM", text:`Validate ${colis[pi].unit} (check & fix).`, tone:"info", roles:["FSM"], label:"Validate " + colis[pi].unit, run: jump("install", ()=>validateColi(pi)), tab:"install", key:"val", unit: colis[pi].unit };
      const ni = colis.findIndex(c=>c.status==="Not Started");
      if (ni>=0) { const c=colis[ni];
        if (c.checks<CHECKLIST.length) return { who:"Crew ("+crewLabel+")", text:`Complete ${c.unit}'s 12-item checklist (Check All to fast-forward).`, tone:"info", roles:["Crew"], label:"Check all — " + c.unit, run: jump("install", ()=>patchColi(ni,{checks:CHECKLIST.length, open:true})), tab:"install", key:"coli", unit: c.unit };
        if (!coliReady(c) && c.serviceReady!=="No") return { who:"Crew ("+crewLabel+")", text:`${c.unit}: mark Service Ready = Yes + Equipment Ship Back (closure requirements).`, tone:"info", roles:["Crew"], label:"Ready + Ship Back", run: jump("install", ()=>patchColi(ni,{serviceReady:"Yes", shipBack:true, open:true})), tab:"install", key:"coli" };
        return { who:"Crew ("+crewLabel+")", text:`Submit ${c.unit}.`, tone:"info", roles:["Crew"], label:"Submit COLI " + c.unit, run: jump("install", ()=>submitColi(ni)), tab:"install", key:"coli" }; }
    }
    if (!locked) { const owi = colis.find(c=>unitHasOpenWoli(c.unit)); if (owi) return { who:"FSM", text:`${owi.unit}: open WOLI is blocking billing/lock — resolve the fix.`, tone:"err", roles:["FSM"], label:"Resolve WOLI — "+owi.unit, run: jump("install", ()=>woliResolve(owi.unit)), tab:"install", key:"woli" }; }
    if (ccEnabled && !sentCC && !locked) return { who:"FSM", text:"All validated → send to Command Center.", tone:"info", roles:["FSM"], label:"Send to Command Center", run: jump("install", sendCC), tab:"install", key:"cc" };
    if (sentCC || !ccEnabled) {
      const bi = colis.findIndex(c => c.status.startsWith("Validated") && !c.billable);
      if (bi >= 0) { const c = colis[bi]; return { who:"CSM", text:`Billing lives on the COLI: confirm ${c.unit} billable + month — locks THAT COLI forever (or No-bill with a reason).`, tone:"purp", roles:["CSM"], label:"Confirm billable — " + c.unit, run: jump("install", (as)=>confirmColiBill(bi, as)), tab:"install", key:"bill", unit:c.unit }; }
      if (colis.some(c=>c.billable==="no-pending")) return { who:"Regional Manager", text:`No-bill pending on ${colis.filter(c=>c.billable==="no-pending").map(c=>c.unit).join(", ")} — RM approves, or rejects (bounces to CSM).`, tone:"warn", roles:["Regional Manager"], label:"Approve no-bill (RM)", run: jump("install", rmNoBill), tab:"install", key:"bill" };
      if (colis.some(c=>c.billable==="no-pending-fin")) return { who:"Finance", text:"No-billed set exceeds 5 units → Finance approval required (or reject → final, those COLIs must bill).", tone:"warn", roles:["Finance"], label:"Approve no-bill (Finance)", run: jump("install", finNoBill), tab:"install", key:"bill" };
      if (colis.some(c=>c.billable==="no-rejected")) return { who:"CSM", text:"RM rejected the no-bill. Revise & resubmit, or escalate straight to Finance.", tone:"err", roles:["CSM"], label:"Escalate to Finance", run: jump("install", csmEscalateFinance), tab:"install", key:"bill" };
    }
    if (!installClosed) return { who:"Command Center", text:"Push to SAP and close the INSTALL case.", tone:"purp", roles:["Command Center"], label:"Push to SAP & close install case", run: jump("install", pushSAP), tab:"install", key:"sap" };
    if (ret.stage < 5) {
      if (ret.stage === 0) {
        if (tab !== "returns") return { who:"FSM", text:"Start the return (RO-311) — open the Returns tab.", tone:"info", roles:["FSM"], label:"Open Returns", run: jump("returns"), tab:"returns", key:"retship", free:true };
        return { who:"You", text:"Pick what's returning — excess parts (default) and/or a unit (choose WHICH unit — the new field) — then hit Request return + upload BOL.", tone:"warn", roles:["FSM"], manual:true, tab:"returns", key:"retship" };
      }
      const rWho = ret.stage < 3 ? "FSM" : "Supply Chain";
      return { who:rWho, text:`RO-311: advance to "${RET_STAGES[ret.stage+1]}"${ret.stage===4?" (Processed = Hub removal if a unit)":""}.`, tone:"info", roles:[rWho], label:"→ " + RET_STAGES[ret.stage+1], run: jump("returns", advanceReturn), tab:"returns", key:"retship" };
    }
    if (!laborDone && fields.labor!=="Customer") return { who:"Supply Chain", text:"Process labor on the SC dashboard.", tone:"info", roles:["Supply Chain"], label:"Process labor", run: jump("sc", processLabor), tab:"sc", key:"labor" };
    if (!ioCreated) return { who:"Finance", text:"IO was never created — order can't close.", tone:"err", roles:["Finance"], label:"Create IO", run: jump("order", createIO), tab:"order", key:"io" };
    if (!ioClosed) return { who:"Finance", text:"IO closure on the order case (SC documentation tail).", tone:"info", roles:["Finance"], label:"Close IO", run: jump("sc", closeIO), tab:"sc", key:"ioclose" };
    if (!scClosed) return { who:"Supply Chain", text:"Everything green — close the SC order on the tracker.", tone:"info", roles:["Supply Chain"], label:"Close SC order", run: jump("sc", closeSC), tab:"sc", key:"scclose" };
    return null; // order fully resolved (parking-lot final-close excluded) — let mid/move cases surface, or fall to the all-caught-up message
  };

  // Mid-life (Verifi Install / brownfield) — same COLI engine, so the thread logic mirrors it 1:1
  const nextMidStep = (m) => {
    if (m.status === "Closed") return null;
    if (m.status === "Ready for Command Center") return { who:"Command Center", text:`${m.id}: all COLIs billed → push to SAP and close the case.`, tone:"purp", roles:["Command Center"], label:"Push to SAP & close case", run: jump("cases", ()=>midSendToCC(m.id)), tab:"cases", key:"mid-cc-"+m.id };
    if (!m.schedule && m.colis.some(c=>c.status==="Ready to Dispatch")) return { who:"FSM or CSM", text:`${m.id}: confirm schedule-lite (team & open-date) before the checklist.`, tone:"info", roles:["FSM","CSM"], label:"Confirm team & open-date", run: jump("cases", ()=>midSchedule(m.id, TERRITORY[m.account].loc, "07/18/26", TERRITORY[m.account].fst+" team")), tab:"cases", key:"mid-sched-"+m.id };
    for (const c of m.colis) {
      if (c.status.includes("Billed")) continue;
      if (unitHasOpenWoli(c.unit) && c.status==="Work Complete") return { who:"FSM", text:`${m.id} · ${c.unit}: open WOLI is blocking billing/lock — resolve the fix.`, tone:"err", roles:["FSM"], label:"Resolve WOLI", run: jump("cases", ()=>woliResolve(c.unit)), tab:"cases", key:"mid-"+c.id };
      if (c.status === "On Hold — Not Ready") return { who:"Supply Chain", text:`${m.id} · ${c.unit}: On Hold — deliver rush parts, then reopen.`, tone:"warn", roles:["Supply Chain"], label:"Rush parts delivered", run: jump("cases", ()=>midResumeHold(m.id,c.id)), tab:"cases", key:"mid-"+c.id };
      if (c.status === "Ready to Dispatch") {
        if (c.checks < CHECKLIST.length) return { who:"Crew ("+c.by+")", text:`${m.id} · ${c.unit}: complete the ${CHECKLIST.length}-item checklist.`, tone:"info", roles:["Crew"], label:"Check all", run: jump("cases", ()=>setMidCases(mc=>mc.map(x=>x.id===m.id?{...x,colis:x.colis.map(y=>y.id===c.id?{...y,checks:CHECKLIST.length}:y)}:x))), tab:"cases", key:"mid-"+c.id };
        if (!c.ready) return { who:"Crew ("+c.by+")", text:`${m.id} · ${c.unit}: set System Ready.`, tone:"info", roles:["Crew"], label:"Set Ready = Yes", run: jump("cases", ()=>setMidCases(mc=>mc.map(x=>x.id===m.id?{...x,colis:x.colis.map(y=>y.id===c.id?{...y,ready:"Yes"}:y)}:x))), tab:"cases", key:"mid-"+c.id };
        return { who:"Crew ("+c.by+")", text:`${m.id} · ${c.unit}: checklist + ready — complete it.`, tone:"info", roles:["Crew"], label:"Complete", run: jump("cases", ()=>midComplete(m.id,c.id,"")), tab:"cases", key:"mid-"+c.id };
      }
      if (c.status === "Submitted – Pending FSM" && unitHasOpenWoli(c.unit)) return { who:"FSM", text:`${m.id} · ${c.unit}: open WOLI is blocking further progress — resolve the fix.`, tone:"err", roles:["FSM"], label:"Resolve WOLI", run: jump("cases", ()=>woliResolve(c.unit)), tab:"cases", key:"mid-"+c.id };
      if (c.status === "Submitted – Pending FSM") return { who:"FSM", text:`${m.id} · ${c.unit}: validate (3rd-party/customer stage-gate).`, tone:"info", roles:["FSM"], label:"Validate", run: jump("cases", ()=>midValidate(m.id,c.id)), tab:"cases", key:"mid-"+c.id };
      if (c.status === "Work Complete") return { who:"CSM", text:`${m.id} · ${c.unit}: confirm billable (month auto from case; comments optional) → lock.`, tone:"purp", roles:["CSM"], label:"Confirm billable", run: jump("cases", ()=>midBillConfirm(m.id,c.id,"")), tab:"cases", key:"mid-"+c.id };
    }
    return null;
  };

  // Verifi Service (movement) — every reason/state combination
  const nextMoveStep = (m) => {
    if (m.status === "Closed") return null;
    if (m.status === "Ready for Command Center") return { who:"Command Center", text:`${m.id}: all COLIs billed/cancelled → push to SAP and close the case.`, tone:"purp", roles:["Command Center"], label:"Push to SAP & close case", run: jump("cases", ()=>moveSendToCC(m.id)), tab:"cases", key:"mv-cc-"+m.id };
    if (m.status === "Rejected") return { who:"CSM or FSM", text:`${m.id}: rejected by Finance — this doesn't dead-end. Resubmit after fixing it, or withdraw.`, tone:"err", roles:["CSM","FSM"], label:"Resubmit to Finance", run: jump("cases", ()=>moveResubmit(m.id)), tab:"cases", key:"mv-"+m.id };
    if (m.status === "Pending Finance") return { who:"Finance", text:`${m.id}: depreciation approval needed before any dispatch.`, tone:"warn", roles:["Finance"], label:"Finance approve", run: jump("cases", ()=>moveFinance(m.id,true)), tab:"cases", key:"mv-"+m.id };
    for (const c of m.colis) {
      if (c.status.includes("Billed") || c.status==="Cancelled" || c.status.includes("Confirmed")) continue;
      if (c.status==="Work Complete" && unitHasOpenWoli(c.unit)) return { who:"FSM", text:`${m.id} · ${c.unit}: open WOLI is blocking billing/lock — resolve the fix.`, tone:"err", roles:["FSM"], label:"Resolve WOLI", run: jump("cases", ()=>woliResolve(c.unit)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Command Center Action") return isAcctChange(m.reason)
        ? { who:"CSM or FSM", text:`${m.id} · ${c.unit}: Command Center processed the move — team confirms to close.`, tone:"purp", roles:["CSM","FSM"], label:"Team: confirm", run: jump("cases", ()=>moveTeamConfirm(m.id,c.id)), tab:"cases", key:"mv-"+c.id }
        : { who:"CSM", text:`${m.id} · ${c.unit}: confirm the name change (usually no billing).`, tone:"purp", roles:["CSM"], label:"CSM: confirm", run: jump("cases", ()=>nonPhysConfirmSimple(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Requested") return { who:"CSM or FSM", text:`${m.id} · ${c.unit}: request the unit switch.`, tone:"info", roles:["CSM","FSM"], label:"Request unit switch", run: jump("cases", ()=>moveUnitSwitch(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Unit Switch Requested") return c.truckAlsoChanges
        ? { who:"CSM or FSM", text:`${m.id} · ${c.unit}: destination account uses a different truck — request the truck switch.`, tone:"info", roles:["CSM","FSM"], label:"Request truck switch", run: jump("cases", ()=>moveTruckSwitch(m.id,c.id)), tab:"cases", key:"mv-"+c.id }
        : { who:"CSM or FSM", text:`${m.id} · ${c.unit}: send to Command Center.`, tone:"purp", roles:["CSM","FSM"], label:"Send to Command Center", run: jump("cases", ()=>moveSendCC(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Truck Switch Requested") return { who:"CSM or FSM", text:`${m.id} · ${c.unit}: send to Command Center.`, tone:"purp", roles:["CSM","FSM"], label:"Send to Command Center", run: jump("cases", ()=>moveSendCC(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "On Hold — Not Ready") return { who:"Supply Chain", text:`${m.id} · ${c.unit}: On Hold — deliver rush parts, then reopen.`, tone:"warn", roles:["Supply Chain"], label:"Rush parts delivered", run: jump("cases", ()=>moveResumeHold(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "On Hold — Awaiting Truck") return { who:"FSM, CSM, or customer portal", text:`${m.id} · ${c.unit}: waiting on a truck for re-install.`, tone:"warn", roles:["FSM","CSM","Crew"], label:"Mark truck ready", run: jump("cases", ()=>moveReady(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Ready to Dispatch" || c.status === "Activated — Ready to Dispatch") {
        const list = coliListFor(c);
        if (c.checks < list.length) return { who:"Crew ("+c.by+")", text:`${m.id} · ${c.unit}: complete the ${list.length}-item ${c.type} checklist.`, tone:"info", roles:["Crew"], label:"Check all", run: jump("cases", ()=>patchColiM(m.id,c.id,{checks:list.length})), tab:"cases", key:"mv-"+c.id };
        if (!c.ready) return { who:"Crew ("+c.by+")", text:`${m.id} · ${c.unit}: set System Ready.`, tone:"info", roles:["Crew"], label:"Set Ready = Yes", run: jump("cases", ()=>patchColiM(m.id,c.id,{ready:"Yes"})), tab:"cases", key:"mv-"+c.id };
        return { who:"Crew ("+c.by+")", text:`${m.id} · ${c.unit}: Crew signs off the ${c.type} checklist — hit Complete.`, tone:"info", roles:["Crew"], label:"Complete as Crew", run: jump("cases", ()=>moveComplete(m.id,c.id,"")), tab:"cases", key:"mv-"+c.id };
      }
      if (c.status === "Submitted – Pending FSM" && unitHasOpenWoli(c.unit)) return { who:"FSM", text:`${m.id} · ${c.unit}: open WOLI is blocking further progress — resolve the fix.`, tone:"err", roles:["FSM"], label:"Resolve WOLI", run: jump("cases", ()=>woliResolve(c.unit)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Submitted – Pending FSM") return { who:"FSM", text:`${m.id} · ${c.unit}: validate (3rd-party/customer stage-gate).`, tone:"info", roles:["FSM"], label:"Validate", run: jump("cases", ()=>moveValidate(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Work Complete") return { who:"CSM", text:`${m.id} · ${c.unit}: confirm billable (month auto from case; comments optional) → lock.`, tone:"purp", roles:["CSM"], label:"Confirm billable", run: jump("cases", ()=>moveBillConfirm(m.id,c.id,"")), tab:"cases", key:"mv-"+c.id };
      if (c.status === "Awaiting SC receipt") return { who:"Supply Chain", text:`${m.id} · ${c.unit}: confirm receipt → remove in Hub.`, tone:"info", roles:["Supply Chain"], label:"Confirm receipt", run: jump("cases", ()=>moveReceipt(m.id,c.id)), tab:"cases", key:"mv-"+c.id };
    }
    if (m.status === "In Progress" && !m.schedule && m.colis.some(c=>c.status==="Ready to Dispatch")) return { who:"FSM or CSM", text:`${m.id}: confirm schedule-lite (team &amp; open-date) before dispatch.`, tone:"info", roles:["FSM","CSM"], label:"Confirm team & open-date", run: jump("cases", ()=>moveSchedule(m.id, TERRITORY[m.account].loc, "07/18/26", TERRITORY[m.account].fst+" team")), tab:"cases", key:"mv-sched-"+m.id };
    return null;
  };

  const next = () => {
    // Guided modal walkthrough: first unit is done by hand inside the record — the tour waits.
    if (openColi && openColi.guided && openColi.engine==="order") {
      const c = colis.find(x=>x.unit===openColi.coliId);
      if (c && openColi.mode==="coli" && c.status!=="Pending FSM" && !c.status.startsWith("Validated")) return { who:"You", text:"Inside " + c.unit + ": Check All (12 items), set Service Ready = Yes + Equipment Shipped Back, then Submit COLI.", tone:"warn", manual:true, tab:"install", key:"modal-guided" };
      if (c && openColi.mode==="val" && c.status==="Pending FSM") return { who:"You", text:"You're the FSM inside " + c.unit + " — hit Validate (check & fix). Problems become a WOLI on the unit.", tone:"warn", manual:true, tab:"install", key:"modal-guided" };
      if (c && openColi.mode==="bill" && !c.billable) return { who:"You", text:"You're the CSM inside " + c.unit + " — confirm billable + month ON THE COLI (Ariel's rule), or No-bill with a reason. This COLI locks forever on confirm.", tone:"warn", manual:true, tab:"install", key:"modal-guided" };
    }
    // Manual-input states: the guide is waiting on a human — surface it, don't go silent.
    if (showOrderForm) return { who:"You", text:"Fill the New Unit Order form — account, trucks, parts sheet — then hit Create order. The guide resumes after save.", tone:"warn", manual:true, tab:"cases", key:"form-order" };
    if (installForm) return { who:"You", text:"Fill the Verifi Install form and hit Create — it registers the brownfield unit. The guide resumes after save.", tone:"warn", manual:true, tab:"cases", key:"form-install" };
    if (moveForm) return { who:"You", text:"Pick the Install Reason and unit(s), then Create — the duplicate guard checks your picks. The guide resumes after save.", tone:"warn", manual:true, tab:"cases", key:"form-move" };
    if (picker) return { who:"You", text:"Pick a record type — all three live types are clickable: New Unit Order (the main ordering flow), Verifi Service (de-install / re-install / movement), or Verifi Install (brownfield). Each runs its own guided flow.", tone:"warn", manual:true, tab:"cases", key:"picker" };
    const order = nextOrderStep();
    if (order) return order;
    for (const m of midCases) { const s = nextMidStep(m); if (s) return s; }
    for (const m of moveCases) { const s = nextMoveStep(m); if (s) return s; }
    if (!created && !midCases.length && !moveCases.length) return { who:"CSM or FSM", text:"New Case — pick the record type. New Unit Order starts the whole flow (replaces the Excel).", tone:"info", roles:["CSM","FSM"], label:"＋ New Case", run: openPicker, tab:"cases", key:"create", free:true };
    return { who:"All caught up", text:(created ? "🏁 Workflow complete — the only step left, Final close, is parked (owner TBD, see the pin on the story bar). " : "Nothing actionable across any open case right now. ") + "Start another with ＋ New Case.", tone:"ok", roles:["CSM","FSM"], label:"＋ New Case", run: openPicker, tab:"cases", key:"create", free:true };
  };
  const N = next();
  const orderDone = created && !nextOrderStep(); // the order-install story is exhausted — only the parking-lot final close remains
  const hot = (k) => N.key === k;
  const just = (...ks) => (!orderDone && !N.manual && lastAction && ks.includes(lastAction.key)) ? lastAction : null; // ONE open tour voice at a time: the last-action pin yields at the finish AND whenever a your-turn pin is active (the dock still shows the ✓ readout)
  // Guided Next: runs the step AS its owner (role switched + passed explicitly, since setRole is async),
  // jumps to the right tab, records what happened for the green spotlight, and scrolls to where it happened.
  const showMe = () => { setTab(N.tab); setTimeout(() => { const el = document.querySelector('[data-spot~="' + (N.key||"") + '"]'); if (el) el.scrollIntoView({behavior:"smooth", block:"center"}); }, 120); };
